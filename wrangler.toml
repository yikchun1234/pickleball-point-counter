name = "pickleball-sync-api"
main = "src/index.js"
compatibility_date = "2024-04-30"

# 1. Bind your D1 database to the Worker
[[d1_databases]]
binding = "DB" # This is the variable name you will use in your JavaScript code
database_name = "ppcconsole"
database_id = "5dfb7ea9-eddd-41fc-9005-256e7f63d7b1"

# 2. Tell Cloudflare to wake this Worker up every 5 minutes
[triggers]
crons = ["*/5 * * * *"]

# 3. Prevent Spam! Limit to 5 requests per 60 seconds per IP
[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 5, period = 60 }
