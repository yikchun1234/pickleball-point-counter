    <script>
      const allowedDomains = [
        "pickleball-point-counter.pages.dev",
        "localhost",
        "127.0.0.1",
        "",
      ];
      const currentDomain = window.location.hostname;

      if (!allowedDomains.includes(currentDomain)) {
        document.documentElement.innerHTML = `
          <div style="display:flex; height:100vh; width:100%; align-items:center; justify-content:center; background:#1c1917; color:#e7e5e4; font-family:sans-serif; text-align:center;">
              <div>
                  <h1 style="color:#f43f5e; font-size:2rem; margin-bottom:10px;">Unauthorized Access</h1>
                  <p>This application is strictly licensed and cannot be run on this domain.</p>
                  <p style="font-size:0.8rem; color:#78716c; margin-top:20px;">Domain recorded: ${
                    currentDomain || "Unknown"
                  }</p>
              </div>
          </div>`;
        throw new Error(
          "Execution halted: Unauthorized domain theft detected."
        );
      }

      setInterval(function () {
        debugger;
      }, 100);
      document.addEventListener("contextmenu", (event) =>
        event.preventDefault()
      );

      document.addEventListener("keydown", function (e) {
        if (e.key === "F12" || e.keyCode === 123) e.preventDefault();
        if (
          (e.ctrlKey || e.metaKey) &&
          e.shiftKey &&
          (e.key === "I" || e.key === "i" || e.keyCode === 73)
        )
          e.preventDefault();
        if (
          (e.ctrlKey || e.metaKey) &&
          e.shiftKey &&
          (e.key === "J" || e.key === "j" || e.keyCode === 74)
        )
          e.preventDefault();
        if (
          (e.ctrlKey || e.metaKey) &&
          (e.key === "U" || e.key === "u" || e.keyCode === 85)
        )
          e.preventDefault();
        if (
          (e.ctrlKey || e.metaKey) &&
          (e.key === "S" || e.key === "s" || e.keyCode === 83)
        )
          e.preventDefault();
      });
    </script>

      const appUrl = window.location.pathname || "/";
      const manifest = {
        name: "Pickleball Point Counter",
        short_name: "Pickleball",
        start_url: appUrl,
        id: appUrl,
        display: "standalone",
        background_color: "#fafaf9",
        theme_color: "#10b981",
        icons: [
          {
            src: "/img/icon.png",
            sizes: "192x192",
            type: "image/png",
            purpose: "any maskable",
          },
          {
            src: "/img/icon.png",
            sizes: "512x512",
            type: "image/png",
            purpose: "any maskable",
          },
        ],
      };
      document.getElementById("manifest-link").href =
        "data:application/manifest+json;charset=utf-8," +
        encodeURIComponent(JSON.stringify(manifest));

      (function () {
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.onload = function () {
          try {
            const canvasAndroid = document.createElement("canvas");
            canvasAndroid.width = 512;
            canvasAndroid.height = 512;
            const ctxAndroid = canvasAndroid.getContext("2d");
            ctxAndroid.fillStyle = "#ffffff";
            ctxAndroid.fillRect(0, 0, 512, 512);
            const scaleAndroid = 0.65;
            const sizeAndroid = 512 * scaleAndroid;
            const offsetAndroid = (512 - sizeAndroid) / 2;
            ctxAndroid.drawImage(
              img,
              offsetAndroid,
              offsetAndroid,
              sizeAndroid,
              sizeAndroid
            );

            const canvasIOS = document.createElement("canvas");
            canvasIOS.width = 512;
            canvasIOS.height = 512;
            const ctxIOS = canvasIOS.getContext("2d");
            ctxIOS.fillStyle = "#ffffff";
            ctxIOS.fillRect(0, 0, 512, 512);
            const scaleIOS = 0.9;
            const sizeIOS = 512 * scaleIOS;
            const offsetIOS = (512 - sizeIOS) / 2;
            ctxIOS.drawImage(
              img,
              offsetIOS,
              offsetIOS,
              sizeIOS,
              sizeIOS
            );

            document.getElementById("favicon").href =
              canvasAndroid.toDataURL("image/png");
            document.getElementById("favicon").type = "image/png";
            document.getElementById("apple-icon").href =
              canvasIOS.toDataURL("image/png");
          } catch (e) {}
        };
        img.src = "/img/icon.png";
      })();
    </script>

        animation: spin-static 1.5s linear infinite;

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      const IconWrapper = ({ iconObj, size = 24, className = "" }) => {
        if (!iconObj || !Array.isArray(iconObj)) return null;
        return React.createElement(
          "svg",
          {
            xmlns: "http://www.w3.org/2000/svg",
            width: size,
            height: size,
            viewBox: "0 0 24 24",
            fill: "none",
            stroke: "currentColor",
            strokeWidth: "2",
            strokeLinecap: "round",
            strokeLinejoin: "round",
            className: `lucide ${className}`,
          },
          iconObj.map((node, index) => {
            const [tag, attrs] = node;
            const reactAttrs = { key: index };
            for (const [key, value] of Object.entries(attrs || {})) {
              const reactKey =
                key === "class"
                  ? "className"
                  : key.replace(/-([a-z])/g, (g) => g[1].toUpperCase());
              reactAttrs[reactKey] = value;
            }
            return React.createElement(tag, reactAttrs);
          })
        );
      };

      const Play = (props) => <IconWrapper iconObj={lucide.icons.Play} {...props} />;
      const Users = (props) => <IconWrapper iconObj={lucide.icons.Users} {...props} />;

      const RotateCcw = (props) => <IconWrapper iconObj={lucide.icons.RotateCcw} {...props} />;

      const Zap = (props) => <IconWrapper iconObj={lucide.icons.Zap} {...props} />;

      const X = (props) => <IconWrapper iconObj={lucide.icons.X} {...props} />;
      const InfoIcon = (props) => <IconWrapper iconObj={lucide.icons.Info} {...props} />;
      const HardDrive = (props) => <IconWrapper iconObj={lucide.icons.HardDrive} {...props} />;
      const Volume2 = (props) => <IconWrapper iconObj={lucide.icons.Volume2} {...props} />;
      const VolumeX = (props) => <IconWrapper iconObj={lucide.icons.VolumeX} {...props} />;
      const BarChart2 = (props) => <IconWrapper iconObj={lucide.icons.BarChart2} {...props} />;
      const Edit2 = (props) => <IconWrapper iconObj={lucide.icons.Edit2} {...props} />;
      const Share2 = (props) => <IconWrapper iconObj={lucide.icons.Share2} {...props} />;
      const Timer = (props) => <IconWrapper iconObj={lucide.icons.Timer} {...props} />;
      const Check = (props) => <IconWrapper iconObj={lucide.icons.Check} {...props} />;
      const Activity = (props) => <IconWrapper iconObj={lucide.icons.Activity} {...props} />;
      const Grid = (props) => <IconWrapper iconObj={lucide.icons.Grid} {...props} />;
      const Target = (props) => <IconWrapper iconObj={lucide.icons.Target} {...props} />;
      const MousePointer2 = (props) => <IconWrapper iconObj={lucide.icons.MousePointer2} {...props} />;
      const Gamepad2 = (props) => <IconWrapper iconObj={lucide.icons.Gamepad2} {...props} />;
      const RefreshCw = (props) => <IconWrapper iconObj={lucide.icons.RefreshCw} {...props} />;
      const Home = (props) => <IconWrapper iconObj={lucide.icons.Home} {...props} />;
      const QrCode = (props) => <IconWrapper iconObj={lucide.icons.QrCode} {...props} />;
      const ArrowRightLeft = (props) => <IconWrapper iconObj={lucide.icons.ArrowRightLeft} {...props} />;
      const Lock = (props) => <IconWrapper iconObj={lucide.icons.Lock} {...props} />;
      const Unlock = (props) => <IconWrapper iconObj={lucide.icons.Unlock} {...props} />;
      const GripVertical = (props) => <IconWrapper iconObj={lucide.icons.GripVertical} {...props} />;

      function PickleballApp() {
          const [appState, setAppState] = useState("splash");
          const [closingScreen, setClosingScreen] = useState(null);
          const [zoomActive, setZoomActive] = useState(false);
          const [pendingGame, setPendingGame] = useState(null);
          const [showClearConfirm, setShowClearConfirm] = useState(false);
          const [showLangMenu, setShowLangMenu] = useState(false);
          const [showInstallInstructions, setShowInstallInstructions] = useState(false);
          const [showInfo, setShowInfo] = useState(false);
          const [showRetreatModal, setShowRetreatModal] = useState(false);
          const [showBackConfirm, setShowBackConfirm] = useState(false);
          const [isHistoryLoading, setIsHistoryLoading] = useState(false);
          const [showSwitchModal, setShowSwitchModal] = useState(false);
          const [recoverGameData, setRecoverGameData] = useState(null);
          const [editingMatchId, setEditingMatchId] = useState(null);
          const [showLegacyAlert, setShowLegacyAlert] = useState(false);
          const [showZeroPointAlert, setShowZeroPointAlert] = useState(false);
          const [showHighPointWarning, setShowHighPointWarning] = useState(false);

          // --- PLAYER MANAGEMENT LOGIC ---
          const [showMemberModal, setShowMemberModal] = useState(false);
          const [savedMembers, setSavedMembers] = useState([]);
          const [editMemberId, setEditMemberId] = useState(null);
          const [memberFormName, setMemberFormName] = useState("");
          const [playerSelectTarget, setPlayerSelectTarget] = useState(null); // 't1Left','t1Right','t2Left','t2Right'

          // --- DRAG & DROP (LONG PRESS 0.5 SEC) WITH GHOST & SCROLL ---
          const [dragIndex, setDragIndex] = useState(null);
          const [hoverIndex, setHoverIndex] = useState(null);
          const [dragPos, setDragPos] = useState({ x: 0, y: 0 });
          const [dragOffset, setDragOffset] = useState({ x: 0, y: 0, width: 0 });
          const pressTimer = useRef(null);
          const scrollInterval = useRef(null);

          const handleItemPointerDown = (index, e) => {
            if (e.target.closest("button")) return;
            const clientX = e.clientX || (e.touches && e.touches[0].clientX) || 0;
            const clientY = e.clientY || (e.touches && e.touches[0].clientY) || 0;

            const rect = e.currentTarget.getBoundingClientRect();
            setDragOffset({
              x: clientX - rect.left,
              y: clientY - rect.top,
              width: rect.width,
            });

            setDragPos({ x: clientX, y: clientY });

            pressTimer.current = setTimeout(() => {
              setDragIndex(index);
              setHoverIndex(index);
              if (navigator.vibrate) navigator.vibrate(20);
            }, 500);
          };

          useEffect(() => {
            const preventNativeScroll = (e) => {
              if (dragIndex !== null) e.preventDefault();
            };

            const handleMove = (e) => {
              if (dragIndex === null) {
                clearTimeout(pressTimer.current);
                return;
              }

              const clientX =
                e.clientX || (e.touches && e.touches.length > 0 ? e.touches[0].clientX : 0);
              const clientY =
                e.clientY || (e.touches && e.touches.length > 0 ? e.touches[0].clientY : 0);
              setDragPos({ x: clientX, y: clientY });

              const scrollContainer = document.getElementById("player-list-scroll");
              if (scrollContainer) {
                const rect = scrollContainer.getBoundingClientRect();
                const scrollSpeed = 8;
                clearInterval(scrollInterval.current);

                if (clientY < rect.top + 50) {
                  scrollInterval.current = setInterval(() => {
                    scrollContainer.scrollTop -= scrollSpeed;
                  }, 20);
                } else if (clientY > rect.bottom - 50) {
                  scrollInterval.current = setInterval(() => {
                    scrollContainer.scrollTop += scrollSpeed;
                  }, 20);
                }
              }

              const el = document.elementFromPoint(clientX, clientY);
              const listEl = el ? el.closest("[data-idx]") : null;
              if (listEl && listEl.dataset.idx !== undefined) {
                setHoverIndex(parseInt(listEl.dataset.idx));
              }
            };

            const handleUp = () => {
              clearTimeout(pressTimer.current);
              clearInterval(scrollInterval.current);
              if (dragIndex !== null && hoverIndex !== null && dragIndex !== hoverIndex) {
                const updated = [...savedMembers];
                const [item] = updated.splice(dragIndex, 1);
                updated.splice(hoverIndex, 0, item);
                setSavedMembers(updated);
                localStorage.setItem("pb_members", JSON.stringify(updated));
              }
              setDragIndex(null);
              setHoverIndex(null);
            };

            document.addEventListener("touchmove", preventNativeScroll, { passive: false });
            window.addEventListener("pointermove", handleMove, { passive: false });
            window.addEventListener("pointerup", handleUp);
            window.addEventListener("pointercancel", handleUp);

            return () => {
              document.removeEventListener("touchmove", preventNativeScroll);
              window.removeEventListener("pointermove", handleMove);
              window.removeEventListener("pointerup", handleUp);
              window.removeEventListener("pointercancel", handleUp);
              clearInterval(scrollInterval.current);
            };
          }, [dragIndex, hoverIndex, savedMembers]);

          const deleteMember = (hexId) => {
            const updated = savedMembers.filter((m) => m.hexId !== hexId);
            setSavedMembers(updated);
            localStorage.setItem("pb_members", JSON.stringify(updated));
            if (editMemberId === hexId) {
              setEditMemberId(null);
              setMemberFormName("");
            }
          };

          const openEditMember = (member) => {
            setEditMemberId(member.hexId);
            setMemberFormName(member.name);
          };

          useEffect(() => {
            try {
              const s = localStorage.getItem("pb_members");
              if (s) setSavedMembers(JSON.parse(s));
            } catch (e) {}
          }, []);

          const openAddMember = () => {
            setMemberFormName("");
            setEditMemberId(null);
            setPlayerSelectTarget(null);
            setShowMemberModal(true);
          };

                ctx.font = '900 280px "Noto Sans", sans-serif';

                const drawWinnerBadge = async (color, x, y) => {
                  const hexColor = color === "green" ? accentGreen : accentRed;
                  const iconColor = color === "green" ? "#d1fae5" : "#ffe4e6";
                  const badgeSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="${iconColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>`;
                  const badgeW = 280;
                  const badgeH = 80;
                  const badgeX = x - badgeW / 2;
                  const badgeY = y - badgeH / 2;
                  ctx.fillStyle = hexColor;
                  ctx.beginPath();
                  ctx.roundRect(badgeX, badgeY, badgeW, badgeH, 40);
                  ctx.fill();
                  await drawSvg(badgeSvg, badgeX + 40, badgeY + 22, 36, 36);
                  ctx.fillStyle = "#ffffff";
                  ctx.font = '700 28px "Noto Sans", sans-serif';
                  ctx.letterSpacing = "4px";
                  ctx.textBaseline = "middle";
                  ctx.fillText(
                    "WINNER",
                    badgeX + 165,
                    badgeY + badgeH / 2 + 2
                  );
                };
                if (match.winner === 1)
                  await drawWinnerBadge("green", width / 2 - 250, 1050);
                if (match.winner === 2)
                  await drawWinnerBadge("red", width / 2 + 250, 1050);

                const modeText =
                  match.mode === "single" ? getT("singles") : getT("doubles");
                const rulesText =
                  match.rules === "standard"
                    ? getT("stdTitle")
                    : match.rules === "14-point"
                    ? getT("fourteenTitle")
                    : getT("customFormat");
                const footerText = `${modeText}   •   ${rulesText}   •   ${formatTime(
                  match.elapsedTime || 0
                )}`;
                ctx.font = '500 26px "Noto Sans", sans-serif';
                ctx.letterSpacing = "0px";
                const footerWidth = ctx.measureText(footerText).width + 120;
                ctx.fillStyle = isDark
                  ? "rgba(255,255,255,0.05)"
                  : "rgba(0,0,0,0.05)";
                ctx.beginPath();
                ctx.roundRect(
                  width / 2 - footerWidth / 2,
                  1180 - 35,
                  footerWidth,
                  70,
                  35
                );
                ctx.fill();
                ctx.fillStyle = textSub;
                ctx.textBaseline = "middle";
                ctx.fillText(footerText, width / 2, 1180);
                ctx.font = '800 20px "Noto Sans", sans-serif';
                ctx.letterSpacing = "3px";
                ctx.fillStyle = isDark ? "#57534e" : "#a8a29e";
                ctx.fillText(
                  "HTTPS://PICKLEBALL-POINT-COUNTER.PAGES.DEV",
                  width / 2,
                  1280
                );

                canvas.toBlob(async (blob) => {
                  if (!blob) {
                    setIsExporting(false);
                    return;
                  }
                  const file = new File([blob], `pickleball_${Date.now()}.png`, {
                    type: "image/png",
                  });
                  const winName =
                    match.winner === 1 ? match.t1Name : match.t2Name;
                  const loseName =
                    match.winner === 1 ? match.t2Name : match.t1Name;
                  const winScore =
                    match.winner === 1 ? match.t1Score : match.t2Score;
                  const loseScore =
                    match.winner === 1 ? match.t2Score : match.t1Score;
                  const titleText = `🏆 ${winName} wins ${winScore}-${loseScore} against ${loseName}!\nScore tracked via Pickleball Point Counter: https://pickleball-point-counter.pages.dev`;
                  if (
                    navigator.canShare &&
                    navigator.canShare({
                      title: "Pickleball Result",
                      text: titleText,
                      files: [file],
                    })
                  ) {
                    navigator
                      .share({
                        title: "Pickleball Result",
                        text: titleText,
                        files: [file],
                      })
                      .catch((e) => console.log(e));
                  } else {
                    const link = document.createElement("a");
                    link.download = file.name;
                    link.href = URL.createObjectURL(blob);
                    link.click();
                  }
                  setIsExporting(false);
                }, "image/png");
              } catch (e) {
                setIsExporting(false);
                alert("Image generation failed.");
              }
            }, 50);
          };

          const applyFemaleVoice = (utterance, langTag) => {
            utterance.lang = langTag;
            const voices = window.speechSynthesis.getVoices();
            if (voices.length > 0) {
              const langVoices = voices.filter(
                (v) =>
                  v.lang.startsWith(langTag) ||
                  v.lang.startsWith(langTag.split("-")[0])
              );
              if (langVoices.length > 0) {
                let femaleVoice = langVoices.find((v) =>
                  /female|woman|samantha|zira|karen|victoria|tessa|moira|veena|monica|ting-ting|kyoko|yuri/i.test(
                    v.name
                  )
                );
                if (!femaleVoice) {
                  femaleVoice = langVoices.find(
                    (v) =>
                      !/male|man|boy|david|alex|daniel|tom|kevin|oliver|aaron|arthur/i.test(
                        v.name
                      )
                  );
                }
                utterance.voice = femaleVoice ? femaleVoice : langVoices[0];
              }
            }
          };

          const detectLanguage = (text, defaultLangTag) => {
            if (/[\u4e00-\u9fa5]/.test(text)) return "zh-CN";
            if (/[\u3040-\u30ff]/.test(text)) return "ja-JP";
            if (/[\uac00-\ud7af]/.test(text)) return "ko-KR";
            if (/[\u0e00-\u0e7f]/.test(text)) return "th-TH";
            return defaultLangTag;
          };

          const announceText = (text1, text2) => {
            if (!soundEnabled || !("speechSynthesis" in window)) return;
            window.speechSynthesis.cancel();
            const langTag = getLangTag(lang);
            setTimeout(() => {
              if (text1) {
                const u1 = new SpeechSynthesisUtterance(text1);
                applyFemaleVoice(u1, langTag);
                let hasEnded = false;
                u1.onend = () => {
                  if (hasEnded) return;
                  hasEnded = true;
                  if (text2) {
                    setTimeout(() => {
                      const u2 = new SpeechSynthesisUtterance(text2);
                      applyFemaleVoice(u2, langTag);
                      window.speechSynthesis.speak(u2);
                    }, 500);
                  }
                };
                setTimeout(() => {
                  if (!hasEnded) {
                    hasEnded = true;
                    if (text2) {
                      const u2 = new SpeechSynthesisUtterance(text2);
                      applyFemaleVoice(u2, langTag);
                      window.speechSynthesis.speak(u2);
                    }
                  }
                }, 1250);
                window.speechSynthesis.speak(u1);
              } else if (text2) {
                const u2 = new SpeechSynthesisUtterance(text2);
                applyFemaleVoice(u2, langTag);
                window.speechSynthesis.speak(u2);
              }
            }, 50);
          };

          const handleSoundClick = () => {
            const newSound = !soundEnabled;
            setSoundEnabled(newSound);
            localStorage.setItem("pb_sound_pref", newSound.toString());
          };

          const handleSecretClick = () => {
            secretClickCount.current += 1;
            if (secretClickCount.current >= 5) {
              setSecretGame("menu");
              secretClickCount.current = 0;
              triggerHaptic("win");
            }
          };

          const handleLanguageChange = (code) => {
            setLang(code);
            setShowLangMenu(false);
            localStorage.setItem("pb_lang_pref", code);
          };

          const clearHistory = () => {
            setSavedMatches([]);
            localStorage.removeItem("pb_history_matches");
            setShowClearConfirm(false);
          };

          const toggleTheme = () => {
            const newTheme = !isDark;
            setIsDark(newTheme);
            localStorage.setItem("pb_theme_pref", newTheme ? "dark" : "light");
          };

          const handleInstallClick = async () => {
            if (installPrompt) {
              installPrompt.prompt();
              const { outcome } = await installPrompt.userChoice;
              if (outcome === "accepted") {
                setInstallPrompt(null);
                setIsInstalled(true);
              }
            } else {
              setShowInstallInstructions(true);
            }
          };

          const handleRuleSelect = (mode, rules) => {
            setMatchTitleInput("");
            setT1PLeftInput("");
            setT1PRightInput("");
            setT2PLeftInput("");
            setT2PRightInput("");
            setCustomPlayTo(11);
            setCustomWinBy(2);
            setEnableSwitchEnds(false);
            setServeToWinAt14(false);
            setStartingServer(1);
            setEnableTimeoutsSetup(0);
            setPendingGame({ mode, rules });
          };

          const resumeGame = (data) => {
            setCurrentMatchId(data.currentMatchId);
            setMatchTitle(data.matchTitle);
            setGameMode(data.gameMode);
            setRuleSet(data.ruleSet);
            setPlayTo(data.playTo);
            setWinByMargin(data.winByMargin);
            setT1PLeft(data.t1PLeft || getT("t1Name"));
            setT1PRight(data.t1PRight || "");
            setT2PLeft(data.t2PLeft || getT("t2Name"));
            setT2PRight(data.t2PRight || "");
            setTeam1Score(data.team1Score);
            setTeam2Score(data.team2Score);
            setServingTeam(data.servingTeam);
            setServerNumber(data.serverNumber);
            setServeToWinAt14(data.serveToWinAt14);
            setEnableSwitchEnds(data.enableSwitchEnds || false);
            setHasSwitchedEnds(data.hasSwitchedEnds);
            const loadedTimeouts =
              data.enableTimeouts === true ? 2 : data.enableTimeouts || 0;
            setEnableTimeouts(loadedTimeouts);
            setT1Timeouts(data.t1Timeouts ?? loadedTimeouts);
            setT2Timeouts(data.t2Timeouts ?? loadedTimeouts);
            setCourtRotation(data.courtRotation || 0);
            setInitialServer(data.initialServer || 1);
            setElapsedTime(data.elapsedTime);
            setHistory(data.history);
            setStateHistory(data.stateHistory);
            setWinner(null);
            setWinReason("score");
            setShowWinnerOverlay(false);
            setAppState("game");
            setRecoverGameData(null);
          };

          const confirmStartGame = () => {
            startGame(
              pendingGame.mode,
              pendingGame.rules,
              matchTitleInput,
              pendingGame.mode === "single" ? t1PLeftInput : t1PLeftInput,
              pendingGame.mode === "single" ? "" : t1PRightInput,
              pendingGame.mode === "single" ? t2PLeftInput : t2PLeftInput,
              pendingGame.mode === "single" ? "" : t2PRightInput,
              parseInt(customPlayTo) || 11,
              customWinBy,
              enableSwitchEnds,
              startingServer,
              enableTimeoutsSetup
            );
            setPendingGame(null);
            setShowHighPointWarning(false);
          };

          const handleAttemptStartGame = () => {
            if (pendingGame.rules === "custom") {
              const pTo = parseInt(customPlayTo);
              if (isNaN(pTo) || pTo <= 0) {
                setShowZeroPointAlert(true);
                return;
              }
              if (pTo >= 26) {
                setShowHighPointWarning(true);
                return;
              }
            }
            confirmStartGame();
          };

          const startGame = (
            mode,
            rules,
            title,
            p1_left,
            p1_right,
            p2_left,
            p2_right,
            cPlayTo,
            cWinBy,
            enableSwitch,
            startServ,
            useTimeouts
          ) => {
            let pTo = 11;
            let wBy = 2;
            if (rules === "14-point") {
              pTo = 15;
              wBy = 1;
            }
            if (rules === "custom") {
              pTo = cPlayTo;
              wBy = cWinBy;
            }
            setCurrentMatchId(Date.now());
            setMatchTitle(title);
            setGameMode(mode);
            setRuleSet(rules);
            setPlayTo(pTo);
            setWinByMargin(wBy);
            setEnableSwitchEnds(enableSwitch);
            if (mode === "single") {
              setT1PLeft(p1_left || getT("t1Name"));
              setT1PRight("");
              setT2PLeft(p2_left || getT("t2Name"));
              setT2PRight("");
            } else {
              setT1PLeft(p1_left || getT("t1P1"));
              setT1PRight(p1_right || getT("t1P2"));
              setT2PLeft(p2_left || getT("t2P1"));
              setT2PRight(p2_right || getT("t2P2"));
            }
            setInitialServer(startServ);
            setTeam1Score(0);
            setTeam2Score(0);
            setServingTeam(startServ);
            setServerNumber(mode === "double" ? 2 : 1);
            setEnableTimeouts(useTimeouts);
            setT1Timeouts(useTimeouts);
            setT2Timeouts(useTimeouts);
            setWinner(null);
            setWinReason("score");
            setShowWinnerOverlay(false);
            setHistory([]);
            setStateHistory([]);
            setHasSwitchedEnds(false);
            setElapsedTime(0);
            setCourtRotation(0);
            setActiveTimeoutRemaining(0);
            setIsTimelineLocked(true);
            setPreviewData(null);
            setAppState("game");
            window.scrollTo(0, 0);
            setTimeout(() => {
              const isServeToScore =
                rules === "standard" ||
                (rules === "custom" && serveToWinAt14);
              announceText(
                null,
                `0, 0${
                  mode === "double" && isServeToScore
                    ? `, ${mode === "double" ? 2 : 1}`
                    : ""
                }`
              );
            }, 200);
          };

          const saveStateForUndo = () => {
            setStateHistory((prev) => [
              ...prev,
              {
                team1Score,
                team2Score,
                servingTeam,
                serverNumber,
                winner,
                winReason,
                hasSwitchedEnds,
                history: [...history],
                t1Timeouts,
                t2Timeouts,
                courtRotation,
              },
            ]);
          };

          const handleUndo = () => {
            if (stateHistory.length === 0) return;
            if (winner !== null) {
              setSavedMatches((prev) => {
                const updated = prev.filter((m) => m.id !== currentMatchId);
                localStorage.setItem(
                  "pb_history_matches",
                  JSON.stringify(updated)
                );
                return updated;
              });
              setShowWinnerOverlay(false);
            }
            const prev = stateHistory[stateHistory.length - 1];
            setTeam1Score(prev.team1Score);
            setTeam2Score(prev.team2Score);
            setServingTeam(prev.servingTeam);
            setServerNumber(prev.serverNumber);
            setWinner(prev.winner);
            setWinReason(prev.winReason || "score");
            if (prev.t1Timeouts !== undefined) setT1Timeouts(prev.t1Timeouts);
            if (prev.t2Timeouts !== undefined) setT2Timeouts(prev.t2Timeouts);
            if (prev.courtRotation !== undefined)
              setCourtRotation(prev.courtRotation);
            setHistory(prev.history);
            setHasSwitchedEnds(prev.hasSwitchedEnds || false);
            setStateHistory((s) => s.slice(0, -1));
            setActiveTimeoutRemaining(0);
            setIsTimelineLocked(true);
            setPreviewData(null);
          };

          const handleResetPointsOnly = () => {
            setTeam1Score(0);
            setTeam2Score(0);
            setServingTeam(initialServer);
            setServerNumber(gameMode === "double" ? 2 : 1);
            setWinner(null);
            setWinReason("score");
            setShowWinnerOverlay(false);
            setHistory([]);
            setStateHistory([]);
            setHasSwitchedEnds(false);
            setElapsedTime(0);
            setCourtRotation(0);
            setT1Timeouts(enableTimeouts);
            setT2Timeouts(enableTimeouts);
            setShowResetModal(false);
            setActiveTimeoutRemaining(0);
            setIsTimelineLocked(true);
            setPreviewData(null);
            setTimeout(() => {
              const isServeToScore =
                ruleSet === "standard" ||
                (ruleSet === "custom" && serveToWinAt14);
              announceText(
                null,
                `0, 0${
                  gameMode === "double" && isServeToScore
                    ? `, ${gameMode === "double" ? 2 : 1}`
                    : ""
                }`
              );
            }, 200);
          };

          const handleChangeSettings = () => {
            setShowResetModal(false);
            setMatchTitleInput(matchTitle);
            setT1PLeftInput(t1PLeft);
            setT1PRightInput(t1PRight);
            setT2PLeftInput(t2PLeft);
            setT2PRightInput(t2PRight);
            setCustomPlayTo(playTo);
            setCustomWinBy(winByMargin);
            setServeToWinAt14(serveToWinAt14);
            setEnableSwitchEnds(enableSwitchEnds);
            setEnableTimeoutsSetup(enableTimeouts);
            setStartingServer(initialServer);
            setPendingGame({ mode: gameMode, rules: ruleSet });
          };

          const handleRetreat = (retreatingTeam) => {
            saveStateForUndo();
            setWinReason("retreat");
            setWinner(retreatingTeam === 1 ? 2 : 1);
            setShowRetreatModal(false);
            setShowWinnerOverlay(true);
          };

          const handleTimeout = (team) => {
            if (winner) return;
            saveStateForUndo();
            if (team === 1) setT1Timeouts((t) => t - 1);
            else setT2Timeouts((t) => t - 1);
            const evType = team === 1 ? "T1_TIMEOUT" : "T2_TIMEOUT";
            const snapshot = {
              team1Score,
              team2Score,
              servingTeam,
              serverNumber,
              elapsedTime,
              t1Left: currentT1Left,
              t1Right: currentT1Right,
              t2Left: currentT2Left,
              t2Right: currentT2Right,
              serverPos: courtServerPos,
              receiverPos: courtReceiverPos,
              isSnapshot: true,
              courtRotation: courtRotation,
            };
            setHistory((prev) => [
              ...prev,
              { id: Date.now(), type: evType, team, point: null, snapshot },
            ]);
            setShowTimeoutConfirm(null);
            triggerHaptic("point");
            announceText(
              team === servingTeam
                ? getT("serverTimeout")
                : getT("receiverTimeout")
            );
            setActiveTimeoutRemaining(60);
          };

          const checkWin = (
            t1,
            t2,
            newServTeam,
            newServNum,
            newHistory,
            isServeToScore
          ) => {
            let hasWinner = false;
            let winTeam = null;
            if (t1 >= playTo && t1 - t2 >= winByMargin) {
              hasWinner = true;
              winTeam = 1;
            }
            if (t2 >= playTo && t2 - t1 >= winByMargin) {
              hasWinner = true;
              winTeam = 2;
            }
            if (hasWinner) {
              setWinner(winTeam);
              setShowWinnerOverlay(true);
              triggerHaptic("win");
              setIsTimelineLocked(false);
              if (soundEnabled && "speechSynthesis" in window) {
                window.speechSynthesis.cancel();
                const winnerName = winTeam === 1 ? t1Name : t2Name;
                const appLangTag = getLangTag(lang);
                const nameLangTag = detectLanguage(winnerName, appLangTag);
                const u1 = new SpeechSynthesisUtterance("Game over.");
                applyFemaleVoice(u1, appLangTag);
                const u2 = new SpeechSynthesisUtterance(winnerName);
                applyFemaleVoice(u2, nameLangTag);
                const u3 = new SpeechSynthesisUtterance(getT("winner"));
                applyFemaleVoice(u3, appLangTag);
                u1.onend = () => {
                  setTimeout(() => window.speechSynthesis.speak(u2), 200);
                };
                u2.onend = () => {
                  setTimeout(() => window.speechSynthesis.speak(u3), 200);
                };
                setTimeout(() => window.speechSynthesis.speak(u1), 50);
              }
            } else {
              const isServeToScoreCurrent =
                ruleSet === "standard" ||
                (ruleSet === "custom" && serveToWinAt14);
              const scoreAnnounce =
                newServTeam === 1
                  ? `${t1}, ${t2}${
                      gameMode === "double" &&
                      isServeToScoreCurrent &&
                      !(
                        ruleSet === "14-point" &&
                        serveToWinAt14 &&
                        t1 === 14 &&
                        t2 === 14
                      )
                        ? `, ${newServNum}`
                        : ""
                    }`
                  : `${t2}, ${t1}${
                      gameMode === "double" &&
                      isServeToScoreCurrent &&
                      !(
                        ruleSet === "14-point" &&
                        serveToWinAt14 &&
                        t1 === 14 &&
                        t2 === 14
                      )
                        ? `, ${newServNum}`
                        : ""
                    }`;
              const lastEvent = newHistory[newHistory.length - 1];
              if (lastEvent) {
                if (lastEvent.type === "FAULT")
                  announceText(getT("secondServer"), scoreAnnounce);
                else if (lastEvent.type === "SIDEOUT")
                  announceText(getT("sideOut"), scoreAnnounce);
                else if (
                  lastEvent.type.includes("POINT") &&
                  isServeToScoreCurrent
                )
                  announceText(getT("point") || "Point", scoreAnnounce);
                else announceText(null, scoreAnnounce);
              } else announceText(null, scoreAnnounce);
            }
          };

          const handleRallyWin = (winningTeam) => {
            if (winner || activeTimeoutRemaining > 0) return;
            triggerHaptic("point");
            saveStateForUndo();
            let newT1 = team1Score;
            let newT2 = team2Score;
            let newServTeam = servingTeam;
            let newServNum = serverNumber;
            let evType = "";
            let isServeToScoreMode = false;
            let isStrictSuddenDeath = false;
            if (ruleSet === "standard") isServeToScoreMode = true;
            else if (ruleSet === "custom" && serveToWinAt14)
              isServeToScoreMode = true;
            else if (
              ruleSet === "14-point" &&
              serveToWinAt14 &&
              team1Score === 14 &&
              team2Score === 14
            ) {
              isServeToScoreMode = true;
              isStrictSuddenDeath = true;
            }
            const grantPoint = () => {
              if (winningTeam === 1) {
                newT1 += 1;
                evType = "T1_POINT";
              } else {
                newT2 += 1;
                evType = "T2_POINT";
              }
            };
            const grantSideout = () => {
              if (gameMode === "single" || isStrictSuddenDeath) {
                newServTeam = winningTeam;
                evType = "SIDEOUT";
                newServNum = 1;
              } else {
                if (serverNumber === 1) {
                  newServNum = 2;
                  evType = "FAULT";
                } else {
                  newServTeam = winningTeam;
                  newServNum = 1;
                  evType = "SIDEOUT";
                }
              }
            };
            if (isServeToScoreMode) {
              if (winningTeam === servingTeam) grantPoint();
              else grantSideout();
            } else {
              grantPoint();
              if (winningTeam !== servingTeam) {
                newServTeam = winningTeam;
                newServNum = 1;
              }
            }

            setTeam1Score(newT1);
            setTeam2Score(newT2);
            setServingTeam(newServTeam);
            setServerNumber(newServNum);
            const snapshot = {
              team1Score,
              team2Score,
              servingTeam,
              serverNumber,
              elapsedTime,
              t1Left: currentT1Left,
              t1Right: currentT1Right,
              t2Left: currentT2Left,
              t2Right: currentT2Right,
              serverPos: courtServerPos,
              receiverPos: courtReceiverPos,
              isSnapshot: true,
              courtRotation: courtRotation,
            };
            const newHist = [
              ...history,
              {
                id: Date.now(),
                type: evType,
                team: winningTeam,
                point:
                  evType === "T1_POINT"
                    ? newT1
                    : evType === "T2_POINT"
                    ? newT2
                    : null,
                snapshot,
              },
            ];
            setHistory(newHist);
            setIsTimelineLocked(true);
            setPreviewData(null);
            const switchPt = Math.ceil(playTo / 2);
            if (
              enableSwitchEnds &&
              !hasSwitchedEnds &&
              (newT1 === switchPt || newT2 === switchPt)
            ) {
              setShowSwitchModal(true);
              setHasSwitchedEnds(true);
            }
            checkWin(
              newT1,
              newT2,
              newServTeam,
              newServNum,
              newHist,
              isServeToScoreMode
            );
          };

          const handleEditSave = (id, newTitle) => {
            const updated = savedMatches.map((m) =>
              m.id === id ? { ...m, title: newTitle } : m
            );
            setSavedMatches(updated);
            localStorage.setItem(
              "pb_history_matches",
              JSON.stringify(updated)
            );
            setEditingMatchId(null);
          };

          const formatTime = (sec) => {
            const m = Math.floor(sec / 60)
              .toString()
              .padStart(2, "0");
            const s = (sec % 60).toString().padStart(2, "0");
            return `${m}:${s}`;
          };

          // --- GHOST COURT ENGINE ---
          const previewSnapshot =
            previewData && previewData.history[previewData.index]
              ? previewData.history[previewData.index].snapshot
              : null;

          const d_t1Score = previewSnapshot
            ? previewSnapshot.team1Score
            : team1Score;
          const d_t2Score = previewSnapshot
            ? previewSnapshot.team2Score
            : team2Score;
          const d_serveTeam = previewSnapshot
            ? previewSnapshot.servingTeam
            : servingTeam;
          const d_serveNum = previewSnapshot
            ? previewSnapshot.serverNumber
            : serverNumber;

          const d_t1Left = previewSnapshot
            ? previewSnapshot.t1Left
            : currentT1Left;
          const d_t1Right = previewSnapshot
            ? previewSnapshot.t1Right
            : currentT1Right;
          const d_t2Left = previewSnapshot
            ? previewSnapshot.t2Left
            : currentT2Left;
          const d_t2Right = previewSnapshot
            ? previewSnapshot.t2Right
            : currentT2Right;
          const d_srvPos = previewSnapshot
            ? previewSnapshot.serverPos
            : courtServerPos;
          const d_rcvPos = previewSnapshot
            ? previewSnapshot.receiverPos
            : courtReceiverPos;

          const isSuddenDeath =
            ruleSet === "14-point" && d_t1Score === 14 && d_t2Score === 14;
          const isServeToScoreModeUI =
            ruleSet === "standard" ||
            (ruleSet === "custom" && serveToWinAt14) ||
            (ruleSet === "14-point" &&
              serveToWinAt14 &&
              d_t1Score === 14 &&
              d_t2Score === 14);
          const showServerNumberUI =
            gameMode === "double" &&
            isServeToScoreModeUI &&
            !isSuddenDeath;

          const textMain = isDark ? "text-stone-100" : "text-stone-800";
          const textSub = isDark ? "text-stone-400" : "text-stone-500";
          const bgMain = isDark ? "bg-stone-900" : "bg-stone-50";
          const bgCard = isDark ? "bg-stone-800" : "bg-white";
          const borderSub = isDark ? "border-stone-700" : "border-stone-200";
          const accentRed = isDark ? "text-rose-400" : "text-rose-700";
          const accentGreen = isDark ? "text-emerald-400" : "text-emerald-700";
          const bgAccentRed = isDark
            ? "bg-rose-900/30 border-rose-700"
            : "bg-rose-50 border-rose-200";
          const bgAccentGreen = isDark
            ? "bg-emerald-900/30 border-emerald-700"
            : "bg-emerald-50 border-emerald-200";

          const totalMatchesCount = savedMatches.length;
          const t1WinsCount = savedMatches.filter((m) => m.winner === 1).length;
          const t2WinsCount = savedMatches.filter((m) => m.winner === 2).length;
          const t1WinPct = totalMatchesCount
            ? Math.round((t1WinsCount / totalMatchesCount) * 100)
            : 0;
          const t2WinPct = totalMatchesCount
            ? Math.round((t2WinsCount / totalMatchesCount) * 100)
            : 0;
          const totalT1Points = savedMatches.reduce(
            (acc, m) => acc + (m.t1Score || 0),
            0
          );
          const totalT2Points = savedMatches.reduce(
            (acc, m) => acc + (m.t2Score || 0),
            0
          );
          const maxPoints = Math.max(totalT1Points, totalT2Points);
          const t1PointHeight = maxPoints
            ? (totalT1Points / maxPoints) * 100
            : 0;
          const t2PointHeight = maxPoints
            ? (totalT2Points / maxPoints) * 100
            : 0;
          const singlesCount = savedMatches.filter(
            (m) => m.mode === "single"
          ).length;
          const doublesCount = savedMatches.filter(
            (m) => m.mode === "double"
          ).length;

          const renderPlayerBadge = (
            name,
            role,
            customRotation = courtRotation
          ) => {
            if (!name) return null;
            let bg =
              "bg-stone-500/20 text-stone-400 dark:text-stone-300 border border-stone-400/20";
            let scale = 1;
            let zIndex = 0;
            if (role === "server") {
              bg = "bg-amber-400 text-amber-950 shadow-lg ring-2 ring-white";
              scale = 1.1;
              zIndex = 10;
            } else if (role === "receiver") {
              bg =
                "bg-white text-emerald-800 shadow-md ring-2 ring-emerald-400/50";
              scale = 1.05;
              zIndex = 10;
            }
            return (
              <div
                className={`px-2 py-1 rounded shadow-sm max-w-[90%] truncate text-[8px] md:text-[9px] font-black tracking-wider uppercase transition-all duration-500 ease-in-out ${bg}`}
                style={{
                  transform: `rotate(${-customRotation}deg) scale(${scale})`,
                  zIndex,
                }}
              >
                {name}
              </div>
            );
          };

          const handleDotClick = (
            index,
            event,
            timelineData,
            matchObj,
            isLive
          ) => {
            if (!event.snapshot) {
              setShowLegacyAlert(true);
              return;
            }
            if (isLive && isTimelineLocked) return;
            setPreviewData({
              history: timelineData,
              index: index,
              match: matchObj,
            });
          };

          const renderTimeline = (
            timelineData,
            matchObj = null,
            useScrollRef = false,
            isLive = false
          ) => (
            <div className={`mt-6 muji-card p-5 rounded-xl`}>
              <div
                className={`text-[10px] font-bold uppercase tracking-widest mb-4 flex justify-between items-center ${textSub}`}
              >
                <span>{getT("timeline")}</span>
                {isLive && (
                  <button
                    onClick={() => {
                      setIsTimelineLocked(!isTimelineLocked);
                      if (!isTimelineLocked) setPreviewData(null);
                    }}
                    className={`flex items-center gap-1.5 px-3 py-1.5 rounded-md transition-colors shadow-sm font-black text-[10px] ${
                      isTimelineLocked
                        ? `text-stone-500 bg-stone-100 dark:bg-stone-800`
                        : `text-amber-900 bg-amber-400 animate-pulse`
                    }`}
                  >
                    {isTimelineLocked ? (
                      <Lock size={14} />
                    ) : (
                      <Unlock size={14} />
                    )}
                    {isTimelineLocked
                      ? getT("locked")
                      : getT("ghostReplay").toUpperCase()}
                  </button>
                )}
              </div>
              <div
                ref={useScrollRef ? timelineScrollRef : null}
                className="overflow-x-auto pb-4 pt-2 muji-scrollbar relative scroll-smooth"
              >
                {timelineData.length === 0 && (
                  <div className={`text-xs italic ${textSub} px-2`}>
                    {getT("awaiting")}
                  </div>
                )}
                {timelineData.length > 0 && (
                  <div className="flex min-w-max relative px-2">
                    <div
                      className={`absolute top-[12px] left-14 right-0 h-px ${
                        isDark ? "bg-stone-700" : "bg-stone-200"
                      } z-0`}
                    ></div>
                    <div
                      className={`absolute bottom-[12px] left-14 right-0 h-px ${
                        isDark ? "bg-stone-700" : "bg-stone-200"
                      } z-0`}
                    ></div>
                    <div
                      className={`w-12 flex flex-col gap-3 sticky left-0 z-20 ${bgCard} pr-2 ${
                        isDark
                          ? "shadow-[4px_0_8px_-4px_rgba(0,0,0,0.3)]"
                          : "shadow-[4px_0_8px_-4px_rgba(0,0,0,0.1)]"
                      }`}
                    >
                      <div
                        className={`h-6 flex items-center text-[10px] font-bold uppercase ${accentGreen}`}
                      >
                        {getT("t1Label")}
                      </div>
                      <div className="h-4"></div>
                      <div
                        className={`h-6 flex items-center text-[10px] font-bold uppercase ${accentRed}`}
                      >
                        {getT("t2Label")}
                      </div>
                    </div>
                    <div className="flex items-center">
                      {timelineData.map((event, index) => (
                        <div
                          key={event.id}
                          onClick={() =>
                            handleDotClick(
                              index,
                              event,
                              timelineData,
                              matchObj,
                              isLive
                            )
                          }
                          className={`flex flex-col items-center justify-center w-8 gap-3 relative z-10 transition-transform ${
                            (!isTimelineLocked && isLive) || !isLive
                              ? "cursor-pointer hover:scale-125 hover:-translate-y-2"
                              : ""
                          }`}
                        >
                          <div className="h-6 flex items-center justify-center w-full">
                            {event.type === "T1_POINT" ? (
                              <div
                                className={`w-5 h-5 rounded-full bg-emerald-500 ring-4 ${
                                  isDark ? "ring-[#292524]" : "ring-white"
                                } flex items-center justify-center text-[10px] font-bold text-white transition-transform hover:scale-110 cursor-default shadow-sm z-10`}
                              >
                                {event.point}
                              </div>
                            ) : event.type === "T1_TIMEOUT" ? (
                              <div
                                className={`w-4 h-4 rounded-[4px] bg-amber-500 ring-4 ${
                                  isDark ? "ring-[#292524]" : "ring-white"
                                } flex items-center justify-center text-[8px] font-black text-white cursor-default shadow-sm z-10`}
                                title="Timeout"
                              >
                                T
                              </div>
                            ) : (
                              <div
                                className={`w-1.5 h-1.5 rounded-full ${
                                  isDark ? "bg-stone-600" : "bg-stone-300"
                                } z-10`}
                              ></div>
                            )}
                          </div>
                          <div className="h-4 flex items-center justify-center w-full">
                            {(event.type === "SIDEOUT" ||
                              event.type === "FAULT") && (
                              <div
                                className={`w-4 h-4 rounded-sm rotate-45 border flex items-center justify-center shadow-sm z-10 ${
                                  event.team === 2
                                    ? isDark
                                      ? "bg-emerald-900/40 border-emerald-600"
                                      : "bg-emerald-100 border-emerald-300"
                                    : isDark
                                    ? "bg-rose-900/40 border-rose-600"
                                    : "bg-rose-100 border-rose-300"
                                }`}
                                title={event.type}
                              >
                                <span
                                  className={`text-[8px] font-black -rotate-45 ${
                                    event.team === 2
                                      ? isDark
                                        ? "text-emerald-400"
                                        : "text-emerald-700"
                                      : isDark
                                      ? "text-rose-400"
                                      : "text-rose-700"
                                  }`}
                                >
                                  {event.type === "FAULT" ? "F" : "S"}
                                </span>
                              </div>
                            )}
                          </div>
                          <div className="h-6 flex items-center justify-center w-full">
                            {event.type === "T2_POINT" ? (
                              <div
                                className={`w-5 h-5 rounded-full bg-rose-500 ring-4 ${
                                  isDark ? "ring-[#292524]" : "ring-white"
                                } flex items-center justify-center text-[10px] font-bold text-white transition-transform hover:scale-110 cursor-default shadow-sm z-10`}
                              >
                                {event.point}
                              </div>
                            ) : event.type === "T2_TIMEOUT" ? (
                              <div
                                className={`w-4 h-4 rounded-[4px] bg-amber-500 ring-4 ${
                                  isDark ? "ring-[#292524]" : "ring-white"
                                } flex items-center justify-center text-[8px] font-black text-white cursor-default shadow-sm z-10`}
                                title="Timeout"
                              >
                                T
                              </div>
                            ) : (
                              <div
                                className={`w-1.5 h-1.5 rounded-full ${
                                  isDark ? "bg-stone-600" : "bg-stone-300"
                                } z-10`}
                              ></div>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          );

          const handlePointerMove = (e) => {
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            document.documentElement.style.setProperty("--cursor-x", `${x}px`);
            document.documentElement.style.setProperty("--cursor-y", `${y}px`);
          };

          useEffect(() => {
            document.documentElement.style.setProperty("--cursor-x", "-1000px");
            document.documentElement.style.setProperty("--cursor-y", "-1000px");
            window.addEventListener("mousemove", handlePointerMove);
            window.addEventListener("touchmove", handlePointerMove, {
              passive: true,
            });
            return () => {
              window.removeEventListener("mousemove", handlePointerMove);
              window.removeEventListener("touchmove", handlePointerMove);
            };
          }, []);

          const showMenuButtons = appState === "menu" && closingScreen !== "menu";

          return (
            <div
              className={`min-h-screen w-full flex flex-col ${textMain} relative selection:bg-stone-300 selection:text-stone-900 transition-colors duration-300`}
              style={{ backgroundColor: "transparent" }}
            >
              <style>{`
                @keyframes zoomThroughMinimal { 0% { transform: scale(1) translateY(0); opacity: 1; } 100% { transform: scale(30) translateY(50px); opacity: 0; } }
                .animate-zoom-minimal { animation: zoomThroughMinimal 0.9s cubic-bezier(0.8, 0, 0.2, 1) forwards; }
                @keyframes subtle-bounce { 0%, 100% { transform: translateY(-2%); } 50% { transform: translateY(2%); } }
                .animate-subtle-bounce { animation: subtle-bounce 4s infinite ease-in-out; }
                .muji-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, ${
                  isDark ? "0.3" : "0.05"
                }); }
                .muji-card { background: ${
                  isDark ? "#292524" : "#ffffff"
                }; border: 1px solid ${
                isDark ? "#44403c" : "#e7e5e4"
              }; border-radius: 12px; }
                .bg-pattern-base { background-image: radial-gradient(var(--app-sub) 1.5px, transparent 0); background-size: 24px 24px; opacity: 0.15; }
                .bg-pattern-zoomed { background-image: radial-gradient(var(--app-sub) 2px, transparent 0); background-size: 24px 24px; opacity: 0.35; -webkit-mask-image: radial-gradient(circle 120px at var(--cursor-x) var(--cursor-y), black 10%, transparent 100%); mask-image: radial-gradient(circle 120px at var(--cursor-x) var(--cursor-y), black 10%, transparent 100%); }
                .muji-scrollbar::-webkit-scrollbar { height: 8px; }
                .muji-scrollbar::-webkit-scrollbar-track { background: ${
                  isDark ? "#292524" : "#f5f5f4"
                }; border-radius: 8px; }
                .muji-scrollbar::-webkit-scrollbar-thumb { background-color: ${
                  isDark ? "#57534e" : "#d6d3d1"
                }; border-radius: 8px; border: 2px solid ${
                isDark ? "#292524" : "#f5f5f4"
              }; }
                .muji-scrollbar::-webkit-scrollbar-thumb:hover { background-color: ${
                  isDark ? "#78716c" : "#a8a29e"
                }; }
                .muji-scrollbar { scrollbar-width: thin; scrollbar-color: ${
                  isDark ? "#57534e #292524" : "#d6d3d1 #f5f5f4"
                }; }
              `}</style>

              <div
                className="fixed top-0 left-0 w-full z-40 pointer-events-none transition-colors duration-300"
                style={{
                  height: "env(safe-area-inset-top)",
                  backgroundColor: "var(--app-bg)",
                }}
              ></div>
              <div className="fixed inset-0 pointer-events-none z-0 bg-pattern-base transition-colors duration-300"></div>
              <div className="fixed inset-0 pointer-events-none z-0 bg-pattern-zoomed transition-colors duration-300"></div>

              {appState !== "splash" && (
                <div
                  className="fixed top-0 w-full flex justify-between items-start z-50 pointer-events-none"
                  style={{
                    paddingTop: "max(1rem, env(safe-area-inset-top))",
                    paddingLeft: "max(1rem, env(safe-area-inset-left))",
                    paddingRight: "max(1rem, env(safe-area-inset-right))",
                  }}
                >
                  <div className="pointer-events-auto">
                    {appState === "game" && (
                      <div
                        className={`flex items-center gap-2 px-3 py-1.5 rounded-full ${bgCard} ${borderSub} border shadow-sm text-xs font-bold ${textSub}`}
                      >
                        <Timer size={14} /> {formatTime(elapsedTime)}
                      </div>
                    )}
                  </div>
                  <div className={`flex items-center gap-2 pointer-events-auto`}>
                    <button
                      onClick={handleSoundClick}
                      className={`p-2 rounded-full ${bgCard} ${borderSub} border shadow-sm hover:scale-105 active:scale-95 transition-transform relative z-10`}
                    >
                      {soundEnabled ? (
                        <Volume2 size={18} className={accentGreen} />
                      ) : (
                        <VolumeX size={18} className={textSub} />
                      )}
                    </button>
                    <div
                      className={`flex items-center overflow-hidden transition-all duration-500 ease-[cubic-bezier(0.2,1,0.4,1)] ${
                        showMenuButtons
                          ? "max-w-[200px] opacity-100"
                          : "max-w-0 opacity-0 -ml-2 pointer-events-none"
                      }`}
                    >
                      <div
                        className={`flex items-center gap-2 min-w-max transition-transform duration-500 ease-[cubic-bezier(0.2,1,0.4,1)] ${
                          showMenuButtons
                            ? "translate-x-0 scale-100"
                            : "translate-x-4 scale-95"
                        }`}
                      >
                        <button
                          onClick={() => openScreenFromMenu("stats")}
                          className={`p-2 rounded-full ${bgCard} ${borderSub} border shadow-sm hover:scale-105 active:scale-95 transition-all`}
                        >
                          <BarChart2 size={18} className={textSub} />
                        </button>
                        <button
                          onClick={() => openScreenFromMenu("history")}
                          className={`flex items-center gap-1.5 px-3 py-2 rounded-full ${bgCard} ${borderSub} border shadow-sm hover:scale-105 active:scale-95 transition-all text-xs font-bold ${textSub}`}
                        >
                          <HistoryIcon size={16} />{" "}
                          <span className="hidden sm:inline">History</span>
                        </button>
                      </div>
                    </div>
                    <button
                      onClick={() => setShowLangMenu(true)}
                      className={`p-2 rounded-full ${bgCard} ${borderSub} border shadow-sm hover:scale-105 active:scale-95 transition-transform relative z-10`}
                    >
                      <Globe size={18} className={textSub} />
                    </button>
                    <button
                      onClick={toggleTheme}
                      className={`p-2 rounded-full ${bgCard} ${borderSub} border shadow-sm hover:scale-105 active:scale-95 transition-transform relative z-10`}
                    >
                      {isDark ? (
                        <Sun size={18} className="text-amber-400" />
                      ) : (
                        <Moon size={18} className="text-stone-500" />
                      )}
                    </button>
                    <button
                      onClick={() => setShowInfo(true)}
                      className={`p-2 rounded-full ${bgCard} ${borderSub} border shadow-sm hover:scale-105 active:scale-95 transition-transform`}
                    >
                      <InfoIcon size={18} className={textSub} />
                    </button>
                  </div>
                </div>
              )}

              {recoverGameData && appState !== "splash" && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 animate-screen-enter">
                  <div
                    className="absolute inset-0 bg-black/40 backdrop-blur-sm"
                    style={{ touchAction: "none" }}
                    onClick={() => setRecoverGameData(null)}
                  ></div>
                  <div
                    className={`relative w-full max-w-sm flex flex-col ${bgCard} border ${borderSub} rounded-2xl shadow-2xl max-h-[90vh] overflow-hidden`}
                  >
                    <div className="p-6 pb-4 flex-shrink-0 border-b border-stone-100 dark:border-stone-800/50">
                      <RotateCcw
                        size={48}
                        className="mx-auto text-emerald-500 mb-4"
                      />
                      <h2
                        className={`text-xl font-bold mb-2 text-center ${textMain}`}
                      >
                        {getT("resumeMatch")}
                      </h2>
                    </div>
                    <div className="px-6 py-4 overflow-y-auto muji-scrollbar flex-1 text-center overscroll-contain">
                      <p className={`text-sm mb-2 ${textSub}`}>
                        {getT("resumeDesc")}
                      </p>
                    </div>
                    <div className="p-6 pt-4 flex-shrink-0 border-t border-stone-100 dark:border-stone-800/50">
                      <div className="flex gap-3">
                        <button
                          onClick={() => {
                            localStorage.removeItem("pb_active_game");
                            setRecoverGameData(null);
                          }}
                          className={`flex-1 py-3 rounded-xl font-semibold border ${borderSub} ${textSub} hover:${textMain}`}
                        >
                          {getT("cancel")}
                        </button>
                        <button
                          onClick={() => resumeGame(recoverGameData)}
                          className={`flex-1 py-3 rounded-xl font-bold text-white bg-emerald-500 hover:bg-emerald-600 shadow-md`}
                        >
                          {getT("resumeMatch")}
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {appState === "splash" && (
                <div
                  className={`absolute inset-0 flex flex-col items-center justify-center cursor-pointer z-50`}
                  onClick={() => {
                    setZoomActive(true);
                    setTimeout(() => {
                      setAppState("menu");
                      setZoomActive(false);
                    }, 900);
                  }}
                >
                  <div
                    className="text-center z-10 transition-opacity duration-300 mb-12"
                    style={{ opacity: zoomActive ? 0 : 1 }}
                  >
                    <h1
                      className={`text-5xl md:text-6xl font-bold tracking-tight ${textMain}`}
                    >
                      {getT("appTitle")}
                    </h1>
                    <p
                      className={`text-2xl md:text-3xl mt-2 tracking-widest uppercase font-medium ${accentGreen}`}
                    >
                      {getT("appSub")}
                    </p>
                    <p
                      className={`mt-10 text-lg md:text-xl font-medium uppercase tracking-widest ${textSub} animate-pulse`}
                    >
                      {getT("tapToStart")}
                    </p>
                  </div>
                  <div
                    className={`relative w-40 h-40 md:w-48 md:h-48 ${
                      zoomActive
                        ? "animate-zoom-minimal"
                        : "animate-subtle-bounce"
                    }`}
                  >
                    <svg
                      viewBox="0 0 100 100"
                      className="w-full h-full drop-shadow-xl transition-transform duration-300 hover:scale-110"
                    >
                      <circle
                        cx="50"
                        cy="50"
                        r="48"
                        fill={isDark ? "#4ade80" : "#86efac"}
                      />
                      <circle
                        cx="50"
                        cy="50"
                        r="48"
                        fill="url(#ballGradient)"
                        opacity="0.6"
                      />
                      {[
                        [30, 30],
                        [50, 20],
                        [70, 30],
                        [20, 50],
                        [40, 45],
                        [60, 45],
                        [80, 50],
                        [30, 70],
                        [50, 80],
                        [70, 70],
                      ].map(([cx, cy], i) => (
                        <circle
                          key={i}
                          cx={cx}
                          cy={cy}
                          r="5"
                          fill={isDark ? "#064e3b" : "#14532d"}
                          opacity="0.8"
                        />
                      ))}
                      <defs>
                        <radialGradient
                          id="ballGradient"
                          cx="30%"
                          cy="30%"
                          r="70%"
                        >
                          <stop
                            offset="0%"
                            stopColor="#ffffff"
                            stopOpacity="0.8"
                          />
                          <stop
                            offset="100%"
                            stopColor="#000000"
                            stopOpacity="0.3"
                          />
                        </radialGradient>
                      </defs>
                    </svg>
                  </div>
                </div>
              )}

              {appState === "menu" &&
                closingScreen !== "stats" &&
                closingScreen !== "history" && (
                  <div
                    className={`flex-1 flex flex-col relative z-10 pb-12 w-full max-w-4xl mx-auto ${
                      closingScreen === "menu"
                        ? "animate-screen-exit"
                        : "animate-screen-enter"
                    }`}
                    style={{
                      paddingTop: "max(6rem, calc(4rem + env(safe-area-inset-top)))",
                      paddingLeft: "max(1.5rem, env(safe-area-inset-left))",

                    <p className={`text-sm mb-6 ${textSub}`}>

                      </button>
                      <button
                        onClick={handleResetPointsOnly}

                      >
                        {getT("resetPoints")}
                      </button>
                      <button
                        onClick={() => setShowResetModal(false)}
                        className={`w-full py-3 mt-2 rounded-xl font-semibold border ${borderSub} ${textSub} hover:${textMain} transition-colors`}

                      </button>
                    </div>

                    </div>
                    <h2 className={`text-lg font-bold mb-2 ${textMain}`}>
                      {getT("callTimeout")}
                    </h2>
                    <p className={`text-sm mb-6 ${textSub}`}>

                    </p>
                    <div className="flex gap-3">
                      <button
                        onClick={() => setShowTimeoutConfirm(null)}

                        {getT("cancel")}
                      </button>
                      <button

                      className="mx-auto text-amber-500 mb-4"

                    <h2

                            t2Name,
                            winner,
                            winReason,
                            elapsedTime,
                            history,
                          })

                  ></div>

                    className={`relative w-full max-w-sm p-6 ${bgCard} border ${borderSub} rounded-2xl shadow-2xl text-center`}
                  >
                    <AlertTriangle
                      size={48}
                      className="mx-auto text-amber-500 mb-4"
                    />
                    <h2 className={`text-lg font-bold mb-2 ${textMain}`}>
                      {getT("quitMatch")}
                    </h2>
                    <p className={`text-sm mb-6 ${textSub}`}>
                      {getT("quitConfirm")}
                    </p>
                    <div className="flex gap-3">
                      <button
                        onClick={() => setShowBackConfirm(false)}
                        className={`flex-1 py-3 rounded-xl font-semibold border ${borderSub} ${textSub} hover:${textMain}`}
                      >
                        {getT("cancel")}
                      </button>
                      <button
                        onClick={() => {
                          setShowBackConfirm(false);
                          setAppState("menu");

                        {getT("yesQuit")}
                      </button>
                    </div>
                  </div>
                </div>
              )}

                <div className="fixed inset-0 z-[120] flex items-center justify-center p-4">

                    onClick={() => setShowInstallInstructions(false)}
                  ></div>
                  <div
                    className={`relative w-full max-w-sm p-6 ${bgCard} border ${borderSub} rounded-2xl shadow-2xl text-center`}
                  >
                    <Download
                      size={48}
                      className="mx-auto text-emerald-500 mb-4"
                    />
                    <h2 className={`text-lg font-bold mb-2 ${textMain}`}>
                      {getT("installAsApp")}
                    </h2>
                    <p className={`text-sm mb-6 ${textSub}`}>
                      {/iphone|ipad|ipod/.test(
                        navigator.userAgent.toLowerCase()
                      )

                        : getT("installStepsAndroid")}

                    <button
                      onClick={() => setShowInstallInstructions(false)}
                      className={`w-full py-3 rounded-xl font-bold text-white bg-emerald-500 hover:bg-emerald-600 shadow-md`}
                    >
                      {getT("gotIt")}
                    </button>
                  </div>
                </div>
              )}

              {showShareAppModal && (
                <div className="fixed inset-0 z-[120] flex items-center justify-center p-4">
