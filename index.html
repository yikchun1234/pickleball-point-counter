                    const ctxAndroid = canvasAndroid.getContext('2d');
                    ctxAndroid.fillStyle = '#ffffff'; 
                    ctxAndroid.fillRect(0, 0, 512, 512);
                    const scaleAndroid = 0.65; 
                    const sizeAndroid = 512 * scaleAndroid;
                    const offsetAndroid = (512 - sizeAndroid) / 2;

                    const canvasIOS = document.createElement('canvas');
                    canvasIOS.width = 512; canvasIOS.height = 512;

        const GameReaction = ({ onBack }) => {
            const [state, setState] = useState('waiting');
            const [time, setTime] = useState(0);
            const timerRef = useRef(null);
            const startRef = useRef(null);

            const start = () => {
                setState('waiting');
                clearTimeout(timerRef.current);
                timerRef.current = setTimeout(() => {
                    setState('ready');
                    startRef.current = Date.now();
                }, 2000 + Math.random() * 3000);
            };

            const handleClick = () => {
                if (state === 'waiting') { clearTimeout(timerRef.current); setState('early'); }
                else if (state === 'ready') { setTime(Date.now() - startRef.current); setState('result'); }
                else start();
            };
            useEffect(() => { start(); return () => clearTimeout(timerRef.current); }, []);

            return (
                <div className="flex flex-col items-center justify-center h-full">
                    <div onClick={handleClick} className={`w-full max-w-md h-64 flex items-center justify-center rounded-2xl cursor-pointer text-2xl font-black transition-colors select-none shadow-2xl ${state === 'waiting' ? 'bg-rose-500 text-white' : state === 'ready' ? 'bg-emerald-500 text-white' : state === 'early' ? 'bg-stone-700 text-stone-300' : 'bg-blue-500 text-white'}`}>

            let winner = null;
            for (let i=0; i<lines.length; i++) {
                const [a,b,c] = lines[i];
                if (board[a] && board[a] === board[b] && board[a] === board[c]) winner = board[a];
            }
            const isDraw = !winner && !board.includes(null);

            const handleClick = (i) => {

                const newBoard = [...board];

                setBoard(newBoard); setXIsNext(!xIsNext);

          const pressTimer = useRef(null);
          const scrollInterval = useRef(null);
          
          const handleItemPointerDown = (index, e) => {
            if (e.target.closest('button')) return;
            const clientX = e.clientX || (e.touches && e.touches[0].clientX) || 0;
            const clientY = e.clientY || (e.touches && e.touches[0].clientY) || 0;
            
            // Calculate exact offset and width to prevent jumping
            const rect = e.currentTarget.getBoundingClientRect();
            setDragOffset({
              x: clientX - rect.left,
              y: clientY - rect.top,
              width: rect.width
            });
            
            setDragPos({ x: clientX, y: clientY });
          
            pressTimer.current = setTimeout(() => {
              setDragIndex(index);
              setHoverIndex(index);

            }, 500);

            // 1. CRITICAL: Prevent native scroll exclusively during drag

              if (dragIndex !== null) e.preventDefault();
            };
          
            const handleMove = (e) => {
              if (dragIndex === null) {
                clearTimeout(pressTimer.current);
                return;
              }
          
              const clientX = e.clientX || (e.touches && e.touches.length > 0 ? e.touches[0].clientX : 0);
              const clientY = e.clientY || (e.touches && e.touches.length > 0 ? e.touches[0].clientY : 0);

              // 2. Custom Auto-scroll logic

              if (scrollContainer) {
                const rect = scrollContainer.getBoundingClientRect();
                const scrollSpeed = 8;
                clearInterval(scrollInterval.current);
          
                if (clientY < rect.top + 50) {
                  scrollInterval.current = setInterval(() => { scrollContainer.scrollTop -= scrollSpeed; }, 20);
                } else if (clientY > rect.bottom - 50) {
                  scrollInterval.current = setInterval(() => { scrollContainer.scrollTop += scrollSpeed; }, 20);
                }
              }
          
              // 3. Detect element under finger
              const el = document.elementFromPoint(clientX, clientY);
              const listEl = el ? el.closest('[data-idx]') : null;
              if (listEl && listEl.dataset.idx !== undefined) {
                setHoverIndex(parseInt(listEl.dataset.idx));
              }
            };
          
            const handleUp = () => {
              clearTimeout(pressTimer.current);

                        </p>
                        <div className="flex gap-3">
                            <button onClick={() => setMatchToDelete(null)} className={`flex-1 py-3 rounded-xl font-semibold border ${borderSub} ${textSub} hover:${textMain}`}>
                                {getT('cancel')}
                            </button>
                            <button onClick={deleteSingleMatch} className={`flex-1 py-3 rounded-xl font-bold text-white bg-rose-500 hover:bg-rose-600 shadow-md`}>
                                {getT('deleteBtn')}
                            </button>
                        </div>
                    </div>
                </div>
            )}

              {isExporting && (
                  <div className="fixed inset-0 z-[999] flex flex-col items-center justify-center bg-black/70 backdrop-blur-md text-white animate-screen-enter">
                      <div className="w-16 h-16 border-8 border-emerald-500 border-t-transparent rounded-full animate-spin mb-6"></div>
                      <h2 className="text-xl font-bold tracking-widest uppercase animate-pulse">{getT('generatingImage')}...</h2>
                  </div>
              )}
              
              {showLegacyAlert && (
                <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" style={{touchAction: 'none'}} onClick={() => setShowLegacyAlert(false)}></div>
                  <div className={`relative w-full max-w-sm p-6 ${bgCard} border ${borderSub} rounded-2xl shadow-2xl text-center animate-screen-enter`}>
                    <div className="absolute top-4 right-4"><button onClick={() => setShowLegacyAlert(false)} className={`p-1.5 rounded-full bg-stone-100 dark:bg-stone-800 ${textSub} hover:${textMain} transition-colors`}><X size={16}/></button></div>
                    <HistoryIcon size={48} className="mx-auto text-amber-500 mb-4 opacity-80" />
                    <h2 className={`text-lg font-bold mb-2 ${textMain}`}>{getT('ghostUnavailable')}</h2>
                    <p className={`text-sm mb-6 ${textSub}`}>{getT('ghostNoData')}</p>
                    <button onClick={() => setShowLegacyAlert(false)} className={`w-full py-3 rounded-xl font-bold text-white bg-amber-500 hover:bg-amber-600 shadow-md transition-colors`}>{getT('gotIt')}</button>
                  </div>
                </div>
              )}

              {showZeroPointAlert && (
                <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" style={{touchAction: 'none'}} onClick={() => setShowZeroPointAlert(false)}></div>
                  <div className={`relative w-full max-w-sm p-6 ${bgCard} border ${borderSub} rounded-2xl shadow-2xl text-center animate-screen-enter`}>
                    <div className="absolute top-4 right-4"><button onClick={() => setShowZeroPointAlert(false)} className={`p-1.5 rounded-full bg-stone-100 dark:bg-stone-800 ${textSub} hover:${textMain} transition-colors`}><X size={16}/></button></div>
                    <HistoryIcon size={48} className="mx-auto text-amber-500 mb-4 opacity-80" />
                    <h2 className={`text-lg font-bold mb-2 ${textMain}`}>{getT('invalidPointsTitle')}</h2>
                    <p className={`text-sm mb-6 ${textSub}`}>{getT('invalidPointsMsg')}</p>
                    <button onClick={() => setShowZeroPointAlert(false)} className={`w-full py-3 rounded-xl font-bold text-white bg-amber-500 hover:bg-amber-600 shadow-md transition-colors`}>{getT('gotIt')}</button>
                  </div>
                </div>
              )}

              {showHighPointWarning && (
                <div className="fixed inset-0 z-[120] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" style={{touchAction: 'none'}} onClick={() => setShowHighPointWarning(false)}></div>
                  <div className={`relative w-full max-w-sm p-6 ${bgCard} border ${borderSub} rounded-2xl shadow-2xl text-center`}>
                    <AlertTriangle size={48} className="mx-auto text-amber-500 mb-4" />
                    <h2 className={`text-lg font-bold mb-2 ${textMain}`}>{getT('highPointTitle')}</h2>
                    <p className={`text-sm mb-6 ${textSub}`}>{getT('highPointMsg')}</p>
                    <div className="flex gap-3">
                      <button onClick={() => setShowHighPointWarning(false)} className={`flex-1 py-3 rounded-xl font-semibold border ${borderSub} ${textSub} hover:${textMain}`}>{getT('cancel')}</button>
                      <button onClick={confirmStartGame} className={`flex-1 py-3 rounded-xl font-bold text-white bg-rose-500 hover:bg-rose-600 shadow-md`}>{getT('continueBtn')}</button>
                    </div>
                  </div>
                </div>
              )}

              {previewData && (
                <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4" style={{ touchAction: 'none' }}>
                  <div className="absolute inset-0 bg-black/70 backdrop-blur-sm transition-opacity" onClick={() => setPreviewData(null)}></div>
                  <div className={`relative p-6 md:p-8 ${bgCard} border ${borderSub} rounded-3xl shadow-2xl flex flex-col items-center w-full max-w-sm mx-auto z-10 animate-screen-enter`}>
                      <div className="flex justify-between items-center w-full mb-6">
                          <h3 className={`text-lg font-bold tracking-widest uppercase ${textMain}`}>{getT('ghostReplay')}</h3>
                          <button onClick={() => setPreviewData(null)} className={`p-1.5 rounded-full bg-stone-100 dark:bg-stone-800 ${textSub} hover:bg-stone-200 dark:hover:bg-stone-700 transition-colors`}><X size={16}/></button>
                      </div>
                      
                      {(() => {
                          const m = previewData.match || {};
                          const snap = previewData.history[previewData.index].snapshot;
                          if (!snap) return null;
                          
                          // Dynamically detect the rules for the replay
                          const replayMode = m.mode || gameMode;
                          const replayRules = m.rules || ruleSet;
                          const isGhostSuddenDeath = replayRules === '14-point' && snap.team1Score === 14 && snap.team2Score === 14;
                          const isGhostServeToScore = replayRules === 'standard' || (replayRules === 'custom' && serveToWinAt14) || (isGhostSuddenDeath && serveToWinAt14);
                          const showGhostServerNum = replayMode === 'double' && isGhostServeToScore && !isGhostSuddenDeath;
                          
                          const isSingle = replayMode === 'single';
                          const p_t1Left = m.t1PLeft || m.t1Name || t1Name;
                          const p_t1Right = m.t1PRight || '';
                          const p_t2Left = m.t2PLeft || m.t2Name || t2Name;
                          const p_t2Right = m.t2PRight || '';
                          const histRotation = 180; 

                          return (
                              <>
                                  <div className="flex items-center justify-center gap-6 mb-8 w-full">
                                      <div className="text-center flex-1">
                                          <span className={`text-[10px] font-bold ${textSub} block uppercase tracking-widest mb-1`}>{snap.servingTeam === 1 ? getT('serverRole') : getT('receiverRole')}</span>
                                          <span className={`text-5xl font-black ${snap.servingTeam === 1 ? accentGreen : textMain}`}>{snap.team1Score}</span>
                                      </div>
                                      
                                      {!showGhostServerNum ? (
                                          <span className={`text-3xl font-light text-stone-300 dark:text-stone-700 px-2`}>-</span>
                                      ) : (
                                          <div className="flex flex-col items-center justify-center px-2">
                                              <span className={`text-[9px] font-bold uppercase tracking-widest ${textSub} mb-1`}>{getT('serveLabel')}</span>
                                              <span className="text-3xl font-black text-amber-500 leading-none">{snap.serverNumber}</span>
                                          </div>
                                      )}

                                      <div className="text-center flex-1">
                                          <span className={`text-[10px] font-bold ${textSub} block uppercase tracking-widest mb-1`}>{snap.servingTeam === 2 ? getT('serverRole') : getT('receiverRole')}</span>
                                          <span className={`text-5xl font-black ${snap.servingTeam === 2 ? accentRed : textMain}`}>{snap.team2Score}</span>
                                      </div>
                                  </div>
                                  
                                  <div className="relative flex items-center justify-center w-[220px] h-[280px]">
                                      <div className={`w-[180px] h-[240px] bg-amber-600 border-amber-300 rounded-[3px] border-[3px] shadow-lg relative flex flex-col overflow-hidden pointer-events-none transition-all duration-500 ease-in-out`} style={{ transform: `rotate(${histRotation}deg)` }}>
                                          <svg className="absolute inset-0 w-full h-full pointer-events-none z-10">
                                              <defs>
                                                  <marker id="arrowHistory" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                                                      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(255,255,255,0.8)" />
                                                  </marker>
                                              </defs>
                                              {snap.serverPos === 'bottom-right' ? ( <line x1="75%" y1="85%" x2="25%" y2="15%" stroke="rgba(255,255,255,0.4)" strokeWidth="2" strokeDasharray="4 4" markerEnd="url(#arrowHistory)" /> ) : 
                                               snap.serverPos === 'top-left' ? ( <line x1="25%" y1="15%" x2="75%" y2="85%" stroke="rgba(255,255,255,0.4)" strokeWidth="2" strokeDasharray="4 4" markerEnd="url(#arrowHistory)" /> ) : 
                                               snap.serverPos === 'bottom-left' ? ( <line x1="25%" y1="85%" x2="75%" y2="15%" stroke="rgba(255,255,255,0.4)" strokeWidth="2" strokeDasharray="4 4" markerEnd="url(#arrowHistory)" /> ) : 
                                               ( <line x1="75%" y1="15%" x2="25%" y2="85%" stroke="rgba(255,255,255,0.4)" strokeWidth="2" strokeDasharray="4 4" markerEnd="url(#arrowHistory)" /> )}
                                          </svg>
                                          <div className="flex-1 relative border-b border-white/50 z-20">
                                              <div className="absolute inset-y-0 left-1/2 w-[1.5px] bg-white/60 -translate-x-1/2"></div>
                                              <div className="absolute top-1 left-0 w-1/2 flex justify-center items-center h-full">{(!isSingle || snap.serverPos === 'top-left' || snap.receiverPos === 'top-left') && renderPlayerBadge(isSingle ? p_t2Left : snap.t2Right, snap.serverPos === 'top-left' ? 'server' : snap.receiverPos === 'top-left' ? 'receiver' : 'partner', histRotation)}</div>
                                              <div className="absolute top-1 right-0 w-1/2 flex justify-center items-center h-full">{(!isSingle || snap.serverPos === 'top-right' || snap.receiverPos === 'top-right') && renderPlayerBadge(isSingle ? p_t2Left : snap.t2Left, snap.serverPos === 'top-right' ? 'server' : snap.receiverPos === 'top-right' ? 'receiver' : 'partner', histRotation)}</div>
                                          </div>
                                          <div className={`h-6 md:h-8 border-b-2 border-white/80 bg-amber-500 z-20`}></div>
                                          <div className={`h-6 md:h-8 border-b border-white/50 bg-amber-500 z-20`}></div>
                                          <div className="flex-1 relative z-20">
                                              <div className="absolute inset-y-0 left-1/2 w-[1.5px] bg-white/60 -translate-x-1/2"></div>
                                              <div className="absolute bottom-1 left-0 w-1/2 flex justify-center items-center h-full">{(!isSingle || snap.serverPos === 'bottom-left' || snap.receiverPos === 'bottom-left') && renderPlayerBadge(isSingle ? p_t1Left : snap.t1Left, snap.serverPos === 'bottom-left' ? 'server' : snap.receiverPos === 'bottom-left' ? 'receiver' : 'partner', histRotation)}</div>
                                              <div className="absolute bottom-1 right-0 w-1/2 flex justify-center items-center h-full">{(!isSingle || snap.serverPos === 'bottom-right' || snap.receiverPos === 'bottom-right') && renderPlayerBadge(isSingle ? p_t1Left : snap.t1Right, snap.serverPos === 'bottom-right' ? 'server' : snap.receiverPos === 'bottom-right' ? 'receiver' : 'partner', histRotation)}</div>
                                          </div>
                                      </div>
                                  </div>

                                  <div className="flex justify-between items-center w-full mt-6 pt-2">
                                      <button onClick={(e) => { e.stopPropagation(); setPreviewData(prev => ({...prev, index: prev.index - 1})); }} disabled={previewData.index === 0} className={`px-4 py-2 rounded-xl font-bold text-xs transition-colors ${previewData.index === 0 ? 'opacity-30 cursor-not-allowed bg-stone-200 dark:bg-stone-800 text-stone-400' : 'bg-amber-100 text-amber-800 hover:bg-amber-200 dark:bg-amber-900/50 dark:text-amber-400 dark:hover:bg-amber-800'}`}>&larr; {getT('prev')}</button>
                                      <span className="text-[10px] font-bold uppercase tracking-widest text-amber-600 dark:text-amber-500">{getT('point')} {previewData.index + 1} / {previewData.history.length}</span>
                                      <button onClick={(e) => { e.stopPropagation(); setPreviewData(prev => ({...prev, index: prev.index + 1})); }} disabled={previewData.index === previewData.history.length - 1} className={`px-4 py-2 rounded-xl font-bold text-xs transition-colors ${previewData.index === previewData.history.length - 1 ? 'opacity-30 cursor-not-allowed bg-stone-200 dark:bg-stone-800 text-stone-400' : 'bg-amber-100 text-amber-800 hover:bg-amber-200 dark:bg-amber-900/50 dark:text-amber-400 dark:hover:bg-amber-800'}`}>{getT('next')} &rarr;</button>
                                  </div>
                              </>
                          );
                      })()}
                  </div>
                </div>
              )}
                
              {showMemberModal && (
                <div className="fixed inset-0 z-[110] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={() => setShowMemberModal(false)}></div>
                  <div className={`relative w-full max-w-md flex flex-col ${bgCard} border ${borderSub} rounded-2xl shadow-2xl max-h-[85vh] overflow-hidden animate-screen-enter`}>
                    {/* Header */}
                    <div className="px-5 py-4 flex-shrink-0 border-b border-stone-100 dark:border-stone-800/50 flex justify-between items-center bg-stone-50/50 dark:bg-stone-900/50">
                      <h2 className={`text-lg font-bold ${textMain}`}>
                        {playerSelectTarget
                          ? getT("selectFromList")
                          : editMemberId
                          ? getT("editMember")
                          : getT("addMember")}
                      </h2>
                      <button onClick={() => setShowMemberModal(false)} className={`p-1.5 rounded-full ${textSub} hover:${textMain} bg-stone-100 dark:bg-stone-800 transition-colors`}>
                        <X size={18} />
                      </button>
                    </div>
        
                    {/* Body */}
                    <div className="px-5 py-4 overflow-y-auto muji-scrollbar flex-1 overscroll-contain flex flex-col gap-6">
                      {playerSelectTarget ? (
                        // --- SELECT MODE ---
                        <div className="flex flex-col gap-2">
                          <div className={`text-xs font-semibold ${textSub} mb-2`}>
                            {getT("currentlySelected")}{" "}
                            <span className={textMain}>
                              {Array.from(getSelectedPlayers()).join(", ") ||
                                getT("none")}
                            </span>
                          </div>
                          {savedMembers.length === 0 && (
                            <span className={`text-xs italic ${textSub}`}>
                              {getT("noSaved")}
                            </span>
                          )}
                          <div className="space-y-2.5">
                            {savedMembers
                              .filter((m) => !getSelectedPlayers().has(m.name))
                              .map((m) => (
                                <button key={m.hexId} onClick={() => handlePlayerSelect(m)} className={`w-full text-left px-4 py-3 rounded-xl border ${borderSub} ${bgMain} ${textMain} hover:border-emerald-500/50 hover:bg-emerald-50 dark:hover:bg-emerald-900/20 transition-all active:scale-[0.99] flex items-center justify-between shadow-sm`}>
                                  <span className="text-sm font-bold">
                                    {m.name}
                                  </span>
                                  <ChevronRight size={18} className={textSub} />
                                </button>
                              ))}
                          </div>
                        </div>
                      ) : (
                        // --- MANAGE MODE ---
                        <>
                          {/* 1. Compact Input Area */}
                          <div className="flex flex-col gap-1.5">
                            <label className={`block text-[10px] font-bold uppercase tracking-widest ${textSub}`}>
                              {getT("playerName")}
                            </label>
                            <div className="flex gap-2">
                              <input type="text"
                                value={memberFormName}
                                onChange={(e) =>
                                  setMemberFormName(e.target.value)
                                }
                                onKeyDown={(e) => {
                                  if (
                                    e.key === "Enter" &&
                                    memberFormName.trim()
                                  )
                                    saveOrUpdateMember();
                                }}
                                placeholder={getT("typeName")}
                                className={`flex-1 px-4 py-2.5 rounded-xl border ${borderSub} ${bgMain} ${textMain} text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-emerald-500/50 transition-shadow`}
                              />
                              <button
                                onClick={saveOrUpdateMember}
                                disabled={!memberFormName.trim()}
                                className={`px-4 py-2.5 rounded-xl font-bold text-white transition-all shadow-md ${
                                  memberFormName.trim()
                                    ? "bg-emerald-500 hover:bg-emerald-600 active:scale-95"
                                    : "bg-stone-300 dark:bg-stone-700 cursor-not-allowed opacity-70"
                                }`}
                              >
                                {editMemberId ? getT("saveBtn") : getT("addBtn")}
                              </button>
                            </div>
                          </div>
        
                          {/* 2. Compact List Area */}
                          <div className="flex flex-col gap-1.5 flex-1 min-h-[250px]">
                            <label className={`block text-[10px] font-bold uppercase tracking-widest ${textSub}`}>
                              {getT("savedPlayers")}
                            </label>
                            <div
                              id="player-list-scroll"
                              className={`flex flex-col gap-2 overflow-y-auto max-h-[45vh] p-1 -m-1 muji-scrollbar ${
                                dragIndex !== null ? "touch-none" : ""
                              }`}
                            >
                              {savedMembers.length === 0 && (
                                <span
                                  className={`text-xs italic ${textSub} py-2`}
                                >
                                  {getT("noSaved")}
                                </span>
                              )}
        
                              {savedMembers.map((m, idx) => (
                                <div
                                  key={m.hexId}
                                  data-idx={idx}
                                  onPointerDown={(e) =>
                                    handleItemPointerDown(idx, e)
                                  }
                                  className={`flex items-center gap-2 p-2 rounded-xl border transition-all select-none bg-stone-50 dark:bg-stone-800/50 ${
                                    dragIndex === idx
                                      ? "opacity-40 scale-[0.98] pointer-events-none shadow-inner border-stone-500 bg-stone-200 dark:bg-stone-700 grayscale"
                                      : hoverIndex === idx && dragIndex !== null
                                      ? "border-emerald-500 bg-emerald-50 dark:bg-emerald-900/20 scale-[1.02] z-10 shadow-md translate-y-[-2px]"
                                      : `border-stone-200 dark:border-stone-700 cursor-grab active:cursor-grabbing hover:border-stone-300 dark:hover:border-stone-600`
                                  }`}
                                >
                                  <div
                                    className={`p-1.5 rounded-lg transition-colors ${
                                      dragIndex === idx || hoverIndex === idx
                                        ? "bg-emerald-500 text-white"
                                        : "text-stone-400 dark:text-stone-500 hover:bg-stone-200 dark:hover:bg-stone-700"
                                    }`}
                                  >
                                    <GripVertical
                                      size={16}
                                      className="currentColor"
                                    />
                                  </div>
                                  <button
                                    onClick={() => openEditMember(m)}
                                    className={`flex-1 text-left text-sm font-bold px-2 py-1 truncate transition-colors ${
                                      editMemberId === m.hexId
                                        ? "text-emerald-500"
                                        : textMain
                                    }`}
                                  >
                                    {m.name}
                                  </button>
                                  <button
                                    onClick={(e) => {
                                      e.stopPropagation();
                                      deleteMember(m.hexId);
                                    }}
                                    className="p-1.5 rounded-lg text-stone-400 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/30 transition-all shrink-0"
                                  >
                                    <Trash2 size={16} />
                                  </button>
                                </div>
                              ))}
                            </div>
        
                            {/* GHOST SHADOW */}
                            {dragIndex !== null && savedMembers[dragIndex] && (
                              <div
                                className={`fixed pointer-events-none flex items-center gap-2 p-2 rounded-xl border border-emerald-500 bg-emerald-50 dark:bg-emerald-900/90 shadow-[0_15px_30px_rgba(16,185,129,0.3)] z-[9999] opacity-95`}
                                style={{
                                  left: dragPos.x - dragOffset.x,
                                  top: dragPos.y - dragOffset.y + 1,
                                  width: dragOffset.width || "auto",
                                  transform: "scale(1.02)",
                                  transformOrigin: "center center",
                                }}
                              >
                                <div className="p-1.5 rounded-lg bg-emerald-500 text-white shadow-sm">
                                  <GripVertical
                                    size={16}
                                    className="currentColor"
                                  />
                                </div>
                                <div
                                  className={`flex-1 text-left text-sm font-bold px-2 py-1 truncate text-emerald-700 dark:text-emerald-300`}
                                >
                                  {savedMembers[dragIndex].name}
                                </div>
                              </div>
                            )}
                          </div>
                        </>
                      )}
                    </div>
                  </div>
                </div>
              )}
              {secretGame && (
                <div className="fixed inset-0 z-[200] bg-stone-900 text-stone-100 flex flex-col animate-screen-enter select-none">
                  <div className="p-4 flex justify-between items-center border-b border-stone-800 bg-stone-950">
                    <h2 className="text-xl font-black text-emerald-400 flex items-center gap-2"><Gamepad2 size={24} /> ARCADE MODE</h2>
                    <button onClick={() => setSecretGame(secretGame === 'menu' ? null : 'menu')} className="p-2 bg-stone-800 hover:bg-stone-700 rounded-full">{secretGame === 'menu' ? <X size={20} /> : <Grid size={20} />}</button>
                  </div>
                  <div className="flex-1 p-4 overflow-y-auto">
                    {secretGame === 'menu' && <ArcadeMenu onSelect={(id) => setSecretGame(id)} />}
                    {secretGame === 'reaction' && <GameReaction />}
                    {secretGame === 'tictactoe' && <GameTicTacToe />}
                    {secretGame === 'aim' && <GameAim />}
                    {secretGame === 'memory' && <GameMemory />}
                    {secretGame === 'clicker' && <GameClicker />}
                    {secretGame === 'rps' && <GameRPS />}
                    {secretGame === 'math' && <GameMath />}
                    {secretGame === 'guess' && <GameGuess />}
                  </div>
                </div>
              )} 
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PickleballApp />);
    </script>

    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "5fd8a324f87a433fa80d77d57da97860"}'></script>
    </body>
</html>
