    <!-- Dynamic PWA Manifest & Icon Generator -->
    <script>
        (function() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            const img = new Image();
            img.crossOrigin = "Anonymous"; // Allows canvas to export the image
            img.onload = function() {
                // 1. Draw solid white background
                ctx.fillStyle = '#ffffff'; 
                ctx.fillRect(0, 0, 512, 512);
                
                // 2. Shrink image by 10% (Scale to 90% size)
                const scale = 0.9;
                const size = 512 * scale;
                const offset = (512 - size) / 2;
                
                // 3. Draw the image in the center
                ctx.drawImage(img, offset, offset, size, size);
                
                try {
                    const iconUrl = canvas.toDataURL('image/png');
                    
                    // Update links to use the new padded icon
                    document.getElementById('favicon').href = iconUrl;
                    document.getElementById('favicon').type = 'image/png';
                    document.getElementById('apple-icon').href = iconUrl;
                    
                    // Inject Web App Manifest
                    const manifest = {
                        name: "Pickleball Point Counter",
                        short_name: "Pickleball",
                        start_url: ".",
                        display: "standalone",
                        background_color: "#fafaf9",
                        theme_color: "#10b981",
                        icons: [{ 
                            src: iconUrl, 
                            sizes: "512x512", 
                            type: "image/png", 
                            purpose: "any maskable" 
                        }]
                    };
                    
                    document.getElementById('manifest-link').href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));
                } catch (e) {
                    console.warn("Could not generate padded icon due to CORS. Using original image as fallback.");
                }
            };
            img.src = 'https://i.ibb.co/BHpkXPhP/pickleballpointcounter.jpg';
        })();
    </script>

        // This converts the Lucide icon library into React components for the browser

            if (!iconObj || !Array.isArray(iconObj)) return null;
            
            return React.createElement(
                'svg',
                {
                    xmlns: "http://www.w3.org/2000/svg",
                    width: size,
                    height: size,
                    viewBox: "0 0 24 24",
                    fill: "none",
                    stroke: "currentColor",
                    strokeWidth: "2",
                    strokeLinecap: "round",
                    strokeLinejoin: "round",
                    className: `lucide ${className}`
                },
                iconObj.map((node, index) => {
                    const [tag, attrs] = node;
                    const reactAttrs = { key: index };
                    for (const [key, value] of Object.entries(attrs || {})) {
                        const reactKey = key === 'class' ? 'className' : key.replace(/-([a-z])/g, g => g[1].toUpperCase());
                        reactAttrs[reactKey] = value;
                    }
                    return React.createElement(tag, reactAttrs);
                })
            );
        };

        function PickleballApp() {
          // App States
          const [appState, setAppState] = useState('splash'); // 'splash', 'menu', 'game', 'history'
          const [zoomActive, setZoomActive] = useState(false);
          const [pendingGame, setPendingGame] = useState(null);
          const [matchTitleInput, setMatchTitleInput] = useState('');
          const [showClearConfirm, setShowClearConfirm] = useState(false);
          const [showLangMenu, setShowLangMenu] = useState(false);
          const [showInstallInstructions, setShowInstallInstructions] = useState(false);
          const [showInfo, setShowInfo] = useState(false);
          const [showRetreatModal, setShowRetreatModal] = useState(false);
          const [showBackConfirm, setShowBackConfirm] = useState(false);
          const [isHistoryLoading, setIsHistoryLoading] = useState(false);
          
          // Settings
          const [lang, setLang] = useState('en');
          const [isDark, setIsDark] = useState(false);
          const [installPrompt, setInstallPrompt] = useState(null);
          const [isInstalled, setIsInstalled] = useState(false);

          // Game Settings & State
          const [currentMatchId, setCurrentMatchId] = useState(null);
          const [matchTitle, setMatchTitle] = useState('');
          const [gameMode, setGameMode] = useState('double'); 
          const [ruleSet, setRuleSet] = useState('standard'); 
          const [team1Score, setTeam1Score] = useState(0);
          const [team2Score, setTeam2Score] = useState(0);
          const [servingTeam, setServingTeam] = useState(1); 
          const [serverNumber, setServerNumber] = useState(2); 
          const [winner, setWinner] = useState(null);
          const [winReason, setWinReason] = useState('score');
          const [showWinnerOverlay, setShowWinnerOverlay] = useState(false);
          const [serveToWinAt14, setServeToWinAt14] = useState(false);
          
          // History 
          const [showHistory, setShowHistory] = useState(false);
          const [history, setHistory] = useState([]); 
          const [stateHistory, setStateHistory] = useState([]);
          const [savedMatches, setSavedMatches] = useState([]);
          const timelineScrollRef = useRef(null);

          const t = dict[lang];

          // --- LOCAL STORAGE EFFECTS ---
          useEffect(() => {
            const saved = localStorage.getItem('pb_history_matches');
            if (saved) {
              try {
                setSavedMatches(JSON.parse(saved));
              } catch (e) {
                console.error("Failed to load history");
              }
            }
            
            // Load language preference if exists
            let savedLang = localStorage.getItem('pb_lang_pref');
            if (savedLang === 'zh') savedLang = 'zh_CN'; // Fallback for previous users
            if (savedLang && dict[savedLang]) {
              setLang(savedLang);
            }
            
            // Load theme preference if exists
            const savedTheme = localStorage.getItem('pb_theme_pref');
            if (savedTheme === 'dark') {
              setIsDark(true);
            }
          }, []);

          // Save match when someone wins
          useEffect(() => {
            if (winner !== null && currentMatchId && history.length > 0) {
              if (!savedMatches.some(m => m.id === currentMatchId)) {
                const newMatch = {
                  id: currentMatchId,
                  title: matchTitle || t.untitledMatch,
                  date: new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                  mode: gameMode,
                  rules: ruleSet,
                  t1Score: team1Score,
                  t2Score: team2Score,
                  winner: winner,
                  winReason: winReason,
                  history: [...history]
                };
                const updated = [newMatch, ...savedMatches];
                setSavedMatches(updated);
                localStorage.setItem('pb_history_matches', JSON.stringify(updated));
              }
            }
          }, [winner, currentMatchId, history, matchTitle, gameMode, ruleSet, team1Score, team2Score, winReason, t.untitledMatch, savedMatches]);

          // Auto-scroll timeline to the right when history changes during game
          useEffect(() => {
            if (timelineScrollRef.current) {
              timelineScrollRef.current.scrollLeft = timelineScrollRef.current.scrollWidth;
            }
          }, [history]);

          // --- SYSTEM EFFECTS (PWA & Meta) ---
          useEffect(() => {
            const checkStandalone = () => {
              return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone || document.referrer.includes('android-app://');
            };
            setIsInstalled(checkStandalone());

            const mediaQuery = window.matchMedia('(display-mode: standalone)');
            const handleDisplayModeChange = (e) => setIsInstalled(e.matches);
            mediaQuery.addEventListener('change', handleDisplayModeChange);

            const handleBeforeInstall = (e) => {
              e.preventDefault();
              setInstallPrompt(e);
            };
            window.addEventListener('beforeinstallprompt', handleBeforeInstall);

            return () => {
              mediaQuery.removeEventListener('change', handleDisplayModeChange);
              window.removeEventListener('beforeinstallprompt', handleBeforeInstall);
            };
          }, []);

          // --- CURSOR SPOTLIGHT EFFECT ---
          useEffect(() => {
            const handlePointerMove = (e) => {
              const x = e.touches ? e.touches[0].clientX : e.clientX;
              const y = e.touches ? e.touches[0].clientY : e.clientY;
              document.documentElement.style.setProperty('--cursor-x', `${x}px`);
              document.documentElement.style.setProperty('--cursor-y', `${y}px`);
            };

            document.documentElement.style.setProperty('--cursor-x', '-1000px');
            document.documentElement.style.setProperty('--cursor-y', '-1000px');

            window.addEventListener('mousemove', handlePointerMove);
            window.addEventListener('touchmove', handlePointerMove, { passive: true });

            return () => {
              window.removeEventListener('mousemove', handlePointerMove);
              window.removeEventListener('touchmove', handlePointerMove);
            };
          }, []);

          const handleInstallClick = async () => {
            if (installPrompt) {
              installPrompt.prompt();
              const { outcome } = await installPrompt.userChoice;
              if (outcome === 'accepted') {
                  setInstallPrompt(null);
                  setIsInstalled(true);
              }
            } else {
              setShowInstallInstructions(true);
            }
          };

          const handleLanguageChange = (code) => {
            setLang(code);
            setShowLangMenu(false);
            localStorage.setItem('pb_lang_pref', code);
          };

          const toggleTheme = () => {
            const newTheme = !isDark;
            setIsDark(newTheme);
            localStorage.setItem('pb_theme_pref', newTheme ? 'dark' : 'light');
          };

          const clearHistory = () => {
            setSavedMatches([]);
            localStorage.removeItem('pb_history_matches');
            setShowClearConfirm(false);
          };

          const openHistoryDrawer = () => {
            setShowHistory(true);
            setIsHistoryLoading(true);
            // Give the drawer sliding animation time to finish before rendering the heavy list
            setTimeout(() => setIsHistoryLoading(false), 400); 
          };

          // --- SPLASH SCREEN LOGIC ---
          const handleSplashClick = () => {
            setZoomActive(true);
            setTimeout(() => {
              setAppState('menu');
              setZoomActive(false);
            }, 900);
          };

          // --- GAME INITIALIZATION ---
          const handleRuleSelect = (mode, rules) => {
            setMatchTitleInput('');
            setPendingGame({ mode, rules });
          };

          const startGame = (mode, rules, title) => {
            setCurrentMatchId(Date.now());
            setMatchTitle(title);
            setGameMode(mode);
            setRuleSet(rules);
            setTeam1Score(0);
            setTeam2Score(0);
            setServingTeam(1);
            setServerNumber(mode === 'double' ? 2 : 1);
            setWinner(null);
            setWinReason('score');
            setShowWinnerOverlay(false);
            setHistory([]);
            setStateHistory([]);
            setAppState('game');
          };

          // --- GAME LOGIC ---
          const saveStateForUndo = () => {
            setStateHistory(prev => [...prev, {
              team1Score, team2Score, servingTeam, serverNumber, winner, winReason, history: [...history]
            }]);
          };

          const handleUndo = () => {
            if (stateHistory.length === 0) return;
            const previousState = stateHistory[stateHistory.length - 1];
            setTeam1Score(previousState.team1Score);
            setTeam2Score(previousState.team2Score);
            setServingTeam(previousState.servingTeam);
            setServerNumber(previousState.serverNumber);
            setWinner(previousState.winner);
            setWinReason(previousState.winReason || 'score');
            setHistory(previousState.history);
            setStateHistory(prev => prev.slice(0, -1));
          };

          const handleRetreat = (retreatingTeam) => {
            saveStateForUndo();
            const winningTeam = retreatingTeam === 1 ? 2 : 1;
            setWinReason('retreat');
            setWinner(winningTeam);
            setShowRetreatModal(false);
            setShowWinnerOverlay(true);
          };

          const checkWin = (t1, t2) => {
            let hasWinner = false;
            let winTeam = null;

            if (ruleSet === 'standard') {
              if (t1 >= 11 && (t1 - t2) >= 2) { hasWinner = true; winTeam = 1; }
              if (t2 >= 11 && (t2 - t1) >= 2) { hasWinner = true; winTeam = 2; }
            } else {
              if (t1 >= 15) { hasWinner = true; winTeam = 1; }
              if (t2 >= 15) { hasWinner = true; winTeam = 2; }
            }

            if (hasWinner) {
              setWinner(winTeam);
              setShowWinnerOverlay(true);
            }
          };

          const handleRallyWin = (winningTeam) => {
            if (winner) return;
            saveStateForUndo();

            let newT1 = team1Score;
            let newT2 = team2Score;
            let newServingTeam = servingTeam;
            let newServerNumber = serverNumber;
            let eventType = '';

            const is1414 = ruleSet === '14-point' && team1Score === 14 && team2Score === 14;
            const requireServeToWin = is1414 && serveToWinAt14;

            if (ruleSet === 'standard') {
              if (winningTeam === servingTeam) {
                if (servingTeam === 1) { newT1 += 1; eventType = 'T1_POINT'; } 
                else { newT2 += 1; eventType = 'T2_POINT'; }
              } else {
                if (gameMode === 'single') {
                  newServingTeam = winningTeam;
                  eventType = 'SIDEOUT';
                } else {
                  if (serverNumber === 1) {
                    newServerNumber = 2;
                    eventType = 'FAULT';
                  } else {
                    newServingTeam = winningTeam;
                    newServerNumber = 1;
                    eventType = 'SIDEOUT';
                  }
                }
              }
            } else {
              if (requireServeToWin) {
                if (winningTeam === servingTeam) {
                  if (servingTeam === 1) { newT1 += 1; eventType = 'T1_POINT'; } 
                  else { newT2 += 1; eventType = 'T2_POINT'; }
                } else {
                  if (gameMode === 'single') {
                    newServingTeam = winningTeam;
                    eventType = 'SIDEOUT';
                  } else {
                    if (serverNumber === 1) {
                      newServerNumber = 2;
                      eventType = 'FAULT';
                    } else {
                      newServingTeam = winningTeam;
                      newServerNumber = 1;
                      eventType = 'SIDEOUT';
                    }
                  }
                }
              } else {
                if (winningTeam === 1) { newT1 += 1; eventType = 'T1_POINT'; }
                else { newT2 += 1; eventType = 'T2_POINT'; }

                if (winningTeam !== servingTeam) {
                  if (gameMode === 'single') {
                    newServingTeam = winningTeam;
                  } else {
                    if (serverNumber === 1) {
                      newServerNumber = 2;
                    } else {
                      newServingTeam = winningTeam;
                      newServerNumber = 1;
                    }
                  }
                }
              }
            }

            setTeam1Score(newT1);
            setTeam2Score(newT2);
            setServingTeam(newServingTeam);
            setServerNumber(newServerNumber);
            setHistory([...history, { 
              id: Date.now(), 
              type: eventType, 
              team: winningTeam,
              point: eventType === 'T1_POINT' ? newT1 : (eventType === 'T2_POINT' ? newT2 : null)
            }]);
            
            checkWin(newT1, newT2);
          };

          const isSuddenDeath = ruleSet === '14-point' && team1Score === 14 && team2Score === 14;

          // --- STYLES (Muji Minimalist) ---
          const customStyles = `
            @keyframes zoomThroughMinimal {
              0% { transform: scale(1) translateY(0); opacity: 1; }
              100% { transform: scale(30) translateY(50px); opacity: 0; }
            }
            .animate-zoom-minimal { animation: zoomThroughMinimal 0.9s cubic-bezier(0.8, 0, 0.2, 1) forwards; }
            @keyframes subtle-bounce {
              0%, 100% { transform: translateY(-2%); }
              50% { transform: translateY(2%); }
            }
            .animate-subtle-bounce { animation: subtle-bounce 4s infinite ease-in-out; }
            .muji-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, ${isDark ? '0.3' : '0.05'}); }
            .muji-card { background: ${isDark ? '#292524' : '#ffffff'}; border: 1px solid ${isDark ? '#44403c' : '#e7e5e4'}; border-radius: 12px; }
            .bg-pattern-base { background-image: radial-gradient(${isDark ? '#44403c' : '#e7e5e4'} 1.5px, transparent 0); background-size: 24px 24px; }
            .bg-pattern-zoomed {
              background-image: radial-gradient(${isDark ? '#a8a29e' : '#a8a29e'} 2.2px, transparent 0);
              background-size: 24px 24px;
              -webkit-mask-image: radial-gradient(circle 100px at var(--cursor-x) var(--cursor-y), black 10%, transparent 100%);
              mask-image: radial-gradient(circle 100px at var(--cursor-x) var(--cursor-y), black 10%, transparent 100%);
            }
          `;

          const dynamicStyles = `
            .muji-scrollbar::-webkit-scrollbar { height: 8px; }
            .muji-scrollbar::-webkit-scrollbar-track { background: ${isDark ? '#292524' : '#f5f5f4'}; border-radius: 8px; }
            .muji-scrollbar::-webkit-scrollbar-thumb { background-color: ${isDark ? '#57534e' : '#d6d3d1'}; border-radius: 8px; border: 2px solid ${isDark ? '#292524' : '#f5f5f4'}; }
            .muji-scrollbar::-webkit-scrollbar-thumb:hover { background-color: ${isDark ? '#78716c' : '#a8a29e'}; }
            .muji-scrollbar { scrollbar-width: thin; scrollbar-color: ${isDark ? '#57534e #292524' : '#d6d3d1 #f5f5f4'}; }
          `;

          // Theme Classes
          const textMain = isDark ? 'text-stone-100' : 'text-stone-800';
          const textSub = isDark ? 'text-stone-400' : 'text-stone-500';
          const bgMain = isDark ? 'bg-stone-900' : 'bg-stone-50';
          const bgCard = isDark ? 'bg-stone-800' : 'bg-white';
          const borderSub = isDark ? 'border-stone-700' : 'border-stone-200';
          
          const accentRed = isDark ? 'text-rose-400' : 'text-rose-700';
          const accentGreen = isDark ? 'text-emerald-400' : 'text-emerald-700';
          const bgAccentRed = isDark ? 'bg-rose-900/30 border-rose-700' : 'bg-rose-50 border-rose-200';
          const bgAccentGreen = isDark ? 'bg-emerald-900/30 border-emerald-700' : 'bg-emerald-50 border-emerald-200';

          // --- REUSABLE TIMELINE RENDERER ---
          const renderTimeline = (timelineData, useScrollRef = false) => (
            <div className={`mt-6 muji-card p-5 rounded-xl`}>
              <div className={`text-[10px] font-bold uppercase tracking-widest mb-4 ${textSub}`}>{t.timeline}</div>
              <div ref={useScrollRef ? timelineScrollRef : null} className="overflow-x-auto pb-4 pt-2 muji-scrollbar relative scroll-smooth">
                {timelineData.length === 0 && <div className={`text-xs italic ${textSub} px-2`}>{t.awaiting}</div>}
                {timelineData.length > 0 && (
                  <div className="flex min-w-max relative px-2">
                    <div className={`absolute top-[12px] left-14 right-0 h-px ${isDark ? 'bg-stone-700' : 'bg-stone-200'} z-0`}></div>
                    <div className={`absolute bottom-[12px] left-14 right-0 h-px ${isDark ? 'bg-stone-700' : 'bg-stone-200'} z-0`}></div>
                    <div className={`w-12 flex flex-col gap-3 sticky left-0 z-20 ${bgCard} pr-2 ${isDark ? 'shadow-[4px_0_8px_-4px_rgba(0,0,0,0.3)]' : 'shadow-[4px_0_8px_-4px_rgba(0,0,0,0.1)]'}`}>
                        <div className={`h-6 flex items-center text-[10px] font-bold uppercase ${accentGreen}`}>{t.t1Label}</div>
                        <div className="h-4"></div>
                        <div className={`h-6 flex items-center text-[10px] font-bold uppercase ${accentRed}`}>{t.t2Label}</div>
                    </div>
                    <div className="flex items-center">
                        {timelineData.map((event) => (
                          <div key={event.id} className="flex flex-col items-center justify-center w-8 gap-3 relative z-10">
                            <div className="h-6 flex items-center justify-center w-full">
                              {event.type === 'T1_POINT' ? (
                                  <div className={`w-5 h-5 rounded-full bg-emerald-500 ring-4 ${isDark ? 'ring-[#292524]' : 'ring-white'} flex items-center justify-center text-[10px] font-bold text-white transition-transform hover:scale-110 cursor-default shadow-sm z-10`}>
                                    {event.point}
                                  </div>
                              ) : (
                                  <div className={`w-1.5 h-1.5 rounded-full ${isDark ? 'bg-stone-600' : 'bg-stone-300'} z-10`}></div>
                              )}
                            </div>
                            <div className="h-4 flex items-center justify-center w-full">
                                {(event.type === 'SIDEOUT' || event.type === 'FAULT') && (
                                  <div className={`w-4 h-4 rounded-sm rotate-45 border flex items-center justify-center shadow-sm z-10 ${isDark ? 'bg-stone-600 border-stone-500' : 'bg-stone-200 border-stone-300'}`} title={event.type}>
                                    <span className={`text-[8px] font-black -rotate-45 ${isDark ? 'text-white' : 'text-stone-700'}`}>{event.type === 'FAULT' ? 'F' : 'S'}</span>
                                  </div>
                                )}
                            </div>
                            <div className="h-6 flex items-center justify-center w-full">
                              {event.type === 'T2_POINT' ? (
                                  <div className={`w-5 h-5 rounded-full bg-rose-500 ring-4 ${isDark ? 'ring-[#292524]' : 'ring-white'} flex items-center justify-center text-[10px] font-bold text-white transition-transform hover:scale-110 cursor-default shadow-sm z-10`}>
                                    {event.point}
                                  </div>
                              ) : (
                                  <div className={`w-1.5 h-1.5 rounded-full ${isDark ? 'bg-stone-600' : 'bg-stone-300'} z-10`}></div>
                              )}
                            </div>
                          </div>
                        ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          );

          return (
            <div className={`min-h-screen flex flex-col ${textMain} ${bgMain} overflow-x-hidden relative selection:bg-stone-300 selection:text-stone-900 transition-colors duration-300`}>
              <style>{customStyles}</style>
              <style>{dynamicStyles}</style>

              {/* Interactive Dot Background */}
              <div className="fixed inset-0 pointer-events-none z-0 bg-pattern-base transition-colors duration-300"></div>
              <div className="fixed inset-0 pointer-events-none z-0 bg-pattern-zoomed transition-colors duration-300"></div>

              {/* --- GLOBAL HEADER (Settings) --- */}
              {appState !== 'splash' && (
                <div className="absolute top-0 w-full p-4 flex justify-end items-center z-50 pointer-events-none">
                  <div className="flex items-center gap-2 pointer-events-auto">
                    <button onClick={() => setShowInfo(true)} className={`p-2 rounded-full ${bgCard} ${borderSub} border shadow-sm hover:scale-105 transition-transform`}>
                      <InfoIcon size={18} className={textSub} />
                    </button>
                    {appState === 'menu' && (
                      <button onClick={openHistoryDrawer} className={`flex items-center gap-1.5 px-3 py-2 rounded-full ${bgCard} ${borderSub} border shadow-sm hover:scale-105 transition-transform text-xs font-bold ${textSub}`}>
                        <HistoryIcon size={16} /> <span className="hidden sm:inline">History</span>
                      </button>
                    )}
                    <button onClick={() => setShowLangMenu(true)} className={`p-2 rounded-full ${bgCard} ${borderSub} border shadow-sm hover:scale-105 transition-transform`}>
                      <Globe size={18} className={textSub} />
                    </button>
                    <button onClick={toggleTheme} className={`p-2 rounded-full ${bgCard} ${borderSub} border shadow-sm hover:scale-105 transition-transform`}>
                      {isDark ? <Sun size={18} className="text-amber-400" /> : <Moon size={18} className="text-stone-500" />}
                    </button>
                  </div>
                </div>
              )}

              {/* Info & Disclaimer Modal */}
              {showInfo && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity" onClick={() => setShowInfo(false)}></div>
                  <div className={`relative w-full max-w-sm p-6 ${bgCard} border ${borderSub} rounded-2xl shadow-2xl transition-all duration-200 max-h-[85vh] overflow-y-auto muji-scrollbar`}>
                    <div className="flex items-center gap-3 mb-6">
                      <InfoIcon size={24} className={accentGreen} />
                      <h2 className={`text-xl font-bold ${textMain}`}>{t.infoTitle}</h2>
                    </div>
                    
                    <div className={`text-sm mb-6 ${textSub} text-left space-y-5`}>
                      <div>
                        <h3 className={`font-bold ${textMain} mb-2`}>{t.infoHowToTitle}</h3>
                        <ul className="space-y-1.5 list-disc pl-4 text-xs md:text-sm">
                           <li>{t.infoHowTo1}</li>
                           <li>{t.infoHowTo2}</li>
                           <li>{t.infoHowTo3}</li>
                           <li>{t.infoHowTo4}</li>
                        </ul>
                      </div>
                      
                      <div className={`w-full h-px bg-stone-200 dark:bg-stone-700 my-4`}></div>

                      <div className="flex items-start gap-3">
                        <HardDrive size={18} className={`mt-0.5 flex-shrink-0 ${accentRed}`} />
                        <p className="leading-relaxed">{t.infoData}</p>
                      </div>
                      <div className="flex items-start gap-3">
                        <Github size={18} className={`mt-0.5 flex-shrink-0 ${textMain}`} />
                        <p className="leading-relaxed">{t.infoUsage}</p>
                      </div>
                      <p className={`text-center pt-2 italic text-xs ${textSub}`}>{t.infoFooter}</p>
                    </div>
                    
                    <button onClick={() => setShowInfo(false)} className={`w-full py-3 rounded-xl font-bold text-white bg-emerald-500 hover:bg-emerald-600 transition-colors shadow-md`}>
                      {t.gotIt}
                    </button>
                  </div>
                </div>
              )}

              {/* Language Selection Modal */}
              {showLangMenu && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity" onClick={() => setShowLangMenu(false)}></div>
                  <div className={`relative w-full max-w-sm p-6 ${bgCard} border ${borderSub} rounded-2xl shadow-2xl transition-all duration-200`}>
                    <div className="flex items-center gap-3 mb-6">
                      <Globe size={24} className={accentGreen} />
                      <h2 className={`text-xl font-bold ${textMain}`}>Select Language</h2>
                    </div>
                    
                    <div className="grid grid-cols-2 gap-3 mb-6">
                      {availableLanguages.map((l) => (
                        <button
                          key={l.code}
                          onClick={() => handleLanguageChange(l.code)}
                          className={`py-3 rounded-xl font-semibold border transition-all ${lang === l.code ? `bg-emerald-500 text-white border-emerald-500 shadow-md` : `${bgMain} ${borderSub} ${textSub} hover:${textMain} hover:border-emerald-400/50`}`}
                        >
                          {l.name}
                        </button>
                      ))}
                    </div>
                    
                    <button onClick={() => setShowLangMenu(false)} className={`w-full py-3 rounded-xl font-semibold border ${borderSub} ${textSub} hover:${textMain} transition-colors`}>
                      {t.cancel}
                    </button>
                  </div>
                </div>
              )}

              {/* Install Instructions Modal */}
              {showInstallInstructions && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity" onClick={() => setShowInstallInstructions(false)}></div>
                  <div className={`relative w-full max-w-sm p-6 ${bgCard} border ${borderSub} rounded-2xl shadow-2xl transition-all duration-200 text-center`}>
                    <Download size={48} className="mx-auto text-emerald-500 mb-4" />
                    <h2 className={`text-xl font-bold mb-4 ${textMain}`}>{t.install}</h2>
                    <div className={`text-sm mb-6 ${textSub} text-left space-y-4`}>
                      <p><strong>🍎 {t.installStepsIOS ? 'iOS / Safari' : 'iOS / Safari'}:</strong><br/>{t.installStepsIOS || 'Tap the Share icon at the bottom, then select "Add to Home Screen".'}</p>
                      <p><strong>🤖 {t.installStepsAndroid ? 'Android / Chrome' : 'Android / Chrome'}:</strong><br/>{t.installStepsAndroid || 'Tap the browser menu (three dots) and select "Install App" or "Add to Home Screen".'}</p>
                    </div>
                    <button onClick={() => setShowInstallInstructions(false)} className={`w-full py-3 rounded-xl font-bold text-white bg-emerald-500 hover:bg-emerald-600 transition-colors shadow-md`}>
                      {t.gotIt || 'Got it!'}
                    </button>
                  </div>
                </div>
              )}

              {/* Options Modal for Game Setup (Moved to global scope) */}
              {pendingGame && (
                <div className="fixed inset-0 z-[110] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={() => setPendingGame(null)}></div>
                  <div className={`relative w-full max-w-sm p-6 ${bgCard} border ${borderSub} rounded-2xl shadow-2xl`}>
                    <h2 className={`text-xl font-bold mb-2 ${textMain}`}>
                      {pendingGame.mode === 'single' ? t.singles : t.doubles} - {pendingGame.rules === 'standard' ? t.stdTitle : t.fourteenTitle}
                    </h2>
                    
                    <div className="mt-6 mb-6">
                      <label className={`block text-xs font-bold uppercase tracking-widest mb-2 ${textSub}`}>{t.matchTitlePlaceholder}</label>
                      <input 
                        type="text" 
                        placeholder={t.untitledMatch}
                        value={matchTitleInput}
                        onChange={(e) => setMatchTitleInput(e.target.value)}
                        className={`w-full px-4 py-3 rounded-xl border ${borderSub} ${bgMain} ${textMain} focus:outline-none focus:ring-2 focus:ring-emerald-500/50 transition-all`}
                      />
                    </div>

                    {pendingGame.rules === '14-point' && (
                      <div 
                        className={`p-4 rounded-xl border ${borderSub} ${bgMain} flex items-center justify-between mb-8 cursor-pointer active:scale-[0.98] transition-transform`} 
                        onClick={() => setServeToWinAt14(!serveToWinAt14)}
                      >
                        <div className="pr-4">
                          <h3 className={`font-bold text-sm ${textMain}`}>{t.serveToWinOption}</h3>
                          <p className={`text-xs mt-1 ${textSub}`}>{t.serveToWinDesc}</p>
                        </div>
                        <button 
                          className={`relative w-12 h-6 rounded-full transition-colors flex-shrink-0 ${serveToWinAt14 ? 'bg-emerald-500' : 'bg-stone-300 dark:bg-stone-600'}`}
                        >
                          <div className={`absolute top-1 left-1 w-4 h-4 rounded-full bg-white transition-transform duration-300 ${serveToWinAt14 ? 'translate-x-6' : 'translate-x-0'}`} />
                        </button>
                      </div>
                    )}

                    <div className="flex gap-3 mt-8">
                      <button 
                        onClick={() => setPendingGame(null)}
                        className={`flex-1 py-3 rounded-xl font-semibold border ${borderSub} ${textSub} hover:${textMain} transition-colors`}
                      >
                        {t.cancel}
                      </button>
                      <button 
                        onClick={() => {
                          startGame(pendingGame.mode, pendingGame.rules, matchTitleInput);
                          setPendingGame(null);
                        }}
                        className={`flex-1 py-3 rounded-xl font-bold text-white bg-stone-800 hover:bg-stone-700 dark:bg-stone-200 dark:text-stone-900 dark:hover:bg-white transition-colors shadow-md`}
                      >
                        {t.startMatch}
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {/* --- SPLASH SCREEN --- */}
              {appState === 'splash' && (
                <div className={`absolute inset-0 flex flex-col items-center justify-center cursor-pointer z-50`} onClick={handleSplashClick}>
                  <div className="text-center z-10 transition-opacity duration-300 mb-12" style={{ opacity: zoomActive ? 0 : 1 }}>
                    <h1 className={`text-5xl md:text-6xl font-bold tracking-tight ${textMain}`}>
                      {t.appTitle}
                    </h1>
                    <p className={`text-2xl md:text-3xl mt-2 tracking-widest uppercase font-medium ${accentGreen}`}>{t.appSub}</p>
                    <p className={`mt-10 text-lg md:text-xl font-medium uppercase tracking-widest ${textSub} animate-pulse`}>{t.tapToStart}</p>
                  </div>

                  <div className={`relative w-40 h-40 md:w-48 md:h-48 ${zoomActive ? 'animate-zoom-minimal' : 'animate-subtle-bounce'}`}>
                    <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-xl transition-transform duration-300 hover:scale-110">
                      <circle cx="50" cy="50" r="48" fill={isDark ? '#4ade80' : '#86efac'} />
                      <circle cx="50" cy="50" r="48" fill="url(#ballGradient)" opacity="0.6" />
                      {[
                        [30, 30], [50, 20], [70, 30], [20, 50], [40, 45],
                        [60, 45], [80, 50], [30, 70], [50, 80], [70, 70]
                      ].map(([cx, cy], i) => (
                        <circle key={i} cx={cx} cy={cy} r="5" fill={isDark ? '#064e3b' : '#14532d'} opacity="0.8" />
                      ))}
                      <defs>
                        <radialGradient id="ballGradient" cx="30%" cy="30%" r="70%">
                          <stop offset="0%" stopColor="#ffffff" stopOpacity="0.8" />
                          <stop offset="100%" stopColor="#000000" stopOpacity="0.3" />
                        </radialGradient>
                      </defs>
                    </svg>
                  </div>
                </div>
              )}

              {/* --- MENU SCREEN --- */}
              {appState === 'menu' && (
                <div className={`flex-1 flex flex-col relative transition-opacity duration-700`}>
                  <div className="relative z-10 pt-24 pb-12 px-6 flex flex-col max-w-4xl mx-auto flex-1 w-full">
                    <header className="mb-10 text-center">
                      <h1 className={`text-3xl font-bold ${textMain}`}>{t.newMatch}</h1>
                      <p className={`mt-2 text-base font-medium ${textSub}`}>{t.selectFormat}</p>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 flex-1">
                      {/* Singles */}
                      <div className="space-y-4">
                        <div className={`flex items-center gap-2 mb-4 pb-2 border-b ${borderSub}`}>
                          <User className={accentGreen} size={20} />
                          <h2 className={`text-lg font-semibold ${textMain}`}>{t.singles}</h2>
                        </div>
                        
                        <button onClick={() => handleRuleSelect('single', 'standard')} className={`w-full text-left p-5 muji-card transition-shadow hover:muji-shadow`}>
                          <div className="flex justify-between items-center mb-1">
                            <h3 className={`font-bold ${textMain}`}>{t.stdTitle}</h3>
                            <ChevronRight size={16} className={textSub} />
                          </div>
                          <p className={`text-xs ${textSub}`}>{t.stdDescSingle}</p>
                        </button>

                        <button onClick={() => handleRuleSelect('single', '14-point')} className={`w-full text-left p-5 muji-card transition-shadow hover:muji-shadow`}>
                          <div className="flex justify-between items-center mb-1">
                            <h3 className={`font-bold ${textMain}`}>{t.fourteenTitle}</h3>
                            <ChevronRight size={16} className={textSub} />
                          </div>
                          <p className={`text-xs ${textSub}`}>{t.fourteenDesc}</p>
                        </button>
                      </div>

                      {/* Doubles */}
                      <div className="space-y-4 mt-6 md:mt-0">
                        <div className={`flex items-center gap-2 mb-4 pb-2 border-b ${borderSub}`}>
                          <Users className={accentRed} size={20} />
                          <h2 className={`text-lg font-semibold ${textMain}`}>{t.doubles}</h2>
                        </div>

                        <button onClick={() => handleRuleSelect('double', 'standard')} className={`w-full text-left p-5 muji-card transition-shadow hover:muji-shadow`}>
                          <div className="flex justify-between items-center mb-1">
                            <h3 className={`font-bold ${textMain}`}>{t.stdTitle}</h3>
                            <ChevronRight size={16} className={textSub} />
                          </div>
                          <p className={`text-xs ${textSub}`}>{t.stdDescDouble}</p>
                        </button>

                        <button onClick={() => handleRuleSelect('double', '14-point')} className={`w-full text-left p-5 muji-card transition-shadow hover:muji-shadow`}>
                          <div className="flex justify-between items-center mb-1">
                            <h3 className={`font-bold ${textMain}`}>{t.fourteenTitle}</h3>
                            <ChevronRight size={16} className={textSub} />
                          </div>
                          <p className={`text-xs ${textSub}`}>{t.fourteenDesc}</p>
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* --- HISTORY SCREEN (SLIDING DRAWER) --- */}
              <div 
                className={`fixed inset-0 z-[70] ${bgMain} transition-transform duration-500 ease-in-out ${showHistory ? 'translate-x-0' : 'translate-x-full'}`}
              >
                <div className="absolute inset-0 pointer-events-none bg-pattern-base opacity-50"></div>
                <div className="relative z-10 h-full flex flex-col pt-16 md:pt-20 pb-8 px-4 md:px-8 max-w-4xl mx-auto w-full">
                  <header className={`flex items-center justify-between mb-8 pb-4 border-b ${borderSub}`}>
                    <div className="flex items-center gap-3">
                      <button onClick={() => setShowHistory(false)} className={`p-2 -ml-2 rounded-lg ${textSub} hover:${textMain} transition-colors`}>
                        <ArrowLeft size={20} />
                      </button>
                      <h1 className={`text-xl font-bold ${textMain}`}>{t.matchHistory}</h1>
                    </div>
                    
                    {savedMatches.length > 0 && !isHistoryLoading && (
                      <button onClick={() => setShowClearConfirm(true)} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-950/30 transition-colors`}>
                        <Trash2 size={16} /> <span className="hidden sm:inline">{t.clearHistory}</span>
                      </button>
                    )}
                  </header>

                  <main className="flex-1 overflow-y-auto custom-scrollbar pr-2">
                    {isHistoryLoading ? (
                      <div className={`flex flex-col items-center justify-center h-64 text-center ${textSub}`}>
                        <div className="w-8 h-8 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p>{t.loading}</p>
                      </div>
                    ) : savedMatches.length === 0 ? (
                      <div className={`flex flex-col items-center justify-center h-64 text-center ${textSub}`}>
                        <HistoryIcon size={48} className="mb-4 opacity-50" />
                        <p>{t.noHistory}</p>
                      </div>
                    ) : (
                      <div className="space-y-8 pb-12">
                        {savedMatches.map((match) => (
                          <div key={match.id} className="relative">
                            <div className="flex flex-col md:flex-row md:items-end justify-between mb-4 px-2">
                              <div>
                                <div className={`text-xs font-bold uppercase tracking-widest ${accentGreen} mb-1`}>{match.date}</div>
                                <h2 className={`text-2xl font-bold ${textMain}`}>{match.title}</h2>
                                <div className={`text-xs font-semibold ${textSub} mt-1`}>
                                  {match.mode === 'single' ? t.singles : t.doubles} • {match.rules === 'standard' ? t.stdTitle : t.fourteenTitle}
                                </div>
                              </div>
                              <div className="flex items-center justify-center w-full md:w-auto gap-8 mt-5 md:mt-0 bg-stone-900/5 dark:bg-stone-50/5 px-6 py-4 rounded-2xl border border-stone-200 dark:border-stone-800">
                                <div className="text-center">
                                  <span className={`text-[10px] font-bold uppercase tracking-widest ${textSub} block mb-1`}>{t.t1Label}</span>
                                  <span className={`text-3xl font-black ${match.winner === 1 ? accentGreen : textMain}`}>{match.t1Score}</span>
                                </div>
                                <span className={`text-xl font-light ${textSub}`}>-</span>
                                <div className="text-center">
                                  <span className={`text-[10px] font-bold uppercase tracking-widest ${textSub} block mb-1`}>{t.t2Label}</span>
                                  <span className={`text-3xl font-black ${match.winner === 2 ? accentRed : textMain}`}>{match.t2Score}</span>
                                </div>
                              </div>
                            </div>
                            {renderTimeline(match.history)}
                          </div>
                        ))}
                      </div>
                    )}
                  </main>
                </div>
              </div>

              {/* Clear Confirm Modal */}
              {showClearConfirm && (
                <div className="fixed inset-0 z-[80] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={() => setShowClearConfirm(false)}></div>
                  <div className={`relative w-full max-w-sm p-6 ${bgCard} border ${borderSub} rounded-2xl shadow-2xl text-center`}>
                    <AlertTriangle size={48} className="mx-auto text-rose-500 mb-4" />
                    <h2 className={`text-lg font-bold mb-6 ${textMain}`}>{t.confirmClear}</h2>
                    <div className="flex gap-3">
                      <button onClick={() => setShowClearConfirm(false)} className={`flex-1 py-3 rounded-xl font-semibold border ${borderSub} ${textSub} hover:${textMain} transition-colors`}>
                        {t.cancel}
                      </button>
                      <button onClick={clearHistory} className={`flex-1 py-3 rounded-xl font-bold text-white bg-rose-500 hover:bg-rose-600 transition-colors shadow-md`}>
                        {t.yesClear}
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {/* --- GAME SCREEN --- */}
              {appState === 'game' && (
                <div className="flex-1 flex flex-col pt-20 pb-8 px-4 md:px-8 max-w-4xl mx-auto w-full transition-all duration-500">
                  
                  {/* Header Bar */}
                  <header className={`flex items-center justify-between mb-8 pb-4 border-b ${borderSub}`}>
                    <button onClick={() => {
                      if (!winner && history.length > 0) {
                        setShowBackConfirm(true);
                      } else {
                        setAppState('menu');
                      }
                    }} className={`p-2 -ml-2 rounded-lg ${textSub} hover:${textMain} transition-colors`}>
                      <ArrowLeft size={20} />
                    </button>
                    
                    <div className="text-center flex-1">
                      <h1 className={`text-sm font-bold flex items-center justify-center gap-2 ${textMain}`}>
                        {matchTitle || t.untitledMatch}
                      </h1>
                      <p className={`text-xs ${textSub} mt-1`}>
                        {gameMode === 'single' ? t.singles : t.doubles} • {ruleSet === 'standard' ? t.stdTitle : t.fourteenTitle}
                      </p>
                    </div>

                    <div className="flex gap-1">
                      <button onClick={handleUndo} disabled={stateHistory.length === 0} className={`p-2 rounded-lg ${textSub} hover:${textMain} disabled:opacity-30 transition-colors`}>
                        <Undo2 size={18} />
                      </button>
                      <button onClick={() => {
                        if (winner) {
                          setMatchTitleInput(matchTitle);
                          setPendingGame({ mode: gameMode, rules: ruleSet });
                        } else if (history.length > 0) {
                          setShowRetreatModal(true);
                        }
                      }} disabled={!winner && history.length === 0} className={`p-2 rounded-lg transition-colors ${!winner && history.length > 0 ? 'text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-950/30' : `${textSub} hover:${textMain} disabled:opacity-30`}`}>
                        <RotateCcw size={18} />
                      </button>
                    </div>
                  </header>

                  {/* Back/Quit Confirm Modal */}
                  {showBackConfirm && (
                    <div className="fixed inset-0 z-[120] flex items-center justify-center p-4">
                      <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={() => setShowBackConfirm(false)}></div>
                      <div className={`relative w-full max-w-sm p-6 ${bgCard} border ${borderSub} rounded-2xl shadow-2xl text-center`}>
                        <AlertTriangle size={48} className="mx-auto text-amber-500 mb-4" />
                        <h2 className={`text-lg font-bold mb-2 ${textMain}`}>{t.quitMatch}</h2>
                        <p className={`text-sm mb-6 ${textSub}`}>{t.quitConfirm}</p>
                        <div className="flex gap-3">
                          <button onClick={() => setShowBackConfirm(false)} className={`flex-1 py-3 rounded-xl font-semibold border ${borderSub} ${textSub} hover:${textMain} transition-colors`}>
                            {t.cancel}
                          </button>
                          <button onClick={() => {
                            setShowBackConfirm(false);
                            setAppState('menu');
                          }} className={`flex-1 py-3 rounded-xl font-bold text-white bg-rose-500 hover:bg-rose-600 transition-colors shadow-md`}>
                            {t.yesQuit}
                          </button>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Retreat Modal */}
                  {showRetreatModal && (
                    <div className="fixed inset-0 z-[120] flex items-center justify-center p-4">
                      <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={() => setShowRetreatModal(false)}></div>
                      <div className={`relative w-full max-w-sm p-6 ${bgCard} border ${borderSub} rounded-2xl shadow-2xl text-center`}>
                        <h2 className={`text-xl font-bold mb-6 ${textMain}`}>{t.retreatTitle}</h2>
                        <div className="flex flex-col gap-3">
                          <button onClick={() => handleRetreat(1)} className={`w-full py-3 rounded-xl font-bold text-white bg-rose-500 hover:bg-rose-600 transition-colors shadow-md`}>
                            {t.t1Retreat}
                          </button>
                          <button onClick={() => handleRetreat(2)} className={`w-full py-3 rounded-xl font-bold text-white bg-rose-500 hover:bg-rose-600 transition-colors shadow-md`}>
                            {t.t2Retreat}
                          </button>
                          <button onClick={() => setShowRetreatModal(false)} className={`w-full py-3 mt-2 rounded-xl font-semibold border ${borderSub} ${textSub} hover:${textMain} transition-colors`}>
                            {t.cancel}
                          </button>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Main Score Display */}
                  <main className="flex-1 flex flex-col justify-center relative">
                    
                    {/* Sudden Death Indicator */}
                    {isSuddenDeath && !winner && (
                      <div className="absolute -top-6 left-0 w-full flex justify-center">
                        <span className={`px-4 py-1.5 rounded-full text-xs font-bold tracking-widest uppercase bg-rose-100 text-rose-700 border border-rose-200 dark:bg-rose-900/50 dark:text-rose-300 dark:border-rose-800`}>
                          🔥 {t.suddenDeath} - {serveToWinAt14 ? t.suddenDeathServeDesc : t.nextPointWins} 🔥
                        </span>
                      </div>
                    )}

                    {/* Scores */}
                    <div className="flex justify-center items-center gap-6 md:gap-16 mb-12 mt-4">
                      <div className="flex flex-col items-center">
                        <span className={`text-xs font-semibold uppercase tracking-widest mb-2 ${textSub}`}>{t.team1}</span>
                        <span className={`text-8xl md:text-9xl font-bold tracking-tighter transition-colors duration-300 ${servingTeam === 1 && !winner ? accentGreen : textMain}`}>
                          {team1Score}
                        </span>
                      </div>
                      
                      <span className={`text-3xl md:text-5xl font-light ${textSub}`}>-</span>
                      
                      <div className="flex flex-col items-center">
                        <span className={`text-xs font-semibold uppercase tracking-widest mb-2 ${textSub}`}>{t.team2}</span>
                        <span className={`text-8xl md:text-9xl font-bold tracking-tighter transition-colors duration-300 ${servingTeam === 2 && !winner ? accentRed : textMain}`}>
                          {team2Score}
                        </span>
                      </div>
                      
                      {/* Doubles Server Indicator */}
                      {gameMode === 'double' && (
                        <>
                          <span className={`text-3xl md:text-5xl font-light ${textSub}`}>-</span>
                          <div className="flex flex-col items-center">
                            <span className={`text-xs font-semibold uppercase tracking-widest mb-2 ${textSub}`}>{t.server}</span>
                            <span className={`text-8xl md:text-9xl font-bold tracking-tighter ${winner ? textMain : 'text-amber-500'}`}>
                              {serverNumber}
                            </span>
                          </div>
                        </>
                      )}
                    </div>

                    {/* Winner Overlay */}
                    {winner && showWinnerOverlay && (
                      <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm rounded-2xl">
                        <div className={`muji-card p-8 md:p-10 text-center max-w-sm w-full shadow-2xl mx-4 relative`}>
                          <button onClick={() => setShowWinnerOverlay(false)} className={`absolute top-4 right-4 p-2 rounded-full bg-stone-100 dark:bg-stone-800 ${textSub} hover:${textMain} transition-colors`}>
                            <X size={20} />
                          </button>
                          <Trophy size={48} className="mx-auto text-amber-500 mb-4" />
                          <h2 className={`text-3xl font-bold mb-1 ${textMain}`}>{winner === 1 ? t.team1 : t.team2}</h2>
                          <p className={`text-lg font-medium ${textSub} mb-8`}>{winReason === 'retreat' ? t.winByRetreat : t.winner}</p>
                          
                          <div className="flex flex-col gap-3">
                            <button onClick={() => {
                              setShowWinnerOverlay(false);
                              setMatchTitleInput(matchTitle);
                              setPendingGame({ mode: gameMode, rules: ruleSet });
                            }} className={`w-full py-4 rounded-xl font-bold text-white bg-stone-800 hover:bg-stone-700 dark:bg-stone-200 dark:text-stone-900 dark:hover:bg-white transition-colors`}>
                              {t.playAgain}
                            </button>
                            <button onClick={() => setShowWinnerOverlay(false)} className={`w-full py-3 rounded-xl font-semibold border ${borderSub} ${textSub} hover:${textMain} transition-colors`}>
                              {t.reviewMatch}
                            </button>
                          </div>
                        </div>
                      </div>
                    )}

                    {/* Action Buttons */}
                    <div className="mt-auto">
                      <div className="grid grid-cols-2 gap-4 h-40 md:h-48">
                        {/* Team 1 Button */}
                        <button
                          onClick={() => handleRallyWin(1)}
                          disabled={winner !== null}
                          className={`relative flex flex-col items-center justify-center rounded-xl border transition-all duration-200 active:scale-[0.98]
                            ${servingTeam === 1 && !winner ? bgAccentGreen : `muji-card ${bgCard} ${winner ? 'opacity-50' : ''}`}`}
                        >
                          <div className="relative z-10 text-center">
                            <span className={`block text-xl md:text-2xl font-bold mb-1 ${servingTeam === 1 && !winner ? accentGreen : textMain}`}>{t.team1}</span>
                            <span className={`text-sm font-semibold ${servingTeam === 1 && !winner ? accentGreen : textSub}`}>{t.wonRally}</span>
                          </div>
                          {servingTeam === 1 && !winner && (
                            <div className={`absolute top-4 flex items-center gap-1.5 text-[10px] font-bold uppercase ${accentGreen}`}>
                              <div className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
                              {t.serving}
                            </div>
                          )}
                        </button>

                        {/* Team 2 Button */}
                        <button
                          onClick={() => handleRallyWin(2)}
                          disabled={winner !== null}
                          className={`relative flex flex-col items-center justify-center rounded-xl border transition-all duration-200 active:scale-[0.98]
                            ${servingTeam === 2 && !winner ? bgAccentRed : `muji-card ${bgCard} ${winner ? 'opacity-50' : ''}`}`}
                        >
                          <div className="relative z-10 text-center">
                            <span className={`block text-xl md:text-2xl font-bold mb-1 ${servingTeam === 2 && !winner ? accentRed : textMain}`}>{t.team2}</span>
                            <span className={`text-sm font-semibold ${servingTeam === 2 && !winner ? accentRed : textSub}`}>{t.wonRally}</span>
                          </div>
                          {servingTeam === 2 && !winner && (
                            <div className={`absolute top-4 flex items-center gap-1.5 text-[10px] font-bold uppercase ${accentRed}`}>
                              <div className="w-1.5 h-1.5 rounded-full bg-rose-500 animate-pulse"></div>
                              {t.serving}
                            </div>
                          )}
                        </button>
                      </div>
                    </div>

                    {/* Heat Map Timeline */}
                    {renderTimeline(history, true)}

                  </main>
                </div>
              )}

              {/* --- FOOTER --- */}
              {appState !== 'splash' && (
                <footer className={`w-full py-8 mt-auto flex flex-col items-center justify-center gap-5 relative z-10 border-t ${borderSub} ${bgCard}`}>
                  {!isInstalled && (
                    <div className="flex flex-col items-center gap-3 mb-2">
                      <span className={`text-sm font-semibold ${textMain}`}>{t.installAsApp}</span>
                      <button
                        onClick={handleInstallClick}
                        className={`flex items-center gap-2 px-5 py-2.5 rounded-full text-xs font-bold text-white bg-emerald-500 hover:bg-emerald-600 active:scale-95 transition-all shadow-md`}
                      >
                        <Download size={14} /> {t.install}
                      </button>
                    </div>
                  )}
                  
                  <div className={`text-xs font-bold tracking-widest uppercase ${textSub}`}>
                    {t.designBy}
                  </div>
                  
                  <div className="flex flex-wrap items-center justify-center gap-5 md:gap-8 px-4">
                    <a href="https://github.com/yikchun1234" target="_blank" rel="noopener noreferrer" className={`flex items-center gap-1.5 text-xs font-semibold ${textSub} hover:${textMain} transition-colors`}>
                      <Github size={15} /> GitHub
                    </a>
                    <a href="https://reclub.co/players/@amostan" target="_blank" rel="noopener noreferrer" className={`flex items-center gap-1.5 text-xs font-semibold ${textSub} hover:${textMain} transition-colors`}>
                      <ExternalLink size={15} /> Reclub: Amos
                    </a>
                    <a href="https://reclub.co/clubs/@pick-to-sync" target="_blank" rel="noopener noreferrer" className={`flex items-center gap-1.5 text-xs font-semibold ${textSub} hover:${textMain} transition-colors`}>
                      <Users size={15} /> Club: Pick-to-Sync
                    </a>
                  </div>
                </footer>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PickleballApp />);
    </script>
</body>
</html>
