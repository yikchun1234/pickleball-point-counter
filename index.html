    <!-- Dynamic PWA Manifest & Icon Generator -->
    <script>
        (function() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            const img = new Image();
            img.crossOrigin = "Anonymous"; 
            img.onload = function() {
                ctx.fillStyle = '#ffffff'; 
                ctx.fillRect(0, 0, 512, 512);
                const scale = 0.9;
                const size = 512 * scale;
                const offset = (512 - size) / 2;
                ctx.drawImage(img, offset, offset, size, size);
                
                try {
                    const iconUrl = canvas.toDataURL('image/png');
                    document.getElementById('favicon').href = iconUrl;
                    document.getElementById('favicon').type = 'image/png';
                    document.getElementById('apple-icon').href = iconUrl;
                    
                    const manifest = {
                        name: "Pickleball Point Counter",
                        short_name: "Pickleball",
                        start_url: ".",
                        display: "standalone",
                        background_color: "#fafaf9",
                        theme_color: "#10b981",
                        icons: [{ src: iconUrl, sizes: "512x512", type: "image/png", purpose: "any maskable" }]
                    };
                    document.getElementById('manifest-link').href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));
                } catch (e) {
                    console.warn("Could not generate padded icon due to CORS.");
                }
            };
            img.src = 'https://i.ibb.co/BHpkXPhP/pickleballpointcounter.jpg';
        })();
    </script>

          }, []);

          useEffect(() => {
            if (appState === 'game' && !winner) {
              localStorage.setItem('pb_active_game', JSON.stringify({
                currentMatchId, matchTitle, gameMode, ruleSet, playTo, winByMargin, t1Name, t2Name,
                team1Score, team2Score, servingTeam, serverNumber, serveToWinAt14, enableSwitchEnds, hasSwitchedEnds,
                elapsedTime, history, stateHistory
              }));
            } else if (winner) {
              localStorage.removeItem('pb_active_game');
            }
          }, [team1Score, team2Score, servingTeam, serverNumber, history, appState, winner, elapsedTime]);

          useEffect(() => {
            let timer;
            if (appState === 'game' && !winner && !showRetreatModal && !showBackConfirm && !showSwitchModal) {
              timer = setInterval(() => setElapsedTime(prev => prev + 1), 1000);
            }
            return () => clearInterval(timer);
          }, [appState, winner, showRetreatModal, showBackConfirm, showSwitchModal]);

          useEffect(() => {
            const requestWakeLock = async () => {
              if (appState === 'game' && 'wakeLock' in navigator) {
                try { wakeLockRef.current = await navigator.wakeLock.request('screen'); } catch (err) {}
              }
            };
            const handleVisibility = () => { if (document.visibilityState === 'visible') requestWakeLock(); };
            requestWakeLock();
            document.addEventListener('visibilitychange', handleVisibility);
            return () => {
              if (wakeLockRef.current) wakeLockRef.current.release();
              document.removeEventListener('visibilitychange', handleVisibility);
            };
          }, [appState]);

          useEffect(() => {
            if (winner !== null && currentMatchId && history.length > 0) {
              if (!savedMatches.some(m => m.id === currentMatchId)) {
                const newMatch = {
                  id: currentMatchId, title: matchTitle || getT('untitledMatch'),
                  date: new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                  mode: gameMode, rules: ruleSet, t1Score: team1Score, t2Score: team2Score,
                  t1Name, t2Name, winner, winReason, elapsedTime, history: [...history]
                };
                const updated = [newMatch, ...savedMatches];
                setSavedMatches(updated);
                localStorage.setItem('pb_history_matches', JSON.stringify(updated));
              }
            }
          }, [winner, currentMatchId, history]);

          useEffect(() => {
            if (timelineScrollRef.current) timelineScrollRef.current.scrollLeft = timelineScrollRef.current.scrollWidth;
          }, [history]);

          useEffect(() => {
            const bgColor = isDark ? '#1c1917' : '#fafaf9'; 
            const metaThemeColor = document.getElementById('theme-color-meta');
            if (metaThemeColor) metaThemeColor.setAttribute('content', bgColor);
            document.documentElement.style.setProperty('--app-bg', bgColor);
          }, [isDark]);

          const triggerHaptic = (type) => {
            if (!navigator.vibrate) return;
            if (type === 'point') navigator.vibrate(50);
            if (type === 'win') navigator.vibrate([200, 100, 200]);
          };

          const announceText = (text1, text2) => {
            if (!soundEnabled || !('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            
            setTimeout(() => {
                if (text1) {
                    const u1 = new SpeechSynthesisUtterance(text1);
                    let hasEnded = false;
                    u1.onend = () => {
                        if (hasEnded) return;
                        hasEnded = true;
                        if (text2) {
                            setTimeout(() => {
                                const u2 = new SpeechSynthesisUtterance(text2);
                                window.speechSynthesis.speak(u2);
                            }, 500); 
                        }
                    };
                    
                    setTimeout(() => {
                        if (!hasEnded) {
                            hasEnded = true;
                            if (text2) {
                                const u2 = new SpeechSynthesisUtterance(text2);
                                window.speechSynthesis.speak(u2);
                            }
                        }
                    }, 1250); 
                    
                    window.speechSynthesis.speak(u1);
                } else if (text2) {
                    const u2 = new SpeechSynthesisUtterance(text2);
                    window.speechSynthesis.speak(u2);
                }
            }, 50);
          };

          const shareMatch = async (match) => {
            const text = `🏓 Pickleball Result: ${match.t1Name} (${match.t1Score}) vs ${match.t2Name} (${match.t2Score}). ${match.title !== getT('untitledMatch') ? `[${match.title}]` : ''} - Tracked with Pickleball Point Counter!`;
            if (navigator.share) {
              try { await navigator.share({ title: 'Pickleball Result', text }); } catch(e) {}
            } else {
              navigator.clipboard.writeText(text);
              alert('Result copied to clipboard!');
            }
          };

          const handleSoundClick = () => {
            toggleSound();
            if (!devMode) {
              soundClickCount.current += 1;
              if (soundClickCount.current >= 7) {
                setDevMode(true);
                triggerHaptic('point');
              }
            }
          };

          const toggleSound = () => {
            const newSound = !soundEnabled;
            setSoundEnabled(newSound);
            localStorage.setItem('pb_sound_pref', newSound.toString());
          };

          const handleLanguageChange = (code) => {
            setLang(code);
            setShowLangMenu(false);
            localStorage.setItem('pb_lang_pref', code);
          };

          const clearHistory = () => {
            setSavedMatches([]);
            localStorage.removeItem('pb_history_matches');
            setShowClearConfirm(false);
          };

          const handleInstallClick = async () => {
            if (installPrompt) {
              installPrompt.prompt();
              const { outcome } = await installPrompt.userChoice;
              if (outcome === 'accepted') {
                  setInstallPrompt(null);
                  setIsInstalled(true);
              }
            } else {
              setShowInstallInstructions(true);
            }
          };

          const toggleTheme = () => {
            const newTheme = !isDark;
            setIsDark(newTheme);
            localStorage.setItem('pb_theme_pref', newTheme ? 'dark' : 'light');
          };

          const handleRuleSelect = (mode, rules) => {
            setMatchTitleInput(''); setT1NameInput(''); setT2NameInput('');
            setCustomPlayTo(11); setCustomWinBy(2); setEnableSwitchEnds(false); setServeToWinAt14(false); setStartingServer(1); setPendingGame({ mode, rules });
          };

          const resumeGame = (data) => {
            setCurrentMatchId(data.currentMatchId); setMatchTitle(data.matchTitle); setGameMode(data.gameMode);
            setRuleSet(data.ruleSet); setPlayTo(data.playTo); setWinByMargin(data.winByMargin);
            setT1Name(data.t1Name); setT2Name(data.t2Name); setTeam1Score(data.team1Score);
            setTeam2Score(data.team2Score); setServingTeam(data.servingTeam); setServerNumber(data.serverNumber);
            setServeToWinAt14(data.serveToWinAt14); setEnableSwitchEnds(data.enableSwitchEnds || false); setHasSwitchedEnds(data.hasSwitchedEnds);
            setElapsedTime(data.elapsedTime); setHistory(data.history); setStateHistory(data.stateHistory);
            setWinner(null); setWinReason('score'); setShowWinnerOverlay(false);
            setAppState('game'); setRecoverGameData(null);
          };

          const startGame = (mode, rules, title, t1N, t2N, cPlayTo, cWinBy, enableSwitch, startServ) => {
            let pTo = 11; let wBy = 2;
            if (rules === '14-point') { pTo = 15; wBy = 1; }
            if (rules === 'custom') { pTo = cPlayTo; wBy = cWinBy; }
            
            setCurrentMatchId(Date.now()); setMatchTitle(title); setGameMode(mode); setRuleSet(rules);
            setPlayTo(pTo); setWinByMargin(wBy); setEnableSwitchEnds(enableSwitch);
            setT1Name(t1N || getT('team1')); setT2Name(t2N || getT('team2'));
            setTeam1Score(0); setTeam2Score(0); setServingTeam(startServ); setServerNumber(mode === 'double' ? 2 : 1);
            setWinner(null); setWinReason('score'); setShowWinnerOverlay(false);
            setHistory([]); setStateHistory([]); setHasSwitchedEnds(false); setElapsedTime(0);
            
            setAppState('game');

            setTimeout(() => {
                const isServeToScore = rules === 'standard' || (rules === 'custom' && serveToWinAt14);
                const srvNum = mode === 'double' ? 2 : 1; 
                const initialAnnounce = `0, 0${mode === 'double' && isServeToScore ? `, ${srvNum}` : ''}`;
                announceText(null, initialAnnounce);
            }, 200);
          };

          const saveStateForUndo = () => {
            setStateHistory(prev => [...prev, { team1Score, team2Score, servingTeam, serverNumber, winner, winReason, hasSwitchedEnds, history: [...history] }]);
          };

          const handleUndo = () => {
            if (stateHistory.length === 0 || winner !== null) return;
            const prev = stateHistory[stateHistory.length - 1];
            setTeam1Score(prev.team1Score); setTeam2Score(prev.team2Score); setServingTeam(prev.servingTeam);
            setServerNumber(prev.serverNumber); setWinner(prev.winner); setWinReason(prev.winReason || 'score');
            setHistory(prev.history); setHasSwitchedEnds(prev.hasSwitchedEnds || false);
            setStateHistory(s => s.slice(0, -1));
          };

          const handleRetreat = (retreatingTeam) => {
            saveStateForUndo();
            const winningTeam = retreatingTeam === 1 ? 2 : 1;
            setWinReason('retreat'); setWinner(winningTeam); setShowRetreatModal(false); setShowWinnerOverlay(true);
          };

          const checkWin = (t1, t2, newServTeam, newServNum, newHistory, isServeToScore) => {
            let hasWinner = false; let winTeam = null;
            if (t1 >= playTo && (t1 - t2) >= winByMargin) { hasWinner = true; winTeam = 1; }
            if (t2 >= playTo && (t2 - t1) >= winByMargin) { hasWinner = true; winTeam = 2; }

            if (hasWinner) {
              setWinner(winTeam); setShowWinnerOverlay(true); triggerHaptic('win');
              announceText(null, `Game over. ${winTeam === 1 ? t1Name : t2Name} wins.`);
            } else {
              const isSingle = gameMode === 'single';
              const showSrvNum = gameMode === 'double' && isServeToScore;
              
              const scoreAnnounce = newServTeam === 1 
                ? `${t1}, ${t2}${showSrvNum ? `, ${newServNum}` : ''}` 
                : `${t2}, ${t1}${showSrvNum ? `, ${newServNum}` : ''}`;
                
              const lastEvent = newHistory[newHistory.length-1];
              
              if (lastEvent) {
                  if (lastEvent.type === 'FAULT') {
                      announceText(getT('secondServer'), scoreAnnounce);
                  } else if (lastEvent.type === 'SIDEOUT') {
                      announceText(getT('sideOut'), scoreAnnounce);
                  } else {
                      announceText(null, scoreAnnounce);
                  }
              } else {
                  announceText(null, scoreAnnounce);
              }
            }
          };

          const handleRallyWin = (winningTeam) => {
            if (winner) return;
            triggerHaptic('point');
            saveStateForUndo();

            let newT1 = team1Score; let newT2 = team2Score; let newServTeam = servingTeam; let newServNum = serverNumber; let evType = '';
            
            let isServeToScoreMode = false;
            if (ruleSet === 'standard') {
              isServeToScoreMode = true;
            } else if (ruleSet === 'custom' && serveToWinAt14) {
              isServeToScoreMode = true;
            } else if (ruleSet === '14-point' && serveToWinAt14 && team1Score === 14 && team2Score === 14) {
              isServeToScoreMode = true;
            }

            const grantPoint = () => { if (winningTeam === 1) { newT1 += 1; evType = 'T1_POINT'; } else { newT2 += 1; evType = 'T2_POINT'; } };
            const grantSideout = () => {
              if (gameMode === 'single') { newServTeam = winningTeam; evType = 'SIDEOUT'; }
              else {
                if (serverNumber === 1) { newServNum = 2; evType = 'FAULT'; }
                else { newServTeam = winningTeam; newServNum = 1; evType = 'SIDEOUT'; }
              }
            };

            if (isServeToScoreMode) {
              if (winningTeam === servingTeam) grantPoint(); else grantSideout();
            } else {
              grantPoint();
              if (winningTeam !== servingTeam) {
                newServTeam = winningTeam; 
                newServNum = 1; 
              }
            }

            setTeam1Score(newT1); setTeam2Score(newT2); setServingTeam(newServTeam); setServerNumber(newServNum);
            const newHist = [...history, { id: Date.now(), type: evType, team: winningTeam, point: evType === 'T1_POINT' ? newT1 : (evType === 'T2_POINT' ? newT2 : null) }];
            setHistory(newHist);
            
            const switchPt = Math.ceil(playTo / 2);
            if (enableSwitchEnds && !hasSwitchedEnds && (newT1 === switchPt || newT2 === switchPt)) {
              setShowSwitchModal(true); setHasSwitchedEnds(true);
            }
            
            checkWin(newT1, newT2, newServTeam, newServNum, newHist, isServeToScoreMode);
          };

          const handleEditSave = (id, newTitle) => {
            const updated = savedMatches.map(m => m.id === id ? { ...m, title: newTitle } : m);
            setSavedMatches(updated); localStorage.setItem('pb_history_matches', JSON.stringify(updated));
            setEditingMatchId(null);
          };

          const formatTime = (sec) => {
            const m = Math.floor(sec / 60).toString().padStart(2, '0');
            const s = (sec % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
          };

          const isSuddenDeath = ruleSet === '14-point' && team1Score === 14 && team2Score === 14;
          const isServeToScoreModeUI = ruleSet === 'standard' || (ruleSet === 'custom' && serveToWinAt14) || (ruleSet === '14-point' && serveToWinAt14 && team1Score === 14 && team2Score === 14);
          const showServerNumberUI = gameMode === 'double' && isServeToScoreModeUI;

          const textMain = isDark ? 'text-stone-100' : 'text-stone-800';
          const textSub = isDark ? 'text-stone-400' : 'text-stone-500';
          const bgMain = isDark ? 'bg-stone-900' : 'bg-stone-50';
          const bgCard = isDark ? 'bg-stone-800' : 'bg-white';
          const borderSub = isDark ? 'border-stone-700' : 'border-stone-200';
          const accentRed = isDark ? 'text-rose-400' : 'text-rose-700';
          const accentGreen = isDark ? 'text-emerald-400' : 'text-emerald-700';
          const bgAccentRed = isDark ? 'bg-rose-900/30 border-rose-700' : 'bg-rose-50 border-rose-200';
          const bgAccentGreen = isDark ? 'bg-emerald-900/30 border-emerald-700' : 'bg-emerald-50 border-emerald-200';

          const renderTimeline = (timelineData, useScrollRef = false) => (
            <div className={`mt-6 muji-card p-5 rounded-xl`}>
              <div className={`text-[10px] font-bold uppercase tracking-widest mb-4 ${textSub}`}>{getT('timeline')}</div>
              <div ref={useScrollRef ? timelineScrollRef : null} className="overflow-x-auto pb-4 pt-2 muji-scrollbar relative scroll-smooth">
                {timelineData.length === 0 && <div className={`text-xs italic ${textSub} px-2`}>{getT('awaiting')}</div>}
                {timelineData.length > 0 && (
                  <div className="flex min-w-max relative px-2">
                    <div className={`absolute top-[12px] left-14 right-0 h-px ${isDark ? 'bg-stone-700' : 'bg-stone-200'} z-0`}></div>
                    <div className={`absolute bottom-[12px] left-14 right-0 h-px ${isDark ? 'bg-stone-700' : 'bg-stone-200'} z-0`}></div>
                    <div className={`w-12 flex flex-col gap-3 sticky left-0 z-20 ${bgCard} pr-2 ${isDark ? 'shadow-[4px_0_8px_-4px_rgba(0,0,0,0.3)]' : 'shadow-[4px_0_8px_-4px_rgba(0,0,0,0.1)]'}`}>
                        <div className={`h-6 flex items-center text-[10px] font-bold uppercase ${accentGreen}`}>{getT('t1Label')}</div>
                        <div className="h-4"></div>
                        <div className={`h-6 flex items-center text-[10px] font-bold uppercase ${accentRed}`}>{getT('t2Label')}</div>
                    </div>
                    <div className="flex items-center">
                        {timelineData.map((event) => (
                          <div key={event.id} className="flex flex-col items-center justify-center w-8 gap-3 relative z-10">
                            <div className="h-6 flex items-center justify-center w-full">
                              {event.type === 'T1_POINT' ? (
                                  <div className={`w-5 h-5 rounded-full bg-emerald-500 ring-4 ${isDark ? 'ring-[#292524]' : 'ring-white'} flex items-center justify-center text-[10px] font-bold text-white transition-transform hover:scale-110 cursor-default shadow-sm z-10`}>
                                    {event.point}
                                  </div>
                              ) : (
                                  <div className={`w-1.5 h-1.5 rounded-full ${isDark ? 'bg-stone-600' : 'bg-stone-300'} z-10`}></div>
                              )}
                            </div>
                            <div className="h-4 flex items-center justify-center w-full">
                                {(event.type === 'SIDEOUT' || event.type === 'FAULT') && (
                                  <div className={`w-4 h-4 rounded-sm rotate-45 border flex items-center justify-center shadow-sm z-10 ${isDark ? 'bg-stone-600 border-stone-500' : 'bg-stone-200 border-stone-300'}`} title={event.type}>
                                    <span className={`text-[8px] font-black -rotate-45 ${isDark ? 'text-white' : 'text-stone-700'}`}>{event.type === 'FAULT' ? 'F' : 'S'}</span>
                                  </div>
                                )}
                            </div>
                            <div className="h-6 flex items-center justify-center w-full">
                              {event.type === 'T2_POINT' ? (
                                  <div className={`w-5 h-5 rounded-full bg-rose-500 ring-4 ${isDark ? 'ring-[#292524]' : 'ring-white'} flex items-center justify-center text-[10px] font-bold text-white transition-transform hover:scale-110 cursor-default shadow-sm z-10`}>
                                    {event.point}
                                  </div>
                              ) : (
                                  <div className={`w-1.5 h-1.5 rounded-full ${isDark ? 'bg-stone-600' : 'bg-stone-300'} z-10`}></div>
                              )}
                            </div>
                          </div>
                        ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          );

          useEffect(() => {
            const checkStandalone = () => window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone || document.referrer.includes('android-app://');
            setIsInstalled(checkStandalone());
            const mediaQuery = window.matchMedia('(display-mode: standalone)');
            const handleDisplayModeChange = (e) => setIsInstalled(e.matches);
            mediaQuery.addEventListener('change', handleDisplayModeChange);
            const handleBeforeInstall = (e) => { e.preventDefault(); setInstallPrompt(e); };
            window.addEventListener('beforeinstallprompt', handleBeforeInstall);
            return () => { mediaQuery.removeEventListener('change', handleDisplayModeChange); window.removeEventListener('beforeinstallprompt', handleBeforeInstall); };
          }, []);

          useEffect(() => {
            const handlePointerMove = (e) => {
              const x = e.touches ? e.touches[0].clientX : e.clientX;
              const y = e.touches ? e.touches[0].clientY : e.clientY;
              document.documentElement.style.setProperty('--cursor-x', `${x}px`);
              document.documentElement.style.setProperty('--cursor-y', `${y}px`);
            };
            document.documentElement.style.setProperty('--cursor-x', '-1000px');
            document.documentElement.style.setProperty('--cursor-y', '-1000px');
            window.addEventListener('mousemove', handlePointerMove);
            window.addEventListener('touchmove', handlePointerMove, { passive: true });
            return () => { window.removeEventListener('mousemove', handlePointerMove); window.removeEventListener('touchmove', handlePointerMove); };
          }, []);

          return (
            <div className={`min-h-screen w-full flex flex-col ${textMain} ${bgMain} relative selection:bg-stone-300 selection:text-stone-900 transition-colors duration-300`}>
              <style>{`
                @keyframes zoomThroughMinimal { 0% { transform: scale(1) translateY(0); opacity: 1; } 100% { transform: scale(30) translateY(50px); opacity: 0; } }
                .animate-zoom-minimal { animation: zoomThroughMinimal 0.9s cubic-bezier(0.8, 0, 0.2, 1) forwards; }
                @keyframes subtle-bounce { 0%, 100% { transform: translateY(-2%); } 50% { transform: translateY(2%); } }
                .animate-subtle-bounce { animation: subtle-bounce 4s infinite ease-in-out; }
                .muji-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, ${isDark ? '0.3' : '0.05'}); }
                .muji-card { background: ${isDark ? '#292524' : '#ffffff'}; border: 1px solid ${isDark ? '#44403c' : '#e7e5e4'}; border-radius: 12px; }
                .bg-pattern-base { background-image: radial-gradient(${isDark ? '#44403c' : '#e7e5e4'} 1.5px, transparent 0); background-size: 24px 24px; }
                .bg-pattern-zoomed { background-image: radial-gradient(${isDark ? '#a8a29e' : '#a8a29e'} 2.2px, transparent 0); background-size: 24px 24px; -webkit-mask-image: radial-gradient(circle 100px at var(--cursor-x) var(--cursor-y), black 10%, transparent 100%); mask-image: radial-gradient(circle 100px at var(--cursor-x) var(--cursor-y), black 10%, transparent 100%); }
                .muji-scrollbar::-webkit-scrollbar { height: 8px; }
                .muji-scrollbar::-webkit-scrollbar-track { background: ${isDark ? '#292524' : '#f5f5f4'}; border-radius: 8px; }
                .muji-scrollbar::-webkit-scrollbar-thumb { background-color: ${isDark ? '#57534e' : '#d6d3d1'}; border-radius: 8px; border: 2px solid ${isDark ? '#292524' : '#f5f5f4'}; }
                .muji-scrollbar::-webkit-scrollbar-thumb:hover { background-color: ${isDark ? '#78716c' : '#a8a29e'}; }
                .muji-scrollbar { scrollbar-width: thin; scrollbar-color: ${isDark ? '#57534e #292524' : '#d6d3d1 #f5f5f4'}; }
              `}</style>
              
              {/* --- IOS NOTCH FILLER --- */}
              <div 
                className={`fixed top-0 left-0 w-full z-[9999] pointer-events-none transition-colors duration-300 ${bgMain}`} 
                style={{ height: 'env(safe-area-inset-top)' }}
              ></div>

              <div className="fixed inset-0 pointer-events-none z-0 bg-pattern-base transition-colors duration-300"></div>
              <div className="fixed inset-0 pointer-events-none z-0 bg-pattern-zoomed transition-colors duration-300"></div>

              {appState !== 'splash' && (
                <div 
                  className="fixed top-0 w-full flex justify-between items-start z-50 pointer-events-none"
                  style={{
                    paddingTop: 'max(1rem, env(safe-area-inset-top))',
                    paddingLeft: 'max(1rem, env(safe-area-inset-left))',
                    paddingRight: 'max(1rem, env(safe-area-inset-right))'
                  }}
                >
                  <div className="pointer-events-auto">
                    {appState === 'game' && <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full ${bgCard} ${borderSub} border shadow-sm text-xs font-bold ${textSub}`}><Timer size={14}/> {formatTime(elapsedTime)}</div>}
                  </div>
                  
                  {/* --- ALWAYS VISIBLE GLOBAL MENU (Hides when History opens) --- */}
                  <div className={`flex items-center gap-2 pointer-events-auto transition-all duration-300 ${showTopRight && !showHistory ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-8 pointer-events-none'}`}>
                    <button onClick={handleSoundClick} className={`p-2 rounded-full ${bgCard} ${borderSub} border shadow-sm hover:scale-105 active:scale-95 transition-transform`}>
                      {soundEnabled ? <Volume2 size={18} className={accentGreen} /> : <VolumeX size={18} className={textSub} />}
                    </button>
                    {appState === 'menu' && (
                      <>
                        <button onClick={() => setAppState('stats')} className={`p-2 rounded-full ${bgCard} ${borderSub} border shadow-sm hover:scale-105 active:scale-95 transition-transform`}><BarChart2 size={18} className={textSub} /></button>
                        <button onClick={() => { setShowHistory(true); setIsHistoryLoading(true); setTimeout(() => setIsHistoryLoading(false), 400); }} className={`flex items-center gap-1.5 px-3 py-2 rounded-full ${bgCard} ${borderSub} border shadow-sm hover:scale-105 active:scale-95 transition-transform text-xs font-bold ${textSub}`}><HistoryIcon size={16} /> <span className="hidden sm:inline">History</span></button>
                      </>
                    )}
                    <button onClick={() => setShowLangMenu(true)} className={`p-2 rounded-full ${bgCard} ${borderSub} border shadow-sm hover:scale-105 active:scale-95 transition-transform`}><Globe size={18} className={textSub} /></button>
                    {/* Dark Mode Button Temporarily Hidden for Stability */}
                    <button onClick={() => setShowInfo(true)} className={`p-2 rounded-full ${bgCard} ${borderSub} border shadow-sm hover:scale-105 active:scale-95 transition-transform`}><InfoIcon size={18} className={textSub} /></button>
                  </div>
                </div>
              )}

              {recoverGameData && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" style={{touchAction: 'none'}} onClick={() => setRecoverGameData(null)}></div>
                  <div className={`relative w-full max-w-sm flex flex-col ${bgCard} border ${borderSub} rounded-2xl shadow-2xl max-h-[90vh] overflow-hidden`}>
                    <div className="p-6 pb-4 flex-shrink-0 border-b border-stone-100 dark:border-stone-800/50">

                      <div className="flex gap-3">

                    </div>
                  </div>

              {appState === 'splash' && (

                    <h1 className={`text-5xl md:text-6xl font-bold tracking-tight ${textMain}`}>{getT('appTitle')}</h1>
                    <p className={`text-2xl md:text-3xl mt-2 tracking-widest uppercase font-medium ${accentGreen}`}>{getT('appSub')}</p>
                    <p className={`mt-10 text-lg md:text-xl font-medium uppercase tracking-widest ${textSub} animate-pulse`}>{getT('tapToStart')}</p>
                  </div>
                  <div className={`relative w-40 h-40 md:w-48 md:h-48 ${zoomActive ? 'animate-zoom-minimal' : 'animate-subtle-bounce'}`}>
                    <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-xl transition-transform duration-300 hover:scale-110"><circle cx="50" cy="50" r="48" fill={isDark ? '#4ade80' : '#86efac'} /><circle cx="50" cy="50" r="48" fill="url(#ballGradient)" opacity="0.6" />{[ [30, 30], [50, 20], [70, 30], [20, 50], [40, 45], [60, 45], [80, 50], [30, 70], [50, 80], [70, 70] ].map(([cx, cy], i) => (<circle key={i} cx={cx} cy={cy} r="5" fill={isDark ? '#064e3b' : '#14532d'} opacity="0.8" />))}<defs><radialGradient id="ballGradient" cx="30%" cy="30%" r="70%"><stop offset="0%" stopColor="#ffffff" stopOpacity="0.8" /><stop offset="100%" stopColor="#000000" stopOpacity="0.3" /></radialGradient></defs></svg>
                  </div>
                </div>
              )}

              {appState === 'menu' && (
                <div 
                  className={`flex-1 flex flex-col relative z-10 pb-12 w-full max-w-4xl mx-auto transition-opacity duration-700`}
                  style={{
                    paddingTop: 'max(6rem, calc(4rem + env(safe-area-inset-top)))',
                    paddingLeft: 'max(1.5rem, env(safe-area-inset-left))',
                    paddingRight: 'max(1.5rem, env(safe-area-inset-right))'
                  }}
                >
                  <header className="mb-10 text-center"><h1 className={`text-3xl font-bold ${textMain}`}>{getT('newMatch')}</h1><p className={`mt-2 text-base font-medium ${textSub}`}>{getT('selectFormat')}</p></header>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 flex-1">
                    <div className="space-y-4">
                      <div className={`flex items-center gap-2 mb-4 pb-2 border-b ${borderSub}`}><User className={accentGreen} size={20} /><h2 className={`text-lg font-semibold ${textMain}`}>{getT('singles')}</h2></div>
                      {['standard', '14-point', 'custom'].map(r => (
                        <button key={r} onClick={() => handleRuleSelect('single', r)} className={`w-full text-left p-5 muji-card transition-shadow hover:muji-shadow active:scale-[0.99] transition-transform duration-200`}>
                          <div className="flex justify-between items-center mb-1"><h3 className={`font-bold ${textMain}`}>{r === 'standard' ? getT('stdTitle') : r === '14-point' ? getT('fourteenTitle') : getT('customFormat')}</h3><ChevronRight size={16} className={textSub} /></div>
                          <p className={`text-xs ${textSub}`}>{r === 'standard' ? getT('stdDescSingle') : r === '14-point' ? getT('fourteenDesc') : getT('customDesc')}</p>
                        </button>
                      ))}
                    </div>
                    <div className="space-y-4 mt-6 md:mt-0">
                      <div className={`flex items-center gap-2 mb-4 pb-2 border-b ${borderSub}`}><Users className={accentRed} size={20} /><h2 className={`text-lg font-semibold ${textMain}`}>{getT('doubles')}</h2></div>
                      {['standard', '14-point', 'custom'].map(r => (
                        <button key={r} onClick={() => handleRuleSelect('double', r)} className={`w-full text-left p-5 muji-card transition-shadow hover:muji-shadow active:scale-[0.99] transition-transform duration-200`}>
                          <div className="flex justify-between items-center mb-1"><h3 className={`font-bold ${textMain}`}>{r === 'standard' ? getT('stdTitle') : r === '14-point' ? getT('fourteenTitle') : getT('customFormat')}</h3><ChevronRight size={16} className={textSub} /></div>
                          <p className={`text-xs ${textSub}`}>{r === 'standard' ? getT('stdDescDouble') : r === '14-point' ? getT('fourteenDesc') : getT('customDesc')}</p>
                        </button>
                      ))}
                    </div>
                  </div>
                  
                  <div className="mt-12 mb-8 flex flex-col items-center gap-6">
                    <div className={`text-center text-[10px] font-bold uppercase tracking-widest ${textSub}`}>
                      <p>{getT('designBy')}</p>
                    </div>
                    <div className="flex flex-wrap justify-center gap-3">
                       <a href="https://github.com/yikchun1234" target="_blank" rel="noopener noreferrer" className={`flex items-center gap-1.5 px-4 py-2 rounded-full ${bgCard} border ${borderSub} ${textSub} hover:${textMain} shadow-sm transition-transform hover:scale-105 active:scale-95 text-[10px] font-bold uppercase tracking-widest`}>
                         <Github size={14} /> GitHub
                       </a>
                       <a href="https://reclub.co/players/@amostan" target="_blank" rel="noopener noreferrer" className={`flex items-center gap-1.5 px-4 py-2 rounded-full ${bgCard} border ${borderSub} ${textSub} hover:${textMain} shadow-sm transition-transform hover:scale-105 active:scale-95 text-[10px] font-bold uppercase tracking-widest`}>
                         <img src="https://reclub.co/favicon.ico" alt="Reclub" className="w-3.5 h-3.5 rounded-sm" onError={(e) => { e.target.onerror = null; e.target.style.display='none'; }} />
                         <span>Reclub</span>
                       </a>
                       <a href="https://reclub.co/clubs/@pick-to-sync" target="_blank" rel="noopener noreferrer" className={`flex items-center gap-1.5 px-4 py-2 rounded-full ${bgCard} border ${borderSub} ${textSub} hover:${textMain} shadow-sm transition-transform hover:scale-105 active:scale-95 text-[10px] font-bold uppercase tracking-widest`}>
                         <img src="https://reclub.co/favicon.ico" alt="Reclub Club" className="w-3.5 h-3.5 rounded-sm" onError={(e) => { e.target.onerror = null; e.target.style.display='none'; }} />
                         <span>Reclub Club</span>
                       </a>
                    </div>
                    {!isInstalled && (
                      <button onClick={handleInstallClick} className={`mt-2 flex items-center gap-2 px-6 py-3 rounded-full bg-emerald-500 text-white hover:bg-emerald-600 transition-transform hover:scale-105 active:scale-95 shadow-md font-bold text-xs uppercase tracking-widest`}>
                        <Download size={16} /> {getT('installAsApp')}
                      </button>
                    )}
                  </div>
                </div>
              )}

              {appState === 'stats' && (
                <div 
                  className={`flex-1 flex flex-col relative z-10 pb-12 w-full max-w-4xl mx-auto transition-opacity duration-700`}
                  style={{
                    paddingTop: 'max(5rem, calc(3rem + env(safe-area-inset-top)))',
                    paddingLeft: 'max(1.5rem, env(safe-area-inset-left))',
                    paddingRight: 'max(1.5rem, env(safe-area-inset-right))'
                  }}
                >
                  <header className={`flex items-center justify-between mb-8 pb-4 border-b ${borderSub}`}>
                    <button onClick={() => setAppState('menu')} className={`p-2 -ml-2 rounded-lg ${textSub} hover:${textMain}`}><ArrowLeft size={20} /></button>
                    <h1 className={`text-xl font-bold ${textMain}`}>{getT('stats')}</h1>
                    <div className="w-8"></div>
                  </header>
                  <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                    <div className={`muji-card p-6 flex flex-col items-center text-center`}>
                      <HistoryIcon size={24} className={`mb-2 ${textSub}`} />
                      <span className={`text-3xl font-black ${textMain}`}>{savedMatches.length}</span>
                      <span className={`text-xs font-bold uppercase tracking-widest ${textSub} mt-1`}>{getT('totalMatches')}</span>
                    </div>
                    <div className={`muji-card p-6 flex flex-col items-center text-center`}>
                      <Trophy size={24} className={`mb-2 ${accentGreen}`} />
                      <span className={`text-3xl font-black ${textMain}`}>{savedMatches.length ? Math.round((savedMatches.filter(m=>m.winner===1).length / savedMatches.length)*100) : 0}%</span>
                      <span className={`text-xs font-bold uppercase tracking-widest ${textSub} mt-1`}>{getT('winRate')}</span>
                    </div>
                    <div className={`muji-card p-6 flex flex-col items-center text-center col-span-2 md:col-span-1`}>
                      <Timer size={24} className={`mb-2 ${textSub}`} />

                      <span className={`text-xs font-bold uppercase tracking-widest ${textSub} mt-1`}>{getT('avgDuration')}</span>
                    </div>
                  </div>
                </div>
              )}

              {pendingGame && (
                <div className="fixed inset-0 z-[110] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" style={{touchAction: 'none'}} onClick={() => setPendingGame(null)}></div>
                  <div className={`relative w-full max-w-sm flex flex-col ${bgCard} border ${borderSub} rounded-2xl shadow-2xl max-h-[90vh] overflow-hidden`}>
                    <div className="p-6 pb-4 flex-shrink-0 border-b border-stone-100 dark:border-stone-800/50">
                      <h2 className={`text-xl font-bold ${textMain}`}>{pendingGame.mode === 'single' ? getT('singles') : getT('doubles')} - {pendingGame.rules === 'standard' ? getT('stdTitle') : pendingGame.rules === '14-point' ? getT('fourteenTitle') : getT('customFormat')}</h2>

                    <div className="px-6 py-4 overflow-y-auto muji-scrollbar flex-1 overscroll-contain">
                      <div className="space-y-4">
                        <div><label className={`block text-[10px] font-bold uppercase tracking-widest mb-1.5 ${textSub}`}>{getT('matchTitlePlaceholder')}</label><input type="text" placeholder={getT('untitledMatch')} value={matchTitleInput} onChange={(e) => setMatchTitleInput(e.target.value)} className={`w-full px-4 py-2.5 rounded-xl border ${borderSub} ${bgMain} ${textMain} focus:outline-none focus:ring-2 focus:ring-emerald-500/50`} /></div>
                        <div className="flex gap-3">
                          <div className="flex-1"><label className={`block text-[10px] font-bold uppercase tracking-widest mb-1.5 ${textSub}`}>{getT('t1Name')}</label><input type="text" placeholder={getT('team1')} value={t1NameInput} onChange={(e) => setT1NameInput(e.target.value)} className={`w-full px-3 py-2.5 rounded-xl border ${borderSub} ${bgMain} ${textMain} text-sm focus:outline-none`} /></div>
                          <div className="flex-1"><label className={`block text-[10px] font-bold uppercase tracking-widest mb-1.5 ${textSub}`}>{getT('t2Name')}</label><input type="text" placeholder={getT('team2')} value={t2NameInput} onChange={(e) => setT2NameInput(e.target.value)} className={`w-full px-3 py-2.5 rounded-xl border ${borderSub} ${bgMain} ${textMain} text-sm focus:outline-none`} /></div>
                        </div>
                        <div className="flex flex-col gap-1.5 mt-2 mb-2">
                          <label className={`block text-[10px] font-bold uppercase tracking-widest ${textSub}`}>{getT('firstServer')}</label>
                          <div className={`flex rounded-xl border ${borderSub} p-1 ${bgMain}`}>
                            <button onClick={() => setStartingServer(1)} className={`flex-1 py-2.5 rounded-lg text-sm font-bold transition-all ${startingServer === 1 ? 'bg-emerald-500 text-white shadow-md' : `${textSub} hover:${textMain}`}`}>{t1NameInput || getT('team1')}</button>
                            <button onClick={() => setStartingServer(2)} className={`flex-1 py-2.5 rounded-lg text-sm font-bold transition-all ${startingServer === 2 ? 'bg-rose-500 text-white shadow-md' : `${textSub} hover:${textMain}`}`}>{t2NameInput || getT('team2')}</button>
                          </div>
                        </div>
                        {pendingGame.rules === 'custom' && (
                          <div className="flex gap-3">
                            <div className="flex-1"><label className={`block text-[10px] font-bold uppercase tracking-widest mb-1.5 ${textSub}`}>{getT('playTo')}</label><input type="number" inputMode="numeric" pattern="[0-9]*" value={customPlayTo} onChange={(e) => setCustomPlayTo(parseInt(e.target.value)||11)} className={`w-full px-3 py-2.5 rounded-xl border ${borderSub} ${bgMain} ${textMain} text-sm focus:outline-none`} /></div>
                            <div className="flex-1"><label className={`block text-[10px] font-bold uppercase tracking-widest mb-1.5 ${textSub}`}>{getT('winBy')}</label><select value={customWinBy} onChange={(e) => setCustomWinBy(parseInt(e.target.value))} className={`w-full px-3 py-2.5 rounded-xl border ${borderSub} ${bgMain} ${textMain} text-sm focus:outline-none cursor-pointer`}><option value={1}>1</option><option value={2}>2</option></select></div>
                          </div>
                        )}
                        {(pendingGame.rules === '14-point' || pendingGame.rules === 'custom') && (
                          <div className={`p-4 rounded-xl border ${borderSub} ${bgMain} flex items-center justify-between cursor-pointer active:scale-[0.98] transition-transform`} onClick={() => setServeToWinAt14(!serveToWinAt14)}>
                            <div className="pr-4"><h3 className={`font-bold text-sm ${textMain}`}>{pendingGame.rules === '14-point' ? getT('serveToWinOption') : getT('customServeToWin')}</h3><p className={`text-xs mt-1 ${textSub}`}>{pendingGame.rules === '14-point' ? getT('serveToWinDesc') : getT('customServeToWinDesc')}</p></div>
                            <button className={`relative w-12 h-6 rounded-full transition-colors flex-shrink-0 ${serveToWinAt14 ? 'bg-emerald-500' : 'bg-stone-300 dark:bg-stone-600'}`}><div className={`absolute top-1 left-1 w-4 h-4 rounded-full bg-white transition-transform duration-300 ${serveToWinAt14 ? 'translate-x-6' : 'translate-x-0'}`} /></button>
                          </div>
                        )}
                        <div className={`p-4 rounded-xl border ${borderSub} ${bgMain} flex items-center justify-between cursor-pointer active:scale-[0.98] transition-transform`} onClick={() => setEnableSwitchEnds(!enableSwitchEnds)}>
                          <div className="pr-4"><h3 className={`font-bold text-sm ${textMain}`}>{getT('switchEndsOption')}</h3><p className={`text-xs mt-1 ${textSub}`}>{getT('switchEndsOptionDesc')}</p></div>
                          <button className={`relative w-12 h-6 rounded-full transition-colors flex-shrink-0 ${enableSwitchEnds ? 'bg-emerald-500' : 'bg-stone-300 dark:bg-stone-600'}`}><div className={`absolute top-1 left-1 w-4 h-4 rounded-full bg-white transition-transform duration-300 ${enableSwitchEnds ? 'translate-x-6' : 'translate-x-0'}`} /></button>
                        </div>
                      </div>
                    </div>
                    <div className="p-6 pt-4 flex-shrink-0 border-t border-stone-100 dark:border-stone-800/50">
                      <div className="flex gap-3">
                        <button onClick={() => setPendingGame(null)} className={`flex-1 py-3 rounded-xl font-semibold border ${borderSub} ${textSub} hover:${textMain}`}>{getT('cancel')}</button>
                        <button onClick={() => { startGame(pendingGame.mode, pendingGame.rules, matchTitleInput, t1NameInput, t2NameInput, customPlayTo, customWinBy, enableSwitchEnds, startingServer); setPendingGame(null); }} className={`flex-1 py-3 rounded-xl font-bold text-white bg-emerald-500 hover:bg-emerald-600 shadow-md transition-colors`}>{getT('startMatch')}</button>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* --- HARDWARE-ACCELERATED ANIMATED HISTORY OVERLAY --- */}
              <div 
                className={`fixed inset-0 z-[70] ${bgMain} transition-transform duration-500 ease-out ${showHistory ? 'translate-y-0' : 'translate-y-full'}`}
              >
                <div 
                  className="h-full flex flex-col w-full max-w-4xl mx-auto"
                  style={{
                    paddingTop: 'max(4rem, calc(2rem + env(safe-area-inset-top)))',
                    paddingLeft: 'max(1.5rem, env(safe-area-inset-left))',
                    paddingRight: 'max(1.5rem, env(safe-area-inset-right))',
                    paddingBottom: 'max(2rem, env(safe-area-inset-bottom))'
                  }}
                >
                  <header className={`flex-shrink-0 flex items-center justify-between mb-8 pb-4 border-b ${borderSub}`}>
                    <div className="flex items-center gap-3">
                      <button onClick={() => setShowHistory(false)} className={`p-2 -ml-2 rounded-lg ${textSub} hover:${textMain} transition-colors`}><ArrowLeft size={20} /></button>
                      <h1 className={`text-xl font-bold ${textMain}`}>{getT('matchHistory')}</h1>
                    </div>
                    <div className="w-8 flex justify-end">
                      {savedMatches.length > 0 && !isHistoryLoading && (
                        <button onClick={() => setShowClearConfirm(true)} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-950/30 transition-colors`}>
                          <Trash2 size={16} /> <span className="hidden sm:inline">{getT('clearHistory')}</span>
                        </button>
                      )}
                    </div>
                  </header>

                  <main className="flex-1 overflow-y-auto muji-scrollbar pr-2 overscroll-contain">
                    {isHistoryLoading ? <div className={`flex flex-col items-center justify-center h-64 text-center ${textSub}`}><div className="w-8 h-8 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div><p>{getT('loading')}</p></div>
                    : savedMatches.length === 0 ? <div className={`flex flex-col items-center justify-center h-64 text-center ${textSub}`}><HistoryIcon size={48} className="mb-4 opacity-50" /><p>{getT('noHistory')}</p></div>
                    : (
                      <div className="space-y-8 pb-12">
                        {savedMatches.map((match) => (
                          <div key={match.id} className="relative">
                            <div className="flex flex-col md:flex-row md:items-end justify-between mb-4 px-2">
                              <div>
                                <div className={`text-xs font-bold uppercase tracking-widest ${accentGreen} mb-1 flex justify-between items-center w-full`}><span>{match.date} • {formatTime(match.elapsedTime || 0)}</span><button onClick={() => shareMatch(match)} className="text-stone-400 hover:text-emerald-500 transition-colors"><Share2 size={14}/></button></div>
                                {editingMatchId === match.id ? <input type="text" defaultValue={match.title} onBlur={(e) => handleEditSave(match.id, e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleEditSave(match.id, e.target.value)} autoFocus className={`text-2xl font-bold ${textMain} bg-transparent border-b ${borderSub} outline-none w-full`} /> : <h2 className={`text-2xl font-bold ${textMain} flex items-center gap-2 cursor-pointer group`} onClick={() => setEditingMatchId(match.id)}>{match.title} <Edit2 size={14} className="opacity-0 group-hover:opacity-100 transition-opacity text-stone-400"/></h2>}
                                <div className={`text-xs font-semibold ${textSub} mt-1 flex flex-wrap items-center gap-2`}>
                                  <span>{match.mode === 'single' ? getT('singles') : getT('doubles')} • {match.rules === 'standard' ? getT('stdTitle') : match.rules === '14-point' ? getT('fourteenTitle') : getT('customFormat')}</span>
                                  {match.winReason === 'retreat' && <span className="px-2 py-0.5 rounded bg-rose-100 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 text-[9px] uppercase font-bold tracking-widest border border-rose-200 dark:border-rose-800">{match.winner === 1 ? getT('t2Retreat') : getT('t1Retreat')}</span>}
                                </div>
                              </div>
                              <div className="flex items-center justify-center w-full md:w-auto gap-8 mt-5 md:mt-0 bg-stone-900/5 dark:bg-stone-50/5 px-6 py-4 rounded-2xl border border-stone-200 dark:border-stone-800">
                                <div className="text-center"><span className={`text-[10px] font-bold uppercase tracking-widest ${textSub} block mb-1 truncate max-w-[60px]`} title={match.t1Name}>{match.t1Name}</span><span className={`text-3xl font-black ${match.winner === 1 ? accentGreen : textMain}`}>{match.t1Score}</span></div>
                                <span className={`text-xl font-light ${textSub}`}>-</span>
                                <div className="text-center"><span className={`text-[10px] font-bold uppercase tracking-widest ${textSub} block mb-1 truncate max-w-[60px]`} title={match.t2Name}>{match.t2Name}</span><span className={`text-3xl font-black ${match.winner === 2 ? accentRed : textMain}`}>{match.t2Score}</span></div>
                              </div>
                            </div>
                            {renderTimeline(match.history)}
                          </div>
                        ))}
                      </div>
                    )}
                  </main>
                </div>
              </div>

              {/* --- GAME SCREEN --- */}
              {appState === 'game' && (
                <div 
                  className="flex-1 flex flex-col pb-8 w-full max-w-4xl mx-auto relative z-10"
                  style={{
                    paddingTop: 'max(5rem, calc(3rem + env(safe-area-inset-top)))',
                    paddingLeft: 'max(1rem, env(safe-area-inset-left))',
                    paddingRight: 'max(1rem, env(safe-area-inset-right))',
                    paddingBottom: 'max(2rem, env(safe-area-inset-bottom))'
                  }}
                >
                  <header className={`flex items-center justify-between mb-4 pb-4 border-b ${borderSub}`}>
                    <button onClick={() => { if (!winner && history.length > 0) setShowBackConfirm(true); else setAppState('menu'); }} className={`p-2 -ml-2 rounded-lg ${textSub} hover:${textMain}`}><ArrowLeft size={20} /></button>
                    <div className="text-center flex-1">
                      <h1 className={`text-sm font-bold ${textMain}`}>{matchTitle || getT('untitledMatch')}</h1>
                      <p className={`text-xs ${textSub} mt-1`}>{gameMode === 'single' ? getT('singles') : getT('doubles')} • {ruleSet === 'standard' ? getT('stdTitle') : ruleSet === '14-point' ? getT('fourteenTitle') : getT('customFormat')}</p>
                    </div>
                    <div className="w-8"></div>
                  </header>

                  <div className="flex justify-end gap-2 mb-2 relative z-20">
                    <button onClick={handleUndo} disabled={stateHistory.length === 0 || winner !== null} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold border shadow-sm transition-all active:scale-95 ${stateHistory.length === 0 || winner !== null ? `border-transparent ${textSub} opacity-50` : `${bgCard} ${borderSub} ${textMain}`}`}>
                      <Undo2 size={14} /> {getT('undo')}
                    </button>
                    <button onClick={() => { if (winner) { setMatchTitleInput(matchTitle); setT1NameInput(t1Name); setT2NameInput(t2Name); setPendingGame({ mode: gameMode, rules: ruleSet }); } else if (history.length > 0) setShowRetreatModal(true); }} disabled={!winner && history.length === 0} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold border shadow-sm transition-all active:scale-95 ${!winner && history.length === 0 ? `border-transparent ${textSub} opacity-50` : !winner ? `border-rose-200 bg-rose-50 text-rose-600 dark:border-rose-800/50 dark:bg-rose-900/30 dark:text-rose-400` : `${bgCard} ${borderSub} ${textMain}`}`}>
                      <RotateCcw size={14} /> {winner ? getT('playAgain') : getT('reset')}
                    </button>
                  </div>

                  <main className="flex-1 flex flex-col justify-center relative mt-2">
                    {isSuddenDeath && !winner && <div className="absolute -top-6 left-0 w-full flex justify-center"><span className={`px-4 py-1.5 rounded-full text-xs font-bold tracking-widest uppercase bg-rose-100 text-rose-700 border border-rose-200 dark:bg-rose-900/50 dark:text-rose-300 dark:border-rose-800`}>🔥 {getT('suddenDeath')} - {serveToWinAt14 ? getT('suddenDeathServeDesc') : getT('nextPointWins')} 🔥</span></div>}
                    <div className="flex justify-center items-center gap-6 md:gap-16 mb-12 mt-4 relative z-10">
                      <div className="flex flex-col items-center"><span className={`text-xs font-semibold uppercase tracking-widest mb-2 truncate max-w-[100px] ${textSub}`}>{t1Name}</span><span className={`text-8xl md:text-9xl font-bold tracking-tighter ${servingTeam === 1 && !winner ? accentGreen : textMain}`}>{team1Score}</span></div>
                      <span className={`text-3xl md:text-5xl font-light ${textSub}`}>-</span>
                      <div className="flex flex-col items-center"><span className={`text-xs font-semibold uppercase tracking-widest mb-2 truncate max-w-[100px] ${textSub}`}>{t2Name}</span><span className={`text-8xl md:text-9xl font-bold tracking-tighter ${servingTeam === 2 && !winner ? accentRed : textMain}`}>{team2Score}</span></div>
                      {showServerNumberUI && <><span className={`text-3xl md:text-5xl font-light ${textSub}`}>-</span><div className="flex flex-col items-center"><span className={`text-xs font-semibold uppercase tracking-widest mb-2 ${textSub}`}>{getT('server')}</span><span className={`text-8xl md:text-9xl font-bold tracking-tighter ${winner ? textMain : 'text-amber-500'}`}>{serverNumber}</span></div></>}
                    </div>

                    <div className="mt-auto relative z-10">
                      <div className="grid grid-cols-2 gap-4 h-40 md:h-48">
                        <button onClick={() => handleRallyWin(1)} disabled={winner !== null} className={`relative flex flex-col items-center justify-center rounded-xl border transition-all duration-200 active:scale-[0.96] ${servingTeam === 1 && !winner ? bgAccentGreen : `muji-card ${bgCard} ${winner ? 'opacity-50' : ''}`}`}>
                          <span className={`block text-xl md:text-2xl font-bold mb-1 truncate max-w-[90%] ${servingTeam === 1 && !winner ? accentGreen : textMain}`}>{t1Name}</span>
                          <span className={`text-sm font-semibold ${servingTeam === 1 && !winner ? accentGreen : textSub}`}>{getT('wonRally')}</span>
                          {servingTeam === 1 && !winner && <div className={`absolute top-4 flex items-center gap-1.5 text-[10px] font-bold uppercase ${accentGreen}`}><div className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>{getT('serving')}</div>}
                        </button>
                        <button onClick={() => handleRallyWin(2)} disabled={winner !== null} className={`relative flex flex-col items-center justify-center rounded-xl border transition-all duration-200 active:scale-[0.96] ${servingTeam === 2 && !winner ? bgAccentRed : `muji-card ${bgCard} ${winner ? 'opacity-50' : ''}`}`}>
                          <span className={`block text-xl md:text-2xl font-bold mb-1 truncate max-w-[90%] ${servingTeam === 2 && !winner ? accentRed : textMain}`}>{t2Name}</span>
                          <span className={`text-sm font-semibold ${servingTeam === 2 && !winner ? accentRed : textSub}`}>{getT('wonRally')}</span>
                          {servingTeam === 2 && !winner && <div className={`absolute top-4 flex items-center gap-1.5 text-[10px] font-bold uppercase ${accentRed}`}><div className="w-1.5 h-1.5 rounded-full bg-rose-500 animate-pulse"></div>{getT('serving')}</div>}
                        </button>
                      </div>
                    </div>
                    <div className="mb-6">{renderTimeline(history, true)}</div>
                  </main>
                </div>
              )}

              {/* --- IN-GAME OVERLAYS & MODALS --- */}
              {showSwitchModal && (
                <div className="fixed inset-0 z-[120] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" style={{touchAction: 'none'}} onClick={() => setShowSwitchModal(false)}></div>
                  <div className={`relative w-full max-w-sm p-6 ${bgCard} border ${borderSub} rounded-2xl shadow-2xl text-center`}>
                    <RotateCcw size={48} className="mx-auto text-amber-500 mb-4 animate-spin" style={{animationIterationCount: 1}}/>
                    <h2 className={`text-xl font-bold mb-2 ${textMain}`}>{getT('switchEnds')}</h2>
                    <p className={`text-sm mb-6 ${textSub}`}>{getT('switchEndsDesc')}</p>
                    <button onClick={() => setShowSwitchModal(false)} className={`w-full py-3 rounded-xl font-bold text-white bg-amber-500 hover:bg-amber-600 shadow-md`}><Check className="inline mr-2" size={18}/>{getT('gotIt')}</button>
                  </div>
                </div>
              )}

              {showRetreatModal && (
                <div className="fixed inset-0 z-[120] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" style={{touchAction: 'none'}} onClick={() => setShowRetreatModal(false)}></div>
                  <div className={`relative w-full max-w-sm p-6 ${bgCard} border ${borderSub} rounded-2xl shadow-2xl text-center`}>
                    <h2 className={`text-xl font-bold mb-6 ${textMain}`}>{getT('retreatTitle')}</h2>
                    <div className="flex flex-col gap-3">
                      <button onClick={() => handleRetreat(1)} className={`w-full py-3 rounded-xl font-bold text-white bg-rose-500 hover:bg-rose-600 shadow-md`}>{t1Name} Retreated</button>
                      <button onClick={() => handleRetreat(2)} className={`w-full py-3 rounded-xl font-bold text-white bg-rose-500 hover:bg-rose-600 shadow-md`}>{t2Name} Retreated</button>
                      <button onClick={() => setShowRetreatModal(false)} className={`w-full py-3 mt-2 rounded-xl font-semibold border ${borderSub} ${textSub} hover:${textMain}`}>{getT('cancel')}</button>
                    </div>
                  </div>
                </div>
              )}

              {winner && showWinnerOverlay && (
                <div className="fixed inset-0 z-[130] flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
                  <div className={`muji-card p-8 text-center max-w-sm w-full shadow-2xl relative`}>
                    <Trophy size={48} className="mx-auto text-amber-500 mb-4" />
                    <h2 className={`text-3xl font-bold mb-1 truncate ${textMain}`}>{winner === 1 ? t1Name : t2Name}</h2>
                    <p className={`text-lg font-medium ${textSub} mb-8`}>{winReason === 'retreat' ? getT('winByRetreat') : getT('winner')}</p>
                    <div className="flex flex-col gap-3">
                      <button onClick={() => { setShowWinnerOverlay(false); setMatchTitleInput(matchTitle); setT1NameInput(t1Name); setT2NameInput(t2Name); setPendingGame({ mode: gameMode, rules: ruleSet }); }} className={`w-full py-4 rounded-xl font-bold text-white bg-stone-800 dark:bg-stone-200 dark:text-stone-900`}>{getT('playAgain')}</button>
                      <button onClick={() => setShowWinnerOverlay(false)} className={`w-full py-3 rounded-xl font-semibold border ${borderSub} ${textSub} hover:${textMain}`}>{getT('reviewMatch')}</button>
                    </div>
                  </div>
                </div>
              )}
              
              {showBackConfirm && (
                <div className="fixed inset-0 z-[120] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" style={{touchAction: 'none'}} onClick={() => setShowBackConfirm(false)}></div>
                  <div className={`relative w-full max-w-sm p-6 ${bgCard} border ${borderSub} rounded-2xl shadow-2xl text-center`}>
                    <AlertTriangle size={48} className="mx-auto text-amber-500 mb-4" />
                    <h2 className={`text-lg font-bold mb-2 ${textMain}`}>{getT('quitMatch')}</h2>
                    <p className={`text-sm mb-6 ${textSub}`}>{getT('quitConfirm')}</p>
                    <div className="flex gap-3">
                      <button onClick={() => setShowBackConfirm(false)} className={`flex-1 py-3 rounded-xl font-semibold border ${borderSub} ${textSub} hover:${textMain}`}>{getT('cancel')}</button>
                      <button onClick={() => { setShowBackConfirm(false); setAppState('menu'); }} className={`flex-1 py-3 rounded-xl font-bold text-white bg-rose-500 hover:bg-rose-600 shadow-md`}>{getT('yesQuit')}</button>
                    </div>
                  </div>
                </div>
              )}

              {showInstallInstructions && (
                <div className="fixed inset-0 z-[120] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" style={{touchAction: 'none'}} onClick={() => setShowInstallInstructions(false)}></div>
                  <div className={`relative w-full max-w-sm p-6 ${bgCard} border ${borderSub} rounded-2xl shadow-2xl text-center`}>
                    <Download size={48} className="mx-auto text-emerald-500 mb-4" />
                    <h2 className={`text-lg font-bold mb-2 ${textMain}`}>{getT('installAsApp')}</h2>
                    <p className={`text-sm mb-6 ${textSub}`}>{/iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase()) ? getT('installStepsIOS') : getT('installStepsAndroid')}</p>
                    <button onClick={() => setShowInstallInstructions(false)} className={`w-full py-3 rounded-xl font-bold text-white bg-emerald-500 hover:bg-emerald-600 shadow-md`}>{getT('gotIt')}</button>
                  </div>
                </div>
              )}

              {showInfo && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity" style={{touchAction: 'none'}} onClick={() => setShowInfo(false)}></div>
                  <div className={`relative w-full max-w-sm flex flex-col ${bgCard} border ${borderSub} rounded-2xl shadow-2xl transition-all duration-200 max-h-[85vh] overflow-hidden`}>
                    <div className="p-6 pb-4 flex-shrink-0 border-b border-stone-100 dark:border-stone-800/50">
                      <div className="flex items-center gap-3"><InfoIcon size={24} className={accentGreen} /><h2 className={`text-xl font-bold ${textMain}`}>{getT('infoTitle')}</h2></div>
                    </div>
                    <div className="px-6 py-5 overflow-y-auto muji-scrollbar flex-1 overscroll-contain">
                      <div className={`text-sm ${textSub} text-left space-y-5`}>
                        <div>
                          <h3 className={`font-bold ${textMain} mb-2`}>{getT('infoHowToTitle')}</h3>
                          <ul className="space-y-1.5 list-none pl-1 text-xs md:text-sm">
                             <li>{getT('infoHowTo1')}</li><li>{getT('infoHowTo2')}</li><li>{getT('infoHowTo3')}</li><li>{getT('infoHowTo4')}</li><li>{getT('infoHowTo5')}</li>
                          </ul>
                        </div>
                        <div className={`w-full h-px bg-stone-200 dark:bg-stone-700`}></div>
                        <div className="flex items-start gap-3"><HardDrive size={18} className={`mt-0.5 flex-shrink-0 ${accentRed}`} /><p className="leading-relaxed">{getT('infoData')}</p></div>
                        <div className="flex items-start gap-3"><Github size={18} className={`mt-0.5 flex-shrink-0 ${textMain}`} /><p className="leading-relaxed">{getT('infoUsage')}</p></div>
                        <p className={`text-center pt-2 italic text-xs ${textSub}`}>{getT('infoFooter')}</p>
                      </div>
                    </div>
                    <div className="p-6 pt-4 flex-shrink-0 border-t border-stone-100 dark:border-stone-800/50">
                      <button onClick={() => setShowInfo(false)} className={`w-full py-3 rounded-xl font-bold text-white bg-emerald-500 hover:bg-emerald-600 transition-colors shadow-md`}>{getT('gotIt')}</button>
                    </div>
                  </div>
                </div>
              )}

              {showLangMenu && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity" style={{touchAction: 'none'}} onClick={() => setShowLangMenu(false)}></div>
                  <div className={`relative w-full max-w-sm p-6 ${bgCard} border ${borderSub} rounded-2xl shadow-2xl`}>
                    <div className="flex items-center gap-3 mb-6"><Globe size={24} className={accentGreen} /><h2 className={`text-xl font-bold ${textMain}`}>Select Language</h2></div>
                    <div className="grid grid-cols-2 gap-3 mb-6">
                      {availableLanguages.map((l) => (
                        <button key={l.code} onClick={() => handleLanguageChange(l.code)} className={`py-3 rounded-xl font-semibold border transition-all ${lang === l.code ? `bg-emerald-500 text-white border-emerald-500 shadow-md` : `${bgMain} ${borderSub} ${textSub} hover:${textMain} hover:border-emerald-400/50`}`}>{l.name}</button>
                      ))}
                    </div>
                    <button onClick={() => setShowLangMenu(false)} className={`w-full py-3 rounded-xl font-semibold border ${borderSub} ${textSub} hover:${textMain}`}>{getT('cancel')}</button>
                  </div>
                </div>
              )}

              {/* --- CLEAR HISTORY CONFIRM --- */}
              {showClearConfirm && (
                <div className="fixed inset-0 z-[120] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" style={{touchAction: 'none'}} onClick={() => setShowClearConfirm(false)}></div>
                  <div className={`relative w-full max-w-sm p-6 ${bgCard} border ${borderSub} rounded-2xl shadow-2xl text-center`}>
                    <AlertTriangle size={48} className="mx-auto text-rose-500 mb-4" />
                    <h2 className={`text-lg font-bold mb-6 ${textMain}`}>{getT('confirmClear')}</h2>
                    <div className="flex gap-3">
                      <button onClick={() => setShowClearConfirm(false)} className={`flex-1 py-3 rounded-xl font-semibold border ${borderSub} ${textSub} hover:${textMain}`}>{getT('cancel')}</button>
                      <button onClick={clearHistory} className={`flex-1 py-3 rounded-xl font-bold text-white bg-rose-500 hover:bg-rose-600 shadow-md`}>{getT('yesClear')}</button>
                    </div>
                  </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PickleballApp />);
    </script>
</body>
</html>
